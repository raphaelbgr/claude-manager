<html lang="en" class="dark">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface:       '#0d1117',
            card:          '#161b22',
            'card-hover':  '#1c2128',
            border:        '#30363d',
            accent:        '#58a6ff',
            'accent-dim':  '#1f3a5f',
            success:       '#3fb950',
            'success-dim': '#1a3a2a',

            'text-muted':  '#8b949e',

              from: { opacity: '0', transform: 'translateY(4px)' },

  <style>

    html, body { height: 100%; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    .fade-in { animation: fade-in 0.2s ease-out; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pulse-dot { animation: pulse-dot 1.4s ease-in-out infinite; }

    .card-hover:hover { background: #1c2128; border-color: #444c56; }

      font-size: 0.65rem; font-family: "SF Mono", "Fira Code", Consolas, monospace;

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(1, 4, 9, 0.85);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      animation: fade-in 0.15s ease-out;

    .modal-box {
      background: #161b22; border: 1px solid #30363d;

    }

    .form-input {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 8px 12px; color: #e6edf3;
      font-size: 0.875rem; outline: none;

    }

    .form-input::placeholder { color: #484f58; }

    select.form-input option { background: #161b22; color: #e6edf3; }

    .panel-scroll { overflow-y: auto; flex: 1; min-height: 0; padding: 0 4px 0 0; }

    .toaster {
      position: fixed; bottom: 24px; right: 24px; z-index: 2000;

    @media (max-width: 768px) {
      .main-panels { flex-direction: column !important; }

    /* Filter bar */
    .filter-bar {
      background: #0d1117;
      border-bottom: 1px solid #30363d;
      padding: 8px 24px;

      top: 57px;

    .filter-row {

      align-items: center;
      flex-wrap: wrap;
      gap: 6px;

      font-size: 0.65rem;

      font-size: 0.7rem;

    .filter-pill.active-machine { background: #1f3a5f; color: #58a6ff; border-color: #2d4f7a; }
    .filter-pill.active-working { background: #3a2a0a; color: #e3b341; border-color: #5a4a1a; }
    .filter-pill.active-active  { background: #1a3a2a; color: #3fb950; border-color: #2a5a3a; }

      outline: none;

    .filter-select option { background: #161b22; color: #e6edf3; }
    .filter-reset {
      font-size: 0.68rem;
      color: #58a6ff;
      background: none;
      border: none;
      cursor: pointer;

    .filter-reset:hover { opacity: 1; }

      margin-left: auto;
      white-space: nowrap;
    }
  </style>

<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react":            "https://esm.sh/react@19",
    "react-dom/client": "https://esm.sh/react-dom@19/client",
    "react/jsx-runtime":"https://esm.sh/react@19/jsx-runtime"
  }
}
</script>

<script type="module">
import { createElement as h, useState, useEffect, useRef, useCallback, useMemo, Fragment } from 'react';
import { createRoot } from 'react-dom/client';

// ─── Utility functions ────────────────────────────────────────────────────────

function relativeTime(isoStr) {
  if (!isoStr) return '—';
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 5)   return 'just now';
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function shortenPath(p) {
  if (!p) return '';
  const parts = p.replace(/\\/g, '/').split('/').filter(Boolean);
  if (parts.length <= 2) return parts.join('/');
  return parts.slice(-2).join('/');
}

function groupBy(arr, key) {
  const out = {};
  for (const item of arr) {
    const k = typeof key === 'function' ? key(item) : item[key];
    if (!out[k]) out[k] = [];
    out[k].push(item);
  }
  return out;
}

function clsx(...args) {
  return args.filter(Boolean).join(' ');
}

// ─── Machine / Design System ──────────────────────────────────────────────────

const MACHINE_INFO = {
  'mac-mini':        { ip: '192.168.7.102', os: 'macOS',   icon: '🍎' },
  'ubuntu-desktop':  { ip: '192.168.7.13',  os: 'Linux',   icon: '🐧' },
  'avell-i7':        { ip: '192.168.7.103', os: 'Windows', icon: '🪟' },
  'windows-desktop': { ip: '192.168.7.101', os: 'Windows', icon: '🪟' },
};

// Detect local machine from the page's hostname (API host).
// If served from one of the known IPs, map it back to a machine name.
function detectLocalMachine() {
  const h = location.hostname;
  for (const [name, info] of Object.entries(MACHINE_INFO)) {
    if (h === info.ip || h === name || h === 'localhost' || h === '127.0.0.1') {
      // localhost / 127.0.0.1 → assume mac-mini (the primary orchestrator)
      if (h === 'localhost' || h === '127.0.0.1') return 'mac-mini';
      return name;
    }
  }
  return 'mac-mini'; // fallback
}

const LOCAL_MACHINE = detectLocalMachine();

function isLocalMachine(machine) {
  return machine === LOCAL_MACHINE;
}

function getMachineOS(machine) {
  return MACHINE_INFO[machine]?.os || 'unknown';
}

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(1) + ' GB';
}

// ─── Badge Component ──────────────────────────────────────────────────────────

function Badge({ text, color = '#8b949e', bg = '#21262d', border = '#30363d', icon }) {
  return h('span', {
    style: {
      display: 'inline-flex', alignItems: 'center', gap: 4,
      fontSize: '0.65rem', fontWeight: 600,
      padding: '2px 8px', borderRadius: 12,
      background: bg, color: color, border: `1px solid ${border}`,
      whiteSpace: 'nowrap',
      fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
    }
  }, icon && h('span', { style: { fontSize: '0.7rem' } }, icon), text);
}

function MachineBadge({ machine }) {
  const info = MACHINE_INFO[machine] || {};
  const local = isLocalMachine(machine);
  if (local) {
    return h(Badge, { text: 'LOCAL', color: '#3fb950', bg: '#1a3a2a', border: '#2a5a3a' });
  }
  const label = info.ip ? `${machine} (${info.ip})` : machine;
  return h(Badge, { text: label, color: '#8b949e', bg: '#21262d', border: '#30363d' });
}

function OsBadge({ machine }) {
  const info = MACHINE_INFO[machine] || {};
  const icon = info.icon || '💻';
  const os = info.os || 'unknown';
  return h(Badge, { text: os, icon, color: '#8b949e', bg: '#21262d', border: '#30363d' });
}

// ─── Toast system ─────────────────────────────────────────────────────────────

let _addToast = null;
function toast(msg, type = 'info') {
  if (_addToast) _addToast(msg, type);
}

function Toaster() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    _addToast = (msg, type) => {
      const id = Date.now() + Math.random();
      setToasts(t => [...t, { id, msg, type }]);
      setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    };
    return () => { _addToast = null; };
  }, []);

  return h('div', { className: 'toaster' },
    toasts.map(t =>
      h('div', { key: t.id, className: `toast ${t.type}` }, t.msg)
    )
  );
}

// ─── WebSocket hook ───────────────────────────────────────────────────────────

function useWebSocket(onMessage) {
  const wsRef = useRef(null);
  const reconnectTimer = useRef(null);
  const retryCount = useRef(0);
  const [connected, setConnected] = useState(false);

  const connect = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState < 2) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    wsRef.current = ws;

    ws.onopen = () => {
      setConnected(true);
      retryCount.current = 0;
      ['sessions', 'tmux', 'fleet'].forEach(ch =>
        ws.send(JSON.stringify({ type: 'subscribe', channel: ch }))
      );
    };

    ws.onmessage = evt => {
      try { onMessage(JSON.parse(evt.data)); } catch {}
    };

    ws.onclose = () => {
      setConnected(false);
      const delay = Math.min(1000 * Math.pow(2, retryCount.current), 30000);
      retryCount.current++;
      reconnectTimer.current = setTimeout(connect, delay);
    };

    ws.onerror = () => { ws.close(); };
  }, [onMessage]);

  useEffect(() => {
    connect();
    return () => {
      clearTimeout(reconnectTimer.current);
      wsRef.current?.close();
    };
  }, [connect]);

  return connected;
}

// ─── Status Dot ──────────────────────────────────────────────────────────────

function StatusDot({ status, pulse = false }) {
  return h('span', {
    className: clsx('status-dot', status, pulse && (status === 'active' || status === 'working') && 'pulse'),
    title: status,
  });
}

// ─── Session Card ─────────────────────────────────────────────────────────────

function SessionCard({ session, onLaunch, onTmuxLaunch, launching, tmuxLaunching, skipPermissions, onPin, onUnpin, isPinned }) {
  const isWorking = session.status === 'working';
  const isActive = session.status === 'active' || isWorking;
  // Always prefer cwd over project_path (project_path has a dash→slash bug)
  const effectivePath = session.cwd || session.project_path || session.project_folder || '';
  const projectName = shortenPath(effectivePath);
  const summary = session.summary || '(no message preview)';
  const [copied, setCopied] = useState(false);

  const sessionId = session.session_id || '';

  // Display name: custom name (from /rename) > project folder name > "(unnamed)"
  // Show slug below only when it's meaningfully different from the project name
  const hasCustomName = Boolean(session.name);
  const displayName = session.name || projectName || '(unnamed)';
  // Show slug as secondary hint only when there's no custom name and slug differs from folder
  const showSlug = !hasCustomName && session.slug && session.slug !== projectName;

  const local = isLocalMachine(session.machine);
  const os = getMachineOS(session.machine);

  const handleCopy = () => {
    const cmd = `claude --resume ${sessionId}`;
    navigator.clipboard.writeText(cmd).then(() => {
      setCopied(true);
      toast('Copied resume command', 'info');
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => {
      toast('Failed to copy', 'error');
    });
  };

  const launchLabel = launching ? 'Launching…' : (local ? 'Launch' : 'SSH + Launch');
  const launchBg    = local ? '#1f3a5f' : '#3a2200';
  const launchColor = local ? '#58a6ff' : '#e3b341';
  const launchBorder = local ? '#2d4f7a' : '#5a3a00';

  const tmuxLabel = tmuxLaunching ? 'Launching…' : (os === 'Windows' ? 'psmux Launch' : 'tmux Launch');

  return h('div', { className: 'session-card' },
    h('div', { style: { flex: 1, minWidth: 0 } },

      // Row 1: Display name (bold, primary) — custom name or project folder
      h('div', {
        style: {
          fontSize: '0.88rem', fontWeight: 700,
          color: '#58a6ff', overflow: 'hidden',
          textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          marginBottom: 2,
        },
        title: displayName,
      }, displayName),

      // Row 1b: Slug in muted text (only when no custom name and slug differs from folder)
      showSlug && h('div', {
        style: {
          fontSize: '0.65rem', color: '#484f58',
          fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
          overflow: 'hidden', textOverflow: 'ellipsis',
          whiteSpace: 'nowrap', marginBottom: 2,
        },
        title: session.slug,
      }, session.slug),

      // Row 2: Full CWD path (always uses cwd which is correct)
      h('div', {
        style: {
          fontSize: '0.7rem', color: '#8b949e',
          fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
          overflow: 'hidden', textOverflow: 'ellipsis',
          whiteSpace: 'nowrap', marginBottom: 4,
        },
        title: effectivePath,
      }, projectName),

      // Row 3: Summary
      h('div', {
        style: {
          fontSize: '0.75rem', color: '#6e7681',
          overflow: 'hidden', textOverflow: 'ellipsis',
          whiteSpace: 'nowrap', marginBottom: 6,
          fontStyle: 'italic',
        },
        title: summary,
      }, `"${summary}"`),

      // Row 4: Metadata badges
      h('div', {
        style: {
          display: 'flex', flexWrap: 'wrap', gap: 4,
          alignItems: 'center', marginBottom: 6,
        }
      },
        h(MachineBadge, { machine: session.machine }),
        h(OsBadge, { machine: session.machine }),
        h('span', {
          style: {
            display: 'inline-flex', alignItems: 'center', gap: 4,
            fontSize: '0.65rem', fontWeight: 600,
            padding: '2px 8px', borderRadius: 12,
            background: isWorking ? '#3a2a0a' : isActive ? '#1a3a2a' : '#21262d',
            color: isWorking ? '#e3b341' : isActive ? '#3fb950' : '#6e7681',
            border: `1px solid ${isWorking ? '#5a4a1a' : isActive ? '#2a5a3a' : '#30363d'}`,
            whiteSpace: 'nowrap',
          }
        },
          h('span', {
            style: {
              width: 6, height: 6, borderRadius: '50%',
              background: isWorking ? '#e3b341' : isActive ? '#3fb950' : '#484f58',
              display: 'inline-block', flexShrink: 0,
              animation: (isWorking || isActive) ? 'pulse-dot 1.4s ease-in-out infinite' : 'none',
            }
          }),
          isWorking ? 'WORKING' : isActive ? 'ACTIVE' : 'idle',
        ),
        session.cpu_percent > 0 && h(Badge, {
          text: `${session.cpu_percent}% CPU`,
          color: session.cpu_percent > 30 ? '#e3b341' : '#8b949e',
        }),
        session.file_size && h(Badge, { text: formatFileSize(session.file_size) }),
        h(Badge, { text: `${session.messages || 0} msgs` }),
        h(Badge, { text: relativeTime(session.modified) }),
      ),

      // Row 5: Session ID + copy + pin
      sessionId && h('div', {
        style: { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }
      },
        h('span', {
          style: {
            fontSize: '10px', fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
            color: '#484f58', opacity: 0.6,
            overflow: 'hidden', textOverflow: 'ellipsis',
            whiteSpace: 'nowrap', maxWidth: 200,
          },
          title: sessionId,
        }, sessionId),
        h('button', {
          className: 'btn',
          onClick: handleCopy,
          title: `Copy: claude --resume ${sessionId}`,
          style: {
            background: 'none', border: 'none',
            color: copied ? '#3fb950' : '#484f58',
            padding: '0 2px', cursor: 'pointer',
            fontSize: '0.75rem', lineHeight: 1,
            flexShrink: 0,
          }
        }, copied ? '✓' : '📋'),
        h('button', {
          className: 'btn',
          onClick: () => isPinned ? onUnpin(sessionId) : onPin(sessionId),
          title: isPinned ? 'Unpin session' : 'Pin session',
          style: {
            background: 'none', border: 'none',
            color: isPinned ? '#e3b341' : '#484f58',
            padding: '0 2px', cursor: 'pointer',
            fontSize: '0.75rem', lineHeight: 1,
            flexShrink: 0,
            opacity: isPinned ? 1 : 0.5,
            transition: 'color 0.15s, opacity 0.15s',
          }
        }, '📌'),
      ),

      // Row 6: Action buttons
      h('div', { style: { display: 'flex', gap: 6 } },
        h('button', {
          className: 'btn',
          onClick: () => onLaunch(session),
          disabled: launching,
          style: {
            fontSize: '0.72rem', fontWeight: 600,
            background: launchBg, color: launchColor,
            border: `1px solid ${launchBorder}`, borderRadius: 6,
            padding: '4px 12px', cursor: launching ? 'not-allowed' : 'pointer',
            opacity: launching ? 0.6 : 1,
          }
        }, launchLabel),
        h('button', {
          className: 'btn',
          onClick: () => onTmuxLaunch(session),
          disabled: tmuxLaunching,
          style: {
            fontSize: '0.72rem', fontWeight: 600,
            background: '#1a3a2a', color: '#3fb950',
            border: '1px solid #2a5a3a', borderRadius: 6,
            padding: '4px 12px', cursor: tmuxLaunching ? 'not-allowed' : 'pointer',
            opacity: tmuxLaunching ? 0.6 : 1,
          }
        }, tmuxLabel),
      ),
    ),
  );
}

// ─── Tmux Card ────────────────────────────────────────────────────────────────

function TmuxCard({ session, onConnect, connecting, onKill, killing, onRemoteAttach, remoteAttaching }) {
  const isAttached = session.attached;
  const local = isLocalMachine(session.machine);
  const connectLabel = connecting ? 'Attaching…' : (local ? '▶ Attach' : '▶ SSH + Attach');
  const sessionName = session.session_name || session.name || '(unnamed)';

  return h('div', { className: 'tmux-card' },
    h('div', { style: { flex: 1, minWidth: 0 } },
      // Session name
      h('div', {
        style: {

// ─── Machine Section ──────────────────────────────────────────────────────────

function MachineSection({ machine, children, count, collapseKey, collapseState, setCollapseState }) {
  const isOpen = (collapseState && collapseKey !== undefined && collapseState[collapseKey] !== undefined)
    ? collapseState[collapseKey]
    : true; // default open

  const toggle = () => {
    if (setCollapseState && collapseKey !== undefined) {
      setCollapseState(prev => ({ ...prev, [collapseKey]: !isOpen }));
    }
  };

  return h('div', { className: 'machine-section' },
    h('div', {
      className: 'machine-header',
      onClick: toggle,
    },
      h('span', {
        style: { color: '#8b949e', fontSize: '0.75rem', transition: 'transform 0.15s',
          display: 'inline-block',
          transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)' }
      }, '▶'),
      h('span', { style: { color: '#8b949e', fontFamily: 'monospace' } }, machine),
      count != null && h('span', {
        style: {
          background: '#21262d', color: '#8b949e', fontSize: '0.65rem',
          borderRadius: 20, padding: '1px 7px', marginLeft: 4,
        }
      }, count),
    ),
    isOpen && h('div', { style: { paddingLeft: 8 } }, children),
  );
}

// ─── Project Section ──────────────────────────────────────────────────────────

function ProjectSection({ projectPath, children, count, defaultOpen = true, collapseKey, collapseState, setCollapseState }) {
  const shortPath = shortenPath(projectPath) || projectPath || '(unknown)';

  const isOpen = (collapseState && collapseKey !== undefined && collapseState[collapseKey] !== undefined)
    ? collapseState[collapseKey]
    : defaultOpen;

  const toggle = () => {
    if (setCollapseState && collapseKey !== undefined) {
      setCollapseState(prev => ({ ...prev, [collapseKey]: !isOpen }));
    }
  };

  return h('div', { style: { marginLeft: 8, marginBottom: 4 } },
    h('div', {
      onClick: toggle,
      style: {
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 8px', cursor: 'pointer',
        borderRadius: 4, fontSize: '0.75rem',

// ─── New Tmux Modal ───────────────────────────────────────────────────────────

function NewTmuxModal({ fleet, onClose, onCreated }) {
  const machines = Object.keys(fleet || {});
  const [machine, setMachine] = useState(machines[0] || '');
  const [name, setName] = useState('');
  const [cwd, setCwd] = useState('');
  const [command, setCommand] = useState('');
  const [creating, setCreating] = useState(false);
  const [browseOpen, setBrowseOpen] = useState(false);
  const [browsePath, setBrowsePath] = useState('');
  const [browseDirs, setBrowseDirs] = useState([]);
  const [browseLoading, setBrowseLoading] = useState(false);

  const fetchDirs = async (path) => {
    setBrowseLoading(true);
    try {
      const res = await fetch('/api/browse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, path: path || '' }),
      });
      const data = await res.json();
      if (data.ok) {
        setBrowsePath(data.path);
        setBrowseDirs(data.dirs);
      } else {
        toast(data.error || 'Browse failed', 'error');
      }
    } catch (e) {
      toast('Network error browsing directory', 'error');
    } finally {
      setBrowseLoading(false);
    }
  };

  const handleBrowseToggle = async () => {
    if (browseOpen) {
      setBrowseOpen(false);
    } else {
      setBrowseOpen(true);
      await fetchDirs(cwd || '');
    }
  };

  const handleCreate = async () => {
    if (!machine || !name.trim()) {
      toast('Machine and session name are required', 'error');
      return;
    }
    setCreating(true);
    try {
      const res = await fetch('/api/tmux/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, name: name.trim(), cwd: cwd.trim() || undefined, command: command.trim() || undefined }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Created tmux session "${name}" on ${machine}`, 'success');
        onCreated?.();
        onClose();
      } else {
        toast(data.error || 'Failed to create session', 'error');
      }
    } catch (e) {
      toast('Network error creating session', 'error');
    } finally {
      setCreating(false);
    }
  };

  return h('div', {
    className: 'modal-overlay',
    onClick: e => { if (e.target === e.currentTarget) onClose(); }
  },
    h('div', { className: 'modal-box' },
      h('div', {
        style: {
          display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', marginBottom: 24,
        }
      },
        h('h2', {
          style: { fontSize: '1rem', fontWeight: 700, color: '#e6edf3' }
        }, 'New Tmux Session'),
        h('button', {
          className: 'btn',
          onClick: onClose,
          style: {
            background: 'none', border: 'none', color: '#8b949e',
            fontSize: '1.2rem', cursor: 'pointer', padding: '4px 8px',
            borderRadius: 4,
          }
        }, '×'),
      ),

      h('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Machine'),
          h('select', {
            className: 'form-input',
            value: machine,
            onChange: e => setMachine(e.target.value),
          },
            machines.map(m => h('option', { key: m, value: m }, m))
          ),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Session Name'),
          h('input', {
            className: 'form-input',
            type: 'text',
            placeholder: 'e.g. dev-session',
            value: name,
            onChange: e => setName(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter') handleCreate(); },
          }),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Working Directory (optional)'),
          h('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
            h('input', {
              className: 'form-input',
              type: 'text',
              placeholder: '/Users/rbgnr/git/project',
              value: cwd,
              onChange: e => setCwd(e.target.value),
              style: { flex: 1 },
            }),
            h('button', {
              type: 'button',
              onClick: handleBrowseToggle,
              style: {
                background: browseOpen ? '#1f6feb' : '#21262d',
                color: browseOpen ? '#e6edf3' : '#8b949e',
                border: '1px solid #30363d',
                borderRadius: 6,
                padding: '6px 12px',
                fontSize: '0.8rem',
                cursor: 'pointer',
                whiteSpace: 'nowrap',
                flexShrink: 0,
              }
            }, '\uD83D\uDCC1 Browse'),
          ),
          browseOpen && h('div', {
            style: {
              marginTop: 8,
              background: '#161b22',
              border: '1px solid #30363d',
              borderRadius: 8,
              overflow: 'hidden',
            }
          },
            h('div', {
              style: {
                padding: '8px 12px',
                background: '#0d1117',
                borderBottom: '1px solid #30363d',
                fontFamily: 'monospace',
                fontSize: '0.78rem',
                color: '#58a6ff',
                display: 'flex',
                alignItems: 'center',
                gap: 6,
              }
            },
              '\uD83D\uDCC1 ',
              browseLoading
                ? h('span', { style: { color: '#8b949e' } }, 'Loading…')
                : h('span', null, browsePath || '~'),
            ),
            h('div', {
              style: {
                maxHeight: 240,
                overflowY: 'auto',
                padding: '4px 0',
              }
            },
              !browseLoading && browsePath && h('div', {
                onClick: async () => {
                  const parent = browsePath.split('/').slice(0, -1).join('/') || '/';
                  await fetchDirs(parent);
                },
                style: {
                  padding: '6px 14px',
                  fontSize: '0.82rem',
                  color: '#8b949e',
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  gap: 8,
                },
                onMouseEnter: e => e.currentTarget.style.background = '#21262d',
                onMouseLeave: e => e.currentTarget.style.background = 'transparent',
              },
                '\uD83D\uDCC1 .. (go up)'
              ),
              !browseLoading && browseDirs.map(dir =>
                h('div', {
                  key: dir.path,
                  onClick: () => fetchDirs(dir.path),
                  style: {
                    padding: '6px 14px',
                    fontSize: '0.82rem',
                    color: '#e6edf3',
                    cursor: 'pointer',
                    display: 'flex',
                    alignItems: 'center',
                    gap: 8,
                  },
                  onMouseEnter: e => e.currentTarget.style.background = '#21262d',
                  onMouseLeave: e => e.currentTarget.style.background = 'transparent',
                },
                  '\uD83D\uDCC1 ', dir.name
                )
              ),
              browseLoading && h('div', {
                style: { padding: '12px 14px', color: '#8b949e', fontSize: '0.82rem' }
              }, 'Loading…'),
            ),
            h('div', {
              style: {
                padding: '8px 12px',
                borderTop: '1px solid #30363d',
                display: 'flex',
                justifyContent: 'flex-end',
              }
            },
              h('button', {
                type: 'button',
                onClick: () => {
                  if (browsePath) setCwd(browsePath);
                  setBrowseOpen(false);
                },
                style: {
                  background: '#1f6feb',
                  color: '#e6edf3',
                  border: 'none',
                  borderRadius: 6,
                  padding: '6px 14px',
                  fontSize: '0.8rem',
                  fontWeight: 600,
                  cursor: 'pointer',
                }
              }, 'Select This Folder'),
            ),
          ),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Command (optional)'),
          h('input', {
            className: 'form-input',
            type: 'text',
            placeholder: 'e.g. claude',
            value: command,
            onChange: e => setCommand(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter') handleCreate(); },
          }),
        ),

        h('div', { style: { display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 } },
          h('button', {
            className: 'btn',
            onClick: onClose,
            style: {
              background: '#21262d', color: '#8b949e', border: '1px solid #30363d',
              borderRadius: 8, padding: '8px 20px', fontSize: '0.85rem',
              fontWeight: 600, cursor: 'pointer',
            }
          }, 'Cancel'),
          h('button', {
            className: 'btn',
            onClick: handleCreate,
            disabled: creating,
            style: {
              background: creating ? '#1a3a2a' : '#238636',
              color: '#3fb950', border: '1px solid #2a5a3a',
              borderRadius: 8, padding: '8px 20px', fontSize: '0.85rem',
              fontWeight: 600, cursor: creating ? 'not-allowed' : 'pointer',
              opacity: creating ? 0.7 : 1,
            }
          }, creating ? 'Creating…' : 'Create Session'),
        ),
      ),
    ),
  );
}

// ─── Pinned Section ───────────────────────────────────────────────────────────

function PinnedSection({ sessions, pinnedIds, onLaunch, launchingId, onTmuxLaunch, tmuxLaunchingId, skipPermissions, onPin, onUnpin }) {
  const pinned = sessions.filter(s => pinnedIds.includes(s.session_id));
  if (!pinned.length) return null;

  return h('div', {
    style: { marginBottom: 16, borderBottom: '1px solid #30363d', paddingBottom: 12 }
  },
    h('div', {
      style: { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8, padding: '0 2px' }
    },
      h('span', {
        style: {
          fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
          textTransform: 'uppercase', color: '#e3b341',
        }
      }, '📌 PINNED'),
      h('span', {
        style: {
          background: '#3a2a0a', color: '#e3b341', fontSize: '0.65rem',
          borderRadius: 20, padding: '1px 7px', marginLeft: 4,
          border: '1px solid #5a4a1a',
        }
      }, pinned.length),
    ),
    pinned.map(s =>
      h(SessionCard, {
        key: s.session_id,
        session: s,
        onLaunch,
        onTmuxLaunch,
        launching: launchingId === s.session_id,
        tmuxLaunching: tmuxLaunchingId === s.session_id,
        skipPermissions,
        onPin,
        onUnpin,
        isPinned: true,
      })
    ),
  );
}

// ─── Sessions Panel ───────────────────────────────────────────────────────────

function SessionsPanel({ sessions, onLaunch, onTmuxLaunch, launchingId, tmuxLaunchingId, skipPermissions, scanning, collapseState, setCollapseState, pinnedIds, onPin, onUnpin }) {
  // sessions is already filtered/sorted by App; just group by machine
  const byMachine = useMemo(() => groupBy(sessions, 'machine'), [sessions]);

  if (!sessions.length) {
    return h('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', height: '200px', gap: 12,
        color: '#484f58',
      }
    },
      h('span', { style: { fontSize: '2rem' } }, '🔍'),
      h('span', { style: { fontSize: '0.875rem' } }, 'No sessions found'),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 6, fontSize: '0.78rem' } },
        h('span', {
          style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '1rem' }
        }, '↻'),
        h('span', null, 'Scanning fleet…'),
      ),
    );
  }

  if (!Object.keys(byMachine).length) {
    return h('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', height: '200px', gap: 8,
        color: '#484f58',
      }
    },
      h('span', { style: { fontSize: '0.875rem' } }, 'No sessions match your filter'),
    );
  }

  const machineCount = Object.keys(byMachine).length;

  return h('div', null,
    // Pinned section (always above machine sections)
    h(PinnedSection, {
      sessions: sessions,
      pinnedIds: pinnedIds || [],
      onLaunch,
      launchingId,
      onTmuxLaunch,
      tmuxLaunchingId,
      skipPermissions,
      onPin,
      onUnpin,
    }),
    // Scan progress indicator
    scanning && h('div', {
      style: {
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '6px 4px 8px', fontSize: '0.72rem', color: '#58a6ff',
      }
    },
      h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite' } }, '↻'),
      h('span', null, `Scanning ${machineCount} machine${machineCount !== 1 ? 's' : ''}…`),
    ),
    Object.entries(byMachine).map(([machine, machineSessions]) => {
      // Group by effective path (cwd preferred) within the machine, sorted by most recent modified
      const byProject = groupBy(machineSessions, s => s.cwd || s.project_path || '');
      const projectEntries = Object.entries(byProject).sort(([, a], [, b]) => {
        const aMax = a.reduce((m, s) => s.modified > m ? s.modified : m, '');
        const bMax = b.reduce((m, s) => s.modified > m ? s.modified : m, '');
        return bMax > aMax ? 1 : bMax < aMax ? -1 : 0;
      });

      const machineKey = machine;

      return h(MachineSection, {
        key: machine,
        machine,
        count: machineSessions.length,
        collapseKey: machineKey,
        collapseState,
        setCollapseState,
      },
        projectEntries.map(([projectPath, projectSessions]) => {
          const projKey = `project:${machine}:${projectPath}`;
          return h(ProjectSection, {
            key: projectPath,
            projectPath,
            count: projectSessions.length,
            defaultOpen: projectSessions.length <= 3,
            collapseKey: projKey,
            collapseState,
            setCollapseState,
          },
            projectSessions.map(s =>
              h(SessionCard, {
                key: s.session_id,
                session: s,
                onLaunch,
                onTmuxLaunch,
                launching: launchingId === s.session_id,
                tmuxLaunching: tmuxLaunchingId === s.session_id,
                skipPermissions,
                onPin,
                onUnpin,
                isPinned: (pinnedIds || []).includes(s.session_id),
              })
            )
          );
        })
      );
    })
  );
}

// ─── Tmux Panel ───────────────────────────────────────────────────────────────

        className: 'btn',
        onClick: onNewSession,
        style: {
          width: '100%', background: '#21262d',
          border: '1px dashed #30363d', borderRadius: 8,
          color: '#8b949e', padding: '10px', fontSize: '0.8rem',
          fontWeight: 600, cursor: 'pointer', textAlign: 'center',
          transition: 'all 0.15s',
        },
        onMouseEnter: e => {
          e.currentTarget.style.borderColor = '#58a6ff';
          e.currentTarget.style.color = '#58a6ff';
          e.currentTarget.style.background = '#1f3a5f22';
        },
        onMouseLeave: e => {
          e.currentTarget.style.borderColor = '#30363d';
          e.currentTarget.style.color = '#8b949e';
          e.currentTarget.style.background = '#21262d';

// ─── Fleet Bar ────────────────────────────────────────────────────────────────

function FleetBar({ fleet, lastScan, wsConnected }) {
  const [, tick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => tick(n => n + 1), 1000);
    return () => clearInterval(t);
  }, []);

  const entries = Object.values(fleet || {});
  const online = entries.filter(m => m.online).length;
  const total = entries.length;

  return h('div', {
    style: {
      borderTop: '1px solid #30363d', background: '#0d0f12',
      padding: '8px 24px', display: 'flex', alignItems: 'center',
      gap: 16, flexWrap: 'wrap', flexShrink: 0,
      fontSize: '0.72rem', fontFamily: 'monospace',
    }
  },
    h('div', {
      style: { display: 'flex', alignItems: 'center', gap: 6, marginRight: 8 }
    },
      h('span', { style: { color: '#484f58' } }, 'FLEET'),
      h('span', {
        style: {
          color: online === total ? '#3fb950' : online > 0 ? '#e3b341' : '#f85149'
        }

    ...entries.map(m => {
      const info = MACHINE_INFO[m.name] || {};
      return h('div', {

        style: { display: 'flex', alignItems: 'center', gap: 4 }

        h('span', {

          className: clsx('status-dot', wsConnected ? 'active' : 'idle', wsConnected && 'pulse'),
          style: { width: 6, height: 6 },

        h('span', {
          style: { color: wsConnected ? '#3fb950' : '#f85149' }

// ─── Filter Bar ───────────────────────────────────────────────────────────────

function FilterBar({ sessions, tmuxSessions, fleet, filters, setFilters }) {
  // Derive unique machines from sessions + tmux + fleet
  const allMachines = useMemo(() => {
    const s = new Set();
    sessions.forEach(x => x.machine && s.add(x.machine));
    tmuxSessions.forEach(x => x.machine && s.add(x.machine));
    Object.keys(fleet || {}).forEach(m => s.add(m));
    return [...s].sort();
  }, [sessions, tmuxSessions, fleet]);

  // Machine counts (sessions only)
  const machineCounts = useMemo(() => {
    const c = {};
    sessions.forEach(s => { if (s.machine) c[s.machine] = (c[s.machine] || 0) + 1; });
    return c;
  }, [sessions]);

  const isFiltersActive = filters.machines.size > 0 || filters.statuses.size > 0 || filters.timeRange !== 'all' || filters.sortBy !== 'recent' || filters.text.trim();

  const toggleMachine = (m) => {
    setFilters(prev => {
      const next = new Set(prev.machines);
      if (next.has(m)) next.delete(m); else next.add(m);
      return { ...prev, machines: next };
    });
  };

  const toggleStatus = (s) => {
    setFilters(prev => {
      const next = new Set(prev.statuses);
      if (next.has(s)) next.delete(s); else next.add(s);
      return { ...prev, statuses: next };
    });
  };

  const resetFilters = () => setFilters({ machines: new Set(), statuses: new Set(), timeRange: 'all', sortBy: 'recent', text: '' });

  // Compute result count for sessions
  const totalSessions = sessions.length;
  const visibleCount = useMemo(() => {
    let r = sessions;
    if (filters.machines.size > 0) r = r.filter(s => filters.machines.has(s.machine));
    if (filters.statuses.size > 0) r = r.filter(s => filters.statuses.has(s.status));
    if (filters.timeRange !== 'all') {
      const cutoffs = { hour: 3600000, today: 86400000, week: 604800000, month: 2592000000 };
      const cutoff = Date.now() - cutoffs[filters.timeRange];
      r = r.filter(s => new Date(s.modified).getTime() > cutoff);
    }
    if (filters.text.trim()) {
      const q = filters.text.toLowerCase();
      r = r.filter(s =>
        (s.project_path || '').toLowerCase().includes(q) ||
        (s.summary || '').toLowerCase().includes(q) ||
        (s.machine || '').toLowerCase().includes(q) ||
        (s.cwd || '').toLowerCase().includes(q) ||
        (s.name || '').toLowerCase().includes(q) ||
        (s.slug || '').toLowerCase().includes(q)
      );
    }
    return r.length;
  }, [sessions, filters]);

  const statusDefs = [
    { key: 'working', label: 'WORKING', pillClass: 'active-working' },
    { key: 'active',  label: 'ACTIVE',  pillClass: 'active-active'  },
    { key: 'idle',    label: 'IDLE',    pillClass: 'active-idle'    },
  ];

  const timeRangeOptions = [
    { value: 'all',   label: 'All Time' },
    { value: 'hour',  label: 'Last Hour' },
    { value: 'today', label: 'Today' },
    { value: 'week',  label: 'This Week' },
    { value: 'month', label: 'This Month' },
  ];

  const sortByOptions = [
    { value: 'recent',   label: 'Most Recent' },
    { value: 'oldest',   label: 'Oldest' },
    { value: 'messages', label: 'Most Messages' },
    { value: 'size',     label: 'Largest Size' },
    { value: 'name',     label: 'Name A-Z' },
  ];

  return h('div', { className: 'filter-bar' },

    // Row 1: Machines + Status
    h('div', { className: 'filter-row' },
      h('span', { className: 'filter-label' }, 'Machines'),
      allMachines.map(m =>
        h('button', {
          key: m,
          className: `filter-pill${filters.machines.has(m) ? ' active-machine' : ''}`,
          onClick: () => toggleMachine(m),
          title: `Toggle ${m}`,
        }, `${m}${machineCounts[m] != null ? ` (${machineCounts[m]})` : ''}`)
      ),

      h('span', { className: 'filter-label', style: { marginLeft: 8 } }, 'Status'),
      statusDefs.map(({ key, label, pillClass }) =>
        h('button', {
          key,
          className: `filter-pill${filters.statuses.has(key) ? ` ${pillClass}` : ''}`,
          onClick: () => toggleStatus(key),
        }, label)
      ),
    ),

    // Row 2: Time range + Sort + Search + Reset + Count
    h('div', { className: 'filter-row' },
      h('span', { className: 'filter-label' }, 'Time'),
      h('select', {
        className: 'filter-select',
        value: filters.timeRange,
        onChange: e => setFilters(prev => ({ ...prev, timeRange: e.target.value })),
      }, timeRangeOptions.map(o => h('option', { key: o.value, value: o.value }, o.label))),

      h('span', { className: 'filter-label', style: { marginLeft: 8 } }, 'Sort'),
      h('select', {
        className: 'filter-select',
        value: filters.sortBy,
        onChange: e => setFilters(prev => ({ ...prev, sortBy: e.target.value })),
      }, sortByOptions.map(o => h('option', { key: o.value, value: o.value }, o.label))),

      h('input', {
        type: 'text',
        className: 'form-input',
        placeholder: 'Search sessions…',
        value: filters.text,
        onChange: e => setFilters(prev => ({ ...prev, text: e.target.value })),
        style: { fontSize: '0.75rem', padding: '3px 10px', maxWidth: 200, marginLeft: 8 },
      }),

      isFiltersActive && h('button', {
        className: 'filter-reset',
        onClick: resetFilters,
        title: 'Reset all filters',
      }, 'Reset'),

      h('span', { className: 'filter-count' },
        visibleCount === totalSessions
          ? `${totalSessions} sessions`
          : `Showing ${visibleCount} of ${totalSessions} sessions`
      ),
    ),
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────

const COLLAPSE_KEY = 'claude-manager-collapse-state';

function App() {
  const [sessions, setSessions]           = useState([]);
  const [tmuxSessions, setTmuxSessions]   = useState([]);
  const [fleet, setFleet]                 = useState({});
  const [health, setHealth]               = useState(null);
  const [lastScan, setLastScan]           = useState(null);
  const [filters, setFilters]             = useState({
    machines: new Set(),
    statuses: new Set(),
    timeRange: 'all',
    sortBy: 'recent',
    text: '',
  });
  const [scanning, setScanning]           = useState(false);
  const [launchingId, setLaunchingId]     = useState(null);
  const [tmuxLaunchingId, setTmuxLaunchingId] = useState(null);
  const [connectingId, setConnectingId]   = useState(null);
  const [showModal, setShowModal]         = useState(false);
  const [loading, setLoading]             = useState(true);
  const [skipPermissions, setSkipPermissions] = useState(false);
  const [pinnedIds, setPinnedIds]         = useState([]);

  // Collapse state: persisted to localStorage
  const [collapseState, setCollapseState] = useState(() => {
    try {
      const saved = localStorage.getItem(COLLAPSE_KEY);
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  });

  useEffect(() => {
    try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapseState)); } catch {}
  }, [collapseState]);

  // ── Filtered sessions ────────────────────────────────────────────────────
  const filteredSessions = useMemo(() => {
    let result = sessions;

    if (filters.machines.size > 0) {
      result = result.filter(s => filters.machines.has(s.machine));
    }

    if (filters.statuses.size > 0) {
      result = result.filter(s => filters.statuses.has(s.status));
    }

    if (filters.timeRange !== 'all') {
      const cutoffs = { hour: 3600000, today: 86400000, week: 604800000, month: 2592000000 };
      const cutoff = Date.now() - cutoffs[filters.timeRange];
      result = result.filter(s => new Date(s.modified).getTime() > cutoff);
    }

    if (filters.text.trim()) {
      const q = filters.text.toLowerCase();
      result = result.filter(s =>
        (s.project_path || '').toLowerCase().includes(q) ||
        (s.summary || '').toLowerCase().includes(q) ||
        (s.machine || '').toLowerCase().includes(q) ||
        (s.cwd || '').toLowerCase().includes(q) ||
        (s.name || '').toLowerCase().includes(q) ||
        (s.slug || '').toLowerCase().includes(q)
      );
    }

    const sorters = {
      recent:   (a, b) => new Date(b.modified) - new Date(a.modified),
      oldest:   (a, b) => new Date(a.modified) - new Date(b.modified),
      messages: (a, b) => (b.messages || 0) - (a.messages || 0),
      size:     (a, b) => (b.file_size || 0) - (a.file_size || 0),
      name:     (a, b) => (a.cwd || '').localeCompare(b.cwd || ''),
    };
    result = [...result].sort(sorters[filters.sortBy] || sorters.recent);

    return result;
  }, [sessions, filters]);

  // ── Filtered tmux sessions (machine filter only) ─────────────────────────
  const filteredTmux = useMemo(() => {
    if (filters.machines.size === 0) return tmuxSessions;
    return tmuxSessions.filter(s => filters.machines.has(s.machine));
  }, [tmuxSessions, filters.machines]);

  // ── WS message handler ───────────────────────────────────────────────────
  const handleWsMessage = useCallback((msg) => {
    if (msg.channel === 'sessions') {
      const data = msg.data;
      // data can be a flat list (update) or grouped dict (snapshot)
      if (Array.isArray(data)) {
        setSessions(data);
      } else if (data && typeof data === 'object') {
        // grouped: { machine: [{project_folder, sessions:[]}] }
        const flat = [];
        for (const [machine, projects] of Object.entries(data)) {
          for (const proj of projects) {
            for (const s of proj.sessions) {
              flat.push({ ...s, machine });
            }
          }
        }
        setSessions(flat);
      }
    } else if (msg.channel === 'fleet') {
      const data = msg.data;
      if (data && typeof data === 'object' && !Array.isArray(data)) {
        setFleet(data);
      }
    } else if (msg.channel === 'tmux') {
      if (Array.isArray(msg.data)) setTmuxSessions(msg.data);
    }
  }, []);

  const wsConnected = useWebSocket(handleWsMessage);

  // ── Initial data load ────────────────────────────────────────────────────
  useEffect(() => {
    const p1 = fetch('/health')
      .then(r => r.json())
      .then(d => { setHealth(d); setLastScan(d.last_scan); })
      .catch(() => {});

    const p2 = fetch('/api/sessions')
      .then(r => r.json())
      .then(data => {
        if (data && typeof data === 'object' && !Array.isArray(data)) {
          const flat = [];
          for (const [machine, projects] of Object.entries(data)) {
            for (const proj of projects) {
              for (const s of proj.sessions) {
                flat.push({ ...s, machine });
              }
            }
          }
          setSessions(flat);
        }
      })
      .catch(() => {});

    const p3 = fetch('/api/fleet')
      .then(r => r.json())
      .then(d => { if (d && typeof d === 'object') setFleet(d); })
      .catch(() => {});

    const p4 = fetch('/api/tmux')
      .then(r => r.json())
      .then(d => { if (Array.isArray(d)) setTmuxSessions(d); })
      .catch(() => {});

    const p5 = fetch('/api/preferences')
      .then(r => r.json())
      .then(d => {
        if (d && typeof d.skip_permissions === 'boolean') setSkipPermissions(d.skip_permissions);
        if (d && Array.isArray(d.pinned_sessions)) setPinnedIds(d.pinned_sessions);
      })
      .catch(() => {});

    Promise.all([p1, p2, p3, p4, p5]).finally(() => setLoading(false));
  }, []);

  // ── Scan ─────────────────────────────────────────────────────────────────
  const handleScan = useCallback(async () => {
    setScanning(true);
    try {
      const res = await fetch('/api/sessions/scan', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        toast(`Scan complete · ${(data.sessions || []).length} sessions`, 'success');
        setLastScan(data.last_scan);
        if (Array.isArray(data.sessions)) {
          setSessions(data.sessions);
        }
      } else {
        toast(data.error || 'Scan failed', 'error');
      }
    } catch {
      toast('Network error during scan', 'error');
    } finally {
      setScanning(false);
    }
  }, []);

  // ── Skip permissions ──────────────────────────────────────────────────────
  const handleSkipPermissionsChange = useCallback(async (val) => {
    setSkipPermissions(val);
    try {
      await fetch('/api/preferences', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skip_permissions: val }),
      });
    } catch {
      // non-fatal — preference not saved server-side, still works for this session
    }
  }, []);

  // ── Pin / Unpin session ───────────────────────────────────────────────────
  const handlePin = useCallback(async (sessionId) => {
    setPinnedIds(prev => prev.includes(sessionId) ? prev : [...prev, sessionId]);
    try {
      await fetch('/api/sessions/pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
    } catch {
      // non-fatal
    }
  }, []);

  const handleUnpin = useCallback(async (sessionId) => {
    setPinnedIds(prev => prev.filter(id => id !== sessionId));
    try {
      await fetch('/api/sessions/unpin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
    } catch {
      // non-fatal
    }
  }, []);

  // ── Launch session ────────────────────────────────────────────────────────
  const handleLaunch = useCallback(async (session) => {
    setLaunchingId(session.session_id);
    try {
      const res = await fetch('/api/sessions/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          machine: session.machine,
          session_id: session.session_id,
          cwd: session.cwd || session.project_path,
          skip_permissions: skipPermissions,
        }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Launched session in terminal`, 'success');
      } else {
        toast(data.error || 'Launch not yet implemented', 'info');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setLaunchingId(null);
    }
  }, [skipPermissions]);

  // ── Tmux launch (create tmux session + launch claude in it) ──────────────
  const handleTmuxLaunch = useCallback(async (session) => {
    setTmuxLaunchingId(session.session_id);
    try {
      const res = await fetch('/api/sessions/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          machine: session.machine,
          session_id: session.session_id,
          cwd: session.cwd || session.project_path,
          skip_permissions: skipPermissions,
          mode: 'tmux',
        }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Launched in tmux on ${session.machine}`, 'success');
      } else {
        toast(data.error || 'Tmux launch not yet implemented', 'info');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setTmuxLaunchingId(null);
    }
  }, [skipPermissions]);

  // ── Collapse / Expand All ────────────────────────────────────────────────
  const handleExpandAll = useCallback(() => {
    // Collect all known machine and project keys from current data
    const newState = {};
    const machineNames = [...new Set(sessions.map(s => s.machine).filter(Boolean))];
    const tmuxMachines = [...new Set(tmuxSessions.map(s => s.machine || 'unknown'))];
    for (const m of machineNames) { newState[m] = true; }
    for (const m of tmuxMachines) { newState[`tmux:${m}`] = true; }
    // Project keys
    for (const s of sessions) {
      const path = s.cwd || s.project_path || '';
      if (path && s.machine) { newState[`project:${s.machine}:${path}`] = true; }
    }
    setCollapseState(newState);
  }, [sessions, tmuxSessions]);

  const handleCollapseAll = useCallback(() => {
    const newState = {};
    const machineNames = [...new Set(sessions.map(s => s.machine).filter(Boolean))];
    const tmuxMachines = [...new Set(tmuxSessions.map(s => s.machine || 'unknown'))];
    for (const m of machineNames) { newState[m] = false; }
    for (const m of tmuxMachines) { newState[`tmux:${m}`] = false; }
    for (const s of sessions) {
      const path = s.cwd || s.project_path || '';
      if (path && s.machine) { newState[`project:${s.machine}:${path}`] = false; }
    }
    setCollapseState(newState);
  }, [sessions, tmuxSessions]);

  // ── Tmux connect ──────────────────────────────────────────────────────────
  const handleConnectTmux = useCallback(async (session) => {
    const key = `${session.machine}-${session.session_name || session.name}`;
    setConnectingId(key);
    try {
      const res = await fetch('/api/tmux/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: session.machine, session_name: session.session_name || session.name }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Connected to ${session.session_name || session.name}`, 'success');
      } else {
        toast(data.error || 'Connect not yet implemented', 'info');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setConnectingId(null);
    }
  }, []);

  // ── Kill tmux session ────────────────────────────────────────────────────
  const [killingId, setKillingId] = useState(null);
  const handleKillTmux = useCallback(async (session) => {
    const name = session.session_name || session.name;
    const key = `${session.machine}-${name}`;
    if (!confirm(`Kill tmux session "${name}" on ${session.machine}?`)) return;
    setKillingId(key);
    try {
      const res = await fetch('/api/tmux/kill', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: session.machine, name }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Killed "${name}" on ${session.machine}`, 'success');
        // Refresh tmux list
        fetch('/api/tmux').then(r => r.json()).then(d => { if (Array.isArray(d)) setTmuxSessions(d); }).catch(() => {});
      } else {
        toast(data.error || 'Kill failed', 'error');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setKillingId(null);
    }
  }, []);

  // ── Remote attach (open terminal on the remote machine's display) ────────
  const [remoteAttachingId, setRemoteAttachingId] = useState(null);
  const handleRemoteAttach = useCallback(async (session) => {
    const name = session.session_name || session.name;
    const key = `${session.machine}-${name}`;
    setRemoteAttachingId(key);
    try {
      const res = await fetch('/api/tmux/connect-remote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: session.machine, session_name: name }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Opened terminal on ${session.machine}`, 'success');
      } else {
        toast(data.error || 'Remote attach failed', 'error');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setRemoteAttachingId(null);
    }
  }, []);

  // ── Render ────────────────────────────────────────────────────────────────
  return h(Fragment, null,
    h('div', {
      style: {
        height: '100vh', display: 'flex', flexDirection: 'column',
        overflow: 'hidden',
      }
    },

      // Header
      h(Header, {
        health, sessions, tmuxSessions, fleet,
        onScan: handleScan,
        scanning,
        skipPermissions,
        onSkipPermissionsChange: handleSkipPermissionsChange,
      }),

      // Filter bar
      h(FilterBar, {
        sessions, tmuxSessions, fleet,
        filters, setFilters,
      }),

      // Main panels
      h('div', {
        className: 'main-panels',
        style: {
          display: 'flex', flex: 1, minHeight: 0,
          gap: 0, overflow: 'hidden',
        }
      },

        // Sessions panel
        h('div', {
          className: 'panel-sessions',
          style: {
            flex: '1 1 0', minWidth: 280,
            borderRight: '1px solid #30363d',
            display: 'flex', flexDirection: 'column',
            overflow: 'hidden',
          }
        },
          h('div', {
            style: {
              padding: '16px 16px 8px',
              borderBottom: '1px solid #21262d',
              flexShrink: 0,
              display: 'flex', alignItems: 'center', gap: 8,
            }
          },
            h('span', {
              style: {
                fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
                textTransform: 'uppercase', color: '#484f58', flex: 1,
              }
            }, 'Sessions'),
            h('button', {
              className: 'btn',
              onClick: handleExpandAll,
              title: 'Expand all sections',
              style: {
                background: 'none', border: '1px solid #30363d', borderRadius: 4,
                color: '#8b949e', padding: '2px 8px', fontSize: '0.65rem',
                fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap',
              }
            }, '▼ Expand'),
            h('button', {
              className: 'btn',
              onClick: handleCollapseAll,
              title: 'Collapse all sections',
              style: {
                background: 'none', border: '1px solid #30363d', borderRadius: 4,
                color: '#8b949e', padding: '2px 8px', fontSize: '0.65rem',
                fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap',
              }
            }, '▲ Collapse'),
          ),
          h('div', {
            style: { flex: 1, overflowY: 'auto', padding: '12px 16px' }
          },
            loading
              ? h('div', {
                  style: {
                    display: 'flex', flexDirection: 'column', alignItems: 'center',
                    justifyContent: 'center', height: '200px', gap: 12, color: '#484f58',
                  }
                },
                  h('span', {
                    style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '2rem' }
                  }, '↻'),
                  h('span', { style: { fontSize: '0.875rem' } }, 'Scanning fleet...'),
                  h('span', { style: { fontSize: '0.78rem', textAlign: 'center' } }, 'Discovering machines\nand sessions'),
                )
              : h(SessionsPanel, {
                  sessions: filteredSessions,
                  onLaunch: handleLaunch,
                  onTmuxLaunch: handleTmuxLaunch,
                  launchingId,
                  tmuxLaunchingId,
                  skipPermissions,
                  scanning,
                  collapseState,
                  setCollapseState,
                  pinnedIds,
                  onPin: handlePin,
                  onUnpin: handleUnpin,
                }),
          ),
        ),

        // Tmux panel
        h('div', {
          className: 'panel-tmux',
          style: {
            width: 320, flexShrink: 0,
            display: 'flex', flexDirection: 'column',
            overflow: 'hidden',
          }
        },
          h('div', {
            style: {
              padding: '16px 16px 8px',
              borderBottom: '1px solid #21262d',
              flexShrink: 0,
            }
          },
            h('span', {
              style: {
                fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
                textTransform: 'uppercase', color: '#484f58',
              }
            }, 'Tmux'),
          ),
          h('div', {
            style: { flex: 1, overflowY: 'auto', padding: '12px 16px', display: 'flex', flexDirection: 'column' }
          },
            loading
              ? h('div', {
                  style: {
                    display: 'flex', flexDirection: 'column', alignItems: 'center',
                    justifyContent: 'center', height: '160px', gap: 12, color: '#484f58',
                  }
                },
                  h('span', {
                    style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '2rem' }
                  }, '↻'),
                  h('span', { style: { fontSize: '0.875rem' } }, 'Scanning fleet...'),
                )
              : h(TmuxPanel, {
                  tmuxSessions: filteredTmux,
                  fleet,
                  onConnectTmux: handleConnectTmux,
                  connectingId,
                  onKillTmux: handleKillTmux,
                  killingId,
                  onRemoteAttach: handleRemoteAttach,
                  remoteAttachingId,
                  onNewSession: () => setShowModal(true),
                  scanning,
                  collapseState,
                  setCollapseState,
                }),
          ),
        ),
      ),

      // Fleet bar
      h(FleetBar, { fleet, lastScan, wsConnected }),
    ),

    // Modal
    showModal && h(NewTmuxModal, {
      fleet,
      onClose: () => setShowModal(false),
      onCreated: () => {
        fetch('/api/tmux')
          .then(r => r.json())
          .then(d => { if (Array.isArray(d)) setTmuxSessions(d); })
          .catch(() => {});
      },
    }),

    // Toaster
    h(Toaster, null),
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root = createRoot(document.getElementById('root'));
root.render(h(App, null));
</script>
</body>
</html>
