<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>claude-manager</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface:       '#0d1117',
            card:          '#161b22',
            'card-hover':  '#1c2128',
            border:        '#30363d',
            accent:        '#58a6ff',
            'accent-dim':  '#1f3a5f',
            success:       '#3fb950',
            'success-dim': '#1a3a2a',
            danger:        '#f85149',
            'danger-dim':  '#3a1a1a',
            warning:       '#e3b341',
            'text-primary':'#e6edf3',
            'text-muted':  '#8b949e',
            'text-dim':    '#484f58',
          },
          fontFamily: {
            mono: ['"SF Mono"', '"Fira Code"', 'Consolas', 'monospace'],
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', 'Arial', 'sans-serif'],
          },
          animation: {
            'pulse-dot': 'pulse-dot 1.4s ease-in-out infinite',
            'fade-in':   'fade-in 0.2s ease-out',
            'spin-slow':  'spin 1s linear infinite',
          },
          keyframes: {
            'pulse-dot': {
              '0%, 100%': { opacity: '1' },
              '50%':      { opacity: '0.2' },
            },
            'fade-in': {
              from: { opacity: '0', transform: 'translateY(4px)' },
              to:   { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    .fade-in { animation: fade-in 0.2s ease-out; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pulse-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .card-hover:hover { background: #1c2128; border-color: #444c56; }
    .btn { transition: all 0.15s ease; cursor: pointer; }
    .btn:active { transform: scale(0.97); }

    .machine-section { margin-bottom: 12px; }
    .machine-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; cursor: pointer; border-radius: 6px;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: #8b949e;
      transition: background 0.15s;
    }
    .machine-header:hover { background: #161b22; }

    .session-card, .tmux-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 7px 16px; margin-bottom: 5px;
      transition: background 0.15s, border-color 0.15s;
      animation: fade-in 0.2s ease-out;
    }
    .session-card:hover, .tmux-card:hover {
      background: #1c2128; border-color: #444c56;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      display: inline-block;
    }
    .status-dot.working { background: #e3b341; }
    .status-dot.active  { background: #3fb950; }
    .status-dot.idle    { background: #484f58; }
    .status-dot.pulse   { animation: pulse-dot 1.4s ease-in-out infinite; }

    .badge {
      font-size: 0.65rem; font-family: "SF Mono", "Fira Code", Consolas, monospace;
      padding: 2px 8px; border-radius: 20px; font-weight: 600;
      letter-spacing: 0.04em;
    }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(1, 4, 9, 0.85);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      animation: fade-in 0.15s ease-out;
    }

    .modal-box {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; padding: 28px; min-width: 420px; max-width: 520px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .form-input {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 8px 12px; color: #e6edf3;
      font-size: 0.875rem; outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: #58a6ff; }
    .form-input::placeholder { color: #484f58; }

    select.form-input option { background: #161b22; color: #e6edf3; }

    .panel-scroll { overflow-y: auto; flex: 1; min-height: 0; padding: 0 4px 0 0; }

    .toaster {
      position: fixed; bottom: 24px; right: 24px; z-index: 2000;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 12px 16px;
      font-size: 0.85rem; min-width: 240px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: fade-in 0.2s ease-out;
    }
    .toast.success { border-left: 3px solid #3fb950; }
    .toast.error   { border-left: 3px solid #f85149; }
    .toast.info    { border-left: 3px solid #58a6ff; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes session-flash {
      0%   { box-shadow: 0 0 0 2px rgba(126, 231, 135, 0.9); background: rgba(46, 160, 67, 0.18); }
      100% { box-shadow: 0 0 0 0 rgba(126, 231, 135, 0); background: transparent; }
    }
    .session-flash { animation: session-flash 1.5s ease-out; border-radius: 6px; }

    @keyframes indeterminate {
      0%   { margin-left: 0; }
      50%  { margin-left: 70%; }
      100% { margin-left: 0; }
    }

    @media (max-width: 768px) {
      .main-panels { flex-direction: column !important; }
      .panel-sessions, .panel-tmux { width: 100% !important; min-width: 0 !important; }
    }

    /* Session card action buttons — responsive row */
    .session-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .session-actions .btn {
      flex: 0 1 auto;
    }
    @media (max-width: 600px) {
      .session-actions { flex-direction: column; align-items: stretch; }
      .session-actions .btn { width: 100%; justify-content: center; }
      .session-card-compact { flex-wrap: wrap !important; row-gap: 6px; }
      /* Collapse the flex-grow spacer so action buttons wrap onto a new line
         flush-left under the metadata row instead of being pushed off-screen. */
      .compact-spacer { flex: 0 0 100% !important; height: 0; margin: 0; padding: 0; }
      /* Let the action buttons size to their content and wrap naturally as a
         right-aligned-ish group that stacks once horizontal room runs out. */
      .compact-action-btn { flex: 0 0 auto; min-width: 0; }
    }

    /* Split-button: [primary action] [▾ picker caret] */
    .split-btn-group {
      display: inline-flex;
      align-items: stretch;
      border-radius: 4px;
      overflow: visible;   /* allow dropdown menu to escape */
      position: relative;
    }
    .split-btn-group .split-btn-primary { border-top-right-radius: 0; border-bottom-right-radius: 0; margin-right: 0; }
    .split-btn-group .split-btn-caret {
      border-top-left-radius: 0; border-bottom-left-radius: 0;
      border-left: 1px solid rgba(255,255,255,0.08);
      padding-left: 2px; padding-right: 2px;
      min-width: 18px;
    }
    .split-btn-caret-wrap { position: relative; display: inline-flex; }
    .terminal-picker-menu {
      position: absolute;
      top: calc(100% + 2px);
      right: 0;
      min-width: 180px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 1000;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .terminal-picker-item {
      display: flex; align-items: center;
      padding: 6px 10px;
      background: transparent; color: #e6edf3;
      border: none;
      text-align: left;
      font-size: 0.72rem;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      width: 100%;
    }
    .terminal-picker-item:hover { background: #21262d; }
    .terminal-picker-item.terminal-picker-muted { color: #8b949e; cursor: default; }
    .terminal-picker-item.terminal-picker-muted:hover { background: transparent; }

    /* Filter bar */
    .filter-bar {
      background: #0d1117;
      border-bottom: 1px solid #30363d;
      padding: 8px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      position: sticky;
      top: 57px;
      z-index: 90;
    }
    .filter-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #484f58;
      flex-shrink: 0;
      min-width: 58px;
    }
    .filter-pill {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #6e7681;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .filter-pill:hover { border-color: #444c56; color: #8b949e; }
    .filter-pill.active-machine  { background: #1f3a5f; color: #58a6ff; border-color: #2d4f7a; }
    .filter-pill.active-working  { background: #3a2a0a; color: #e3b341; border-color: #5a4a1a; }
    .filter-pill.active-active   { background: #1a3a2a; color: #3fb950; border-color: #2a5a3a; }
    .filter-pill.active-idle     { background: #21262d; color: #8b949e; border-color: #444c56; }
    .filter-pill.active-archived { background: #2a1a3a; color: #a371f7; border-color: #4a2a6a; }

    /* Compact collapsible session cards */
    .session-card-compact {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
      transition: background 0.1s; min-width: 0;
    }
    .session-card-compact:hover { background: #1c2128; }
    .session-card-expanded {
      padding: 10px 10px 12px; border-top: 1px solid #21262d;
      animation: fade-in 0.15s ease-out;
    }
    .session-card-archived { opacity: 0.6; }
    .compact-btn {
      background: none; border: none; cursor: pointer;
      padding: 2px 4px; border-radius: 4px; line-height: 1;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    .compact-btn:hover { opacity: 1 !important; }
    .filter-select {
      font-size: 0.72rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      padding: 3px 8px;
      cursor: pointer;
      outline: none;
    }
    .filter-select:focus { border-color: #58a6ff; }
    .filter-select option { background: #161b22; color: #e6edf3; }
    .filter-reset {
      font-size: 0.68rem;
      color: #58a6ff;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 4px;
      text-decoration: underline;
      opacity: 0.8;
    }
    .filter-reset:hover { opacity: 1; }
    .filter-count {
      font-size: 0.68rem;
      color: #484f58;
      margin-left: auto;
      white-space: nowrap;
    }

    /* Compact action buttons on collapsed cards */
    .compact-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #8b949e;
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1;
    }
    .compact-action-btn:hover {
      background: #30363d;
      color: #e6edf3;
    }
    .compact-action-btn.btn-launch {
      border-color: #1f3a5f;
      color: #58a6ff;
    }
    .compact-action-btn.btn-launch:hover {
      background: #1f3a5f;
      color: #93c5fd;
    }
    .compact-action-btn.btn-tmux {
      border-color: #2a5a3a;
      color: #3fb950;
    }
    .compact-action-btn.btn-tmux:hover {
      background: #1a3a2a;
      color: #6ee7a0;
    }
    .compact-action-btn.btn-pin-active {
      border-color: #5a4a1a;
      color: #e3b341;
      background: #3a2a0a;
    }
    .compact-action-btn.btn-archive-active {
      border-color: #4a2a6a;
      color: #a371f7;
      background: #2a1a3a;
    }
    .compact-action-btn.btn-icon-only {
      padding: 2px 5px;
    }
    .compact-action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .card-meta-links {
      display: flex; align-items: center; gap: 8px;
      margin-top: 2px; flex-wrap: nowrap; overflow: hidden;
    }
    .card-meta-link {
      font-size: 0.65rem; color: #6e7681; text-decoration: none;
      cursor: pointer; white-space: nowrap; background: none; border: none;
      padding: 0; font-family: inherit; line-height: 1.2;
      transition: color 0.12s;
    }
    .card-meta-link:hover { color: #adbac7; }
    .card-meta-link-sep { font-size: 0.6rem; color: #30363d; flex-shrink: 0; }
    .readme-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(1, 4, 9, 0.88);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1200;
      animation: fade-in 0.15s ease-out;
    }
    .readme-modal-box {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; padding: 0;
      width: min(860px, 92vw); max-height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }
    .readme-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; border-bottom: 1px solid #21262d; flex-shrink: 0;
    }
    .readme-modal-title {
      font-size: 0.9rem; font-weight: 600; color: #e6edf3;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .readme-modal-body {
      overflow-y: auto; padding: 20px 24px; flex: 1; min-height: 0;
    }
    .readme-modal-body .readme-content {
      font-size: 0.82rem; color: #c9d1d9; line-height: 1.6;
    }
    .readme-modal-body .readme-content h1,
    .readme-modal-body .readme-content h2,
    .readme-modal-body .readme-content h3 {
      color: #e6edf3; margin: 1em 0 0.4em; font-weight: 600;
    }
    .readme-modal-body .readme-content h1 { font-size: 1.2em; }
    .readme-modal-body .readme-content h2 { font-size: 1.05em; }
    .readme-modal-body .readme-content h3 { font-size: 0.95em; }
    .readme-modal-body .readme-content code {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 4px; padding: 1px 5px; font-size: 0.85em;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
    }
    .readme-modal-body .readme-content pre {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 12px 14px; overflow-x: auto;
    }
    .readme-modal-body .readme-content pre code {
      background: none; border: none; padding: 0;
    }
    .readme-modal-body .readme-content a { color: #58a6ff; }
    .readme-modal-body .readme-content blockquote {
      border-left: 3px solid #30363d; margin: 0; padding-left: 12px;
      color: #8b949e;
    }
    .readme-modal-body .readme-content table {
      border-collapse: collapse; width: 100%; margin: 0.8em 0;
    }
    .readme-modal-body .readme-content th,
    .readme-modal-body .readme-content td {
      border: 1px solid #30363d; padding: 5px 10px; text-align: left;
    }
    .readme-modal-body .readme-content th { background: #21262d; }
    .readme-modal-truncated {
      font-size: 0.7rem; color: #e3b341; padding: 6px 24px 10px;
      flex-shrink: 0; border-top: 1px solid #21262d;
    }
  </style>
</head>

<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react":            "https://esm.sh/react@19",
    "react-dom/client": "https://esm.sh/react-dom@19/client",
    "react/jsx-runtime":"https://esm.sh/react@19/jsx-runtime"

<script type="module">
import { createElement as h, useState, useEffect, useRef, useCallback, useMemo, Fragment, memo } from 'react';
import { createRoot } from 'react-dom/client';

// ─── Utility functions ────────────────────────────────────────────────────────

// ANSI SGR color code → HTML span converter
const ANSI_COLORS_16 = {
  30: '#484f58', 31: '#f85149', 32: '#56d364', 33: '#e3b341',
  34: '#58a6ff', 35: '#bc8cff', 36: '#76e3ea', 37: '#c9d1d9',
  90: '#6e7681', 91: '#ff7b72', 92: '#7ee787', 93: '#f2cc60',
  94: '#79c0ff', 95: '#d2a8ff', 96: '#a5d6ff', 97: '#f0f6fc',
};
const ANSI_COLORS_16_BG = {
  40: '#484f58', 41: '#5a1e1e', 42: '#1e3a1e', 43: '#3a3520',
  44: '#1e2d4a', 45: '#2d1e4a', 46: '#1e3a3a', 47: '#3b4048',
  100: '#6e7681', 101: '#7a2a2a', 102: '#2a5a2a', 103: '#5a5030',
  104: '#2a3d5a', 105: '#4a2d6a', 106: '#2a5a5a', 107: '#484f58',
};

function ansiToHtml(text) {
  if (!text) return '';
  const parts = [];
  let i = 0;
  let fg = null, bg = null, bold = false, dim = false, italic = false, underline = false;

  function styleStr() {
    const s = [];
    if (fg) s.push('color:' + fg);
    if (bg) s.push('background:' + bg);
    if (bold) s.push('font-weight:700');
    if (dim) s.push('opacity:0.6');
    if (italic) s.push('font-style:italic');
    if (underline) s.push('text-decoration:underline');
    return s.join(';');
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  while (i < text.length) {
    const esc = text.indexOf('\x1b[', i);
    if (esc === -1) {
      parts.push(escapeHtml(text.slice(i)));
      break;
    }
    if (esc > i) parts.push(escapeHtml(text.slice(i, esc)));

    const end = text.indexOf('m', esc + 2);
    if (end === -1) { parts.push(escapeHtml(text.slice(esc))); break; }

    const codes = text.slice(esc + 2, end).split(';').map(Number);
    let ci = 0;
    while (ci < codes.length) {
      const c = codes[ci];
      if (c === 0) { fg = null; bg = null; bold = false; dim = false; italic = false; underline = false; }
      else if (c === 1) bold = true;
      else if (c === 2) dim = true;
      else if (c === 3) italic = true;
      else if (c === 4) underline = true;
      else if (c === 22) { bold = false; dim = false; }
      else if (c === 23) italic = false;
      else if (c === 24) underline = false;
      else if (c === 39) fg = null;
      else if (c === 49) bg = null;
      else if (c >= 30 && c <= 37) fg = ANSI_COLORS_16[bold ? c + 60 : c] || ANSI_COLORS_16[c];
      else if (c >= 90 && c <= 97) fg = ANSI_COLORS_16[c];
      else if (c >= 40 && c <= 47) bg = ANSI_COLORS_16_BG[c];
      else if (c >= 100 && c <= 107) bg = ANSI_COLORS_16_BG[c];
      else if (c === 38 && codes[ci + 1] === 5) { // 256-color fg
        const idx = codes[ci + 2] || 0;
        fg = ansi256ToHex(idx); ci += 2;
      } else if (c === 48 && codes[ci + 1] === 5) { // 256-color bg
        const idx = codes[ci + 2] || 0;
        bg = ansi256ToHex(idx); ci += 2;
      }
      ci++;
    }

    const st = styleStr();
    if (st) parts.push('</span><span style="' + st + '">');
    else parts.push('</span><span>');

    i = end + 1;
  }

  return '<span>' + parts.join('') + '</span>';
}

function ansi256ToHex(n) {
  if (n < 16) {
    const basic = [
      '#000000','#aa0000','#00aa00','#aa5500','#0000aa','#aa00aa','#00aaaa','#aaaaaa',
      '#555555','#ff5555','#55ff55','#ffff55','#5555ff','#ff55ff','#55ffff','#ffffff',
    ];
    return basic[n] || '#c9d1d9';
  }
  if (n < 232) {
    const i = n - 16;
    const r = Math.floor(i / 36) * 51;
    const g = Math.floor((i % 36) / 6) * 51;
    const b = (i % 6) * 51;
    return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
  }
  const gray = (n - 232) * 10 + 8;
  return '#' + gray.toString(16).padStart(2,'0').repeat(3);
}

function relativeTime(isoStr) {
  if (!isoStr) return '—';
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 5)   return 'just now';
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function shortenPath(p) {
  if (!p) return '';
  const parts = p.replace(/\\/g, '/').split('/').filter(Boolean);
  if (parts.length <= 2) return parts.join('/');
  return parts.slice(-2).join('/');
}

function groupBy(arr, key) {
  const out = {};
  for (const item of arr) {
    const k = typeof key === 'function' ? key(item) : item[key];
    if (!out[k]) out[k] = [];
    out[k].push(item);
  }
  return out;
}

function clsx(...args) {
  return args.filter(Boolean).join(' ');
}

  'ubuntu-desktop':  { ip: '192.168.7.13',  os: 'Linux',   osIcon: 'computer' },

// LOCAL_MACHINE is fetched from the server's /health endpoint.
// The server runs detect_local_machine() (IP-based) at startup — authoritative.
let LOCAL_MACHINE = null;

// Eager fetch on page load — updates before first render in most cases.
fetch('/health').then(r => r.json()).then(d => {
  if (d.local_machine) LOCAL_MACHINE = d.local_machine;
}).catch(() => {});

function isLocalMachine(machine) {
  return machine === LOCAL_MACHINE;
}

function getMachineOS(machine) {
  return MACHINE_INFO[machine]?.os || 'unknown';

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(1) + ' GB';
}

function formatTokens(n) {
  if (!n) return '';
  if (n < 1000) return n + ' tok';
  if (n < 1000000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k tok';
  return (n / 1000000).toFixed(2).replace(/\.00$/, '') + 'M tok';
}

// ─── Machine color (stable hue derived from machine name) ────────────────────

function machineColor(machine) {
  // Hash machine name to a hue in [0, 360)
  let h = 0;
  for (let i = 0; i < machine.length; i++) {
    h = (h * 31 + machine.charCodeAt(i)) & 0xffff;
  }
  const hue = (h % 360 + 360) % 360;
  return {
    color:  `hsl(${hue}, 60%, 70%)`,
    bg:     `hsl(${hue}, 40%, 14%)`,
    border: `hsl(${hue}, 40%, 24%)`,
  };
}

async function apiFetch(url, opts = {}) {

// ─── WebSocket hook ───────────────────────────────────────────────────────────

function useWebSocket(onMessage, onReconnect) {
  const wsRef = useRef(null);
  const reconnectTimer = useRef(null);
  const retryCount = useRef(0);
  const [connected, setConnected] = useState(false);
  const onReconnectRef = useRef(onReconnect);
  onReconnectRef.current = onReconnect;

  const connect = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState < 2) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    wsRef.current = ws;

    ws.onopen = () => {
      setConnected(true);
      retryCount.current = 0;
      const token = localStorage.getItem('claude-manager-auth-token');
      if (token) {
        ws.send(JSON.stringify({ type: 'auth', token }));
      }
      ['sessions', 'tmux', 'fleet'].forEach(ch =>
        ws.send(JSON.stringify({ type: 'subscribe', channel: ch }))
      );
      // Re-subscribe to active pane streams after reconnect
      if (onReconnectRef.current) onReconnectRef.current(ws);
    };

    ws.onmessage = evt => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'auth_error' || msg.type === 'auth_required') {
          toast('WebSocket auth failed — check Settings', 'error');
          ws.close();
          return;
        }
        onMessage(msg);
      } catch {}
    };

    ws.onclose = () => {
      setConnected(false);
      const delay = Math.min(1000 * Math.pow(2, retryCount.current), 30000);
      retryCount.current++;
      reconnectTimer.current = setTimeout(connect, delay);
    };

    ws.onerror = () => { ws.close(); };
  }, [onMessage]);

  useEffect(() => {
    connect();
    return () => {
      clearTimeout(reconnectTimer.current);
      wsRef.current?.close();
    };
  }, [connect]);

  return { connected, wsRef };
}

// ─── Git remote → owner/repo normalisation (JS mirror of project_identity.py) ─

function normalizeGitRemote(url) {
  if (!url) return '';
  url = url.trim();
  // SSH: git@github.com:owner/repo.git
  const sshM = url.match(/^git@([^:]+):([^/]+)\/([^/]+?)(?:\.git)?$/);
  if (sshM) return `${sshM[2]}/${sshM[3]}`;
  // HTTPS: https://github.com/owner/repo.git
  const httpsM = url.match(/^https?:\/\/[^/]+\/([^/]+)\/([^/?#]+?)(?:\.git)?(?:[/?#].*)?$/);
  if (httpsM) return `${httpsM[1]}/${httpsM[2]}`;
  // Fallback: last two path segments
  const cleaned = url.replace(/^[a-zA-Z][a-zA-Z0-9+\-.]*:\/\//, '')
                     .replace(/^[^@]+@/, '')
                     .replace(/\.git$/, '')
                     .replace(/\\/g, '/').replace(/\/$/, '');
  const parts = cleaned.replace(':', '/').split('/').filter(Boolean);
  if (parts.length >= 2) return `${parts[parts.length - 2]}/${parts[parts.length - 1]}`;
  if (parts.length === 1) return parts[0];
  return '';
}

function gitRemoteToUrl(raw) {
  if (!raw) return '';
  raw = raw.trim();
  // Already HTTPS
  if (raw.startsWith('http://') || raw.startsWith('https://')) return raw.replace(/\.git$/, '');
  // SSH: git@github.com:owner/repo.git → https://github.com/owner/repo
  const sshM = raw.match(/^git@([^:]+):([^/]+)\/([^/]+?)(?:\.git)?$/);
  if (sshM) return `https://${sshM[1]}/${sshM[2]}/${sshM[3]}`;
  return '';
}

// ─── README modal (lazy CDN load of marked + DOMPurify) ──────────────────────

let _markedLoaded = false;
let _purifyLoaded = false;
let _markedLoadPromise = null;
let _purifyLoadPromise = null;

function _loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function ensureMarkdown() {
  if (!_markedLoadPromise) {
    _markedLoadPromise = _loadScript('https://cdn.jsdelivr.net/npm/marked/marked.min.js');
  }
  await _markedLoadPromise;
  if (!_purifyLoadPromise) {
    _purifyLoadPromise = _loadScript('https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js');
  }
  await _purifyLoadPromise;
}

// Cache: key = `${machine}::${path}` → {content, truncated}
const _readmeCache = {};

function ReadmeModal({ machine, readmePath, repoLabel, onClose }) {
  const [state, setState] = useState({ loading: true, html: '', truncated: false, error: '' });

  useEffect(() => {
    let cancelled = false;
    const cacheKey = `${machine}::${readmePath}`;
    async function load() {
      if (_readmeCache[cacheKey]) {
        const cached = _readmeCache[cacheKey];
        if (!cancelled) setState({ loading: false, html: cached.html, truncated: cached.truncated, error: '' });
        return;
      }
      try {
        await ensureMarkdown();
        const params = new URLSearchParams({ machine, path: readmePath });
        const resp = await apiFetch(`/api/sessions/readme?${params}`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || 'Failed to load README');
        const rawHtml = window.marked.parse(data.content || '');
        const cleanHtml = window.DOMPurify.sanitize(rawHtml);
        const entry = { html: cleanHtml, truncated: !!data.truncated };
        _readmeCache[cacheKey] = entry;
        if (!cancelled) setState({ loading: false, html: cleanHtml, truncated: entry.truncated, error: '' });
      } catch (err) {
        if (!cancelled) setState({ loading: false, html: '', truncated: false, error: err.message || String(err) });
      }
    }
    load();
    return () => { cancelled = true; };
  }, [machine, readmePath]);

  // Close on ESC
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [onClose]);

  const lastName = readmePath.replace(/\\/g, '/').split('/').filter(Boolean).pop() || 'README';
  const title = `${lastName} · ${repoLabel || lastName}`;

  return h('div', {
    className: 'readme-modal-overlay',
    onClick: (e) => { if (e.target === e.currentTarget) onClose(); },
  },
    h('div', { className: 'readme-modal-box', onClick: e => e.stopPropagation() },
      h('div', { className: 'readme-modal-header' },
        h('span', { className: 'readme-modal-title', title }, title),
        h('button', {
          className: 'compact-action-btn btn-icon-only',
          onClick: onClose,
          title: 'Close (Esc)',
          style: { fontSize: '0.75rem', marginLeft: 12, flexShrink: 0 },
        }, h('span', { className: 'material-icons-round', style: { fontSize: '16px' } }, 'close')),
      ),
      h('div', { className: 'readme-modal-body' },
        state.loading && h('div', { style: { color: '#8b949e', fontSize: '0.82rem' } }, 'Loading…'),
        state.error && h('div', { style: { color: '#f85149', fontSize: '0.82rem' } }, state.error),
        !state.loading && !state.error && h('div', {
          className: 'readme-content',
          dangerouslySetInnerHTML: { __html: state.html },
        }),
      ),
      state.truncated && h('div', { className: 'readme-modal-truncated' }, 'Truncated at 256 KiB'),
    ),
  );
}

// ─── Terminal picker (split-button dropdown) ──────────────────────────────────
// Module-level cache: machine → Promise<terminals[]>. Multiple cards on the
// same machine share one /api/machines/:m/terminals round-trip. TTL is
// handled server-side (5 min) — re-fetch on demand only when the user reopens
// the dropdown after the page has been up for a while.
const _terminalCache = new Map();
function fetchMachineTerminals(machine) {
  // LOCAL_MACHINE is populated from /health once per page load but the first
  // render may still see a null prop — avoid a nonsense /api/machines/null
  // request that pollutes the cache and server logs.
  if (!machine) return Promise.resolve([]);
  if (_terminalCache.has(machine)) return _terminalCache.get(machine);
  const p = apiFetch(`/api/machines/${encodeURIComponent(machine)}/terminals`)
    .then(r => r.json())
    .then(d => (d && d.ok && Array.isArray(d.terminals)) ? d.terminals : [])
    .catch(() => []);
  _terminalCache.set(machine, p);
  return p;
}

function TerminalPicker({ machine, variant, disabled, onPick }) {
  const [open, setOpen] = useState(false);
  const [terminals, setTerminals] = useState(null);
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    if (terminals === null) {
      fetchMachineTerminals(machine).then(setTerminals);
    }
    const onDocClick = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open, machine, terminals]);

  return h('span', {
    ref: wrapRef,
    className: 'split-btn-caret-wrap',
  },
    h('button', {
      className: `compact-action-btn btn split-btn-caret ${variant === 'tmux' ? 'btn-tmux' : 'btn-launch'}`,
      onClick: e => { e.stopPropagation(); if (!disabled) setOpen(v => !v); },
      disabled,
      title: `Pick a terminal to ${variant === 'tmux' ? 'attach the new mux session' : 'resume the session'} in`,
    },
      h('span', { className: 'material-icons-round', style: { fontSize: '14px' } }, 'arrow_drop_down'),
    ),
    open && h('div', {
      className: 'terminal-picker-menu',
      onClick: e => e.stopPropagation(),
    },
      terminals === null && h('div', { className: 'terminal-picker-item terminal-picker-muted' }, 'Probing…'),
      terminals !== null && terminals.length === 0 && h('div', { className: 'terminal-picker-item terminal-picker-muted' }, 'No terminals detected'),
      (terminals || []).map(t =>
        h('button', {
          key: t.id,
          className: 'terminal-picker-item',
          onClick: e => { e.stopPropagation(); setOpen(false); onPick(t.id); },
        },
          h('span', { className: 'material-icons-round', style: { fontSize: '12px', marginRight: 6, color: '#58a6ff' } }, 'terminal'),
          t.name,

function SessionCard({ session, onLaunch, onTmuxLaunch, launching, tmuxLaunching, skipPermissions, onPin, onUnpin, isPinned, onArchive, onUnarchive, isArchived, expanded, onToggleExpand, inMachineSection, hwCache, fetchHardware, onRename, hideMachineLabel, matchingTmux, onAttachTmux, onHighlightTmux }) {
  const isWorking = session.status === 'working';
  const isActive = session.status === 'active' || isWorking;
  const effectivePath = session.cwd || session.project_path || session.project_folder || '';
  // When the parent passes a displayLabel (e.g. Claude session slug shown
  // inside a project run group), prefer it over the shortened path.
  const projectName = session.displayLabel || shortenPath(effectivePath);

  const repoUrl = gitRemoteToUrl(session.git_remote || '');

  const handleOpenFolder = async (e) => {
    e.stopPropagation();
    const folderPath = session.cwd || session.project_path || '';
    if (!folderPath) return;
    try {
      const resp = await apiFetch('/api/fs/open', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: session.machine, path: folderPath }),

    const folderPath = session.cwd || session.project_path || '';
    if (!folderPath || local) return null;
    const info = MACHINE_INFO[session.machine] || {};
    const ip = info.ip || session.machine;
    const norm = folderPath.replace(/\\/g, '/');
    // Windows path: C:/Users/... → smb://ip/C/Users/...
    if (norm.length >= 3 && norm[1] === ':' && norm[2] === '/') {
      return `smb://${ip}/${norm[0]}/${norm.slice(3)}`;

    e.stopPropagation();

// ─── Tmux Card ────────────────────────────────────────────────────────────────

function TmuxCard({ session, onConnect, connecting, onKill, killing, onRemoteAttach, remoteAttaching, confirmKill, paneContent, streamOn, onToggleStream, onSelectClaudeSession }) {
  const isAttached = session.attached;
  const local = isLocalMachine(session.machine);
  const muxOS = (MACHINE_INFO[session.machine] || {}).os || 'macOS';
  const muxName = muxOS === 'Windows' ? 'psmux' : 'tmux';
  const sessionName = session.session_name || session.name || '(unnamed)';

  const containerRef = useRef(null);
  const innerRef = useRef(null);
  useEffect(() => {
    const container = containerRef.current;
    const inner = innerRef.current;
    if (!container || !inner) return;
    // Reset scale to measure natural size
    inner.style.transform = 'none';
    const cw = container.clientWidth - 20; // account for padding
    const ch = container.clientHeight - 16;
    const sw = inner.scrollWidth;
    const sh = inner.scrollHeight;
    if (sw > 0 && sh > 0) {
      const scale = Math.min(1, cw / sw, ch / sh);
      inner.style.transform = `scale(${scale})`;
    }
  }, [paneContent]);

  // Recalculate scale on container resize (user drags handle)
  useEffect(() => {
    const container = containerRef.current;
    if (!container || typeof ResizeObserver === 'undefined') return;
    const ro = new ResizeObserver(() => {
      const inner = innerRef.current;
      if (!inner) return;
      inner.style.transform = 'none';
      const cw = container.clientWidth - 20;
      const ch = container.clientHeight - 16;
      const sw = inner.scrollWidth;
      const sh = inner.scrollHeight;
      if (sw > 0 && sh > 0) {
        inner.style.transform = `scale(${Math.min(1, cw / sw, ch / sh)})`;
      }
    });
    ro.observe(container);
    return () => ro.disconnect();
  }, []);

  return h('div', {
    className: 'tmux-card',
    'data-tmux-key': `${session.machine}:${session.session_name || session.name}`,
  },
    h('div', { style: { flex: 1, minWidth: 0 } },
      // Session name
      h('div', {
        title: `${muxName} session name`,
        style: {
          fontSize: '0.85rem', fontWeight: 700, color: '#e6edf3',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          marginBottom: session.cwd ? 2 : 5,
        }
      }, sessionName),

      // Working directory (when available)
      session.cwd && h('div', {
        style: {
          fontSize: '0.68rem', color: '#8b949e',
          fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          marginBottom: 5,
        },
        title: `Working directory of the active pane: ${session.cwd}`,
      }, session.cwd),

      // Linked Claude session chip — click to select its row in the left pane.
      session.claude_session_id && h('button', {
        className: 'claude-link-chip',
        onClick: (e) => {
          e.stopPropagation();
          if (onSelectClaudeSession) onSelectClaudeSession(session.claude_session_id);
        },
        title: `Select Claude session "${session.claude_session_name}" (${session.claude_session_id.slice(0, 8)}) in the left pane`,
        style: {
          display: 'inline-flex', alignItems: 'center', gap: 4,
          fontSize: '0.7rem', color: '#7ee787',
          background: '#0d2818', border: '1px solid #2d5a3a',
          borderRadius: 10, padding: '2px 8px',
          cursor: 'pointer', marginBottom: 6, maxWidth: '100%',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        },
      },
        h('span', null, '\u25b8 '),
        h('span', {
          style: { overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' },
        }, session.claude_session_name || session.claude_session_id.slice(0, 8)),
      ),

      // Badge row
      h('div', {
        style: { display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center', marginBottom: 8 }
      },
        h('span', {
          title: `${session.machine} at ${(MACHINE_INFO[session.machine] || {}).ip || 'unknown IP'} — ${isLocalMachine(session.machine) ? 'local' : 'remote'} machine`,
        }, h(MachineBadge, { machine: session.machine })),
        h('span', {
          title: `Operating system: ${getMachineOS(session.machine)}`,
        }, h(OsBadge, { machine: session.machine })),
        session.windows != null && h(Badge, { text: `${session.windows} win`, title: `Number of windows in this ${muxName} session` }),
        isAttached && h(Badge, { text: 'attached', color: '#58a6ff', bg: '#1f3a5f', border: '#2d4f7a', title: 'A client is currently attached to this session' }),
      ),

      // Action buttons — compact single row, text only
      h('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap' } },
        h('button', {
          className: 'compact-action-btn btn',
          onClick: (e) => { e.stopPropagation(); onKill(session); },
          disabled: killing,
          title: confirmKill
            ? `Click again to confirm — this will terminate "${sessionName}" on ${session.machine}`
            : local
              ? `Terminate this ${muxName} session (click twice to confirm)`
              : `Terminate this ${muxName} session on ${session.machine} (click twice to confirm)`,
          style: {
            borderColor: confirmKill ? '#7a2a2a' : '#5a2a2a',
            color: '#f85149',
            background: confirmKill ? '#5a2a2a' : undefined,
            opacity: killing ? 0.6 : 1,
          },
        }, killing ? 'Killing…' : confirmKill ? 'Confirm?' : 'Kill'),
        !local && h('button', {
          className: 'compact-action-btn btn',
          onClick: (e) => { e.stopPropagation(); onRemoteAttach(session); },
          disabled: remoteAttaching,
          title: `Open a terminal directly on ${session.machine}'s own display attached to this session`,
          style: {
            borderColor: '#3a2a5a',
            color: '#a371f7',
            opacity: remoteAttaching ? 0.6 : 1,
          },
        }, remoteAttaching ? 'Opening…' : 'Remote'),
        h('div', { className: 'split-btn-group', style: { display: 'inline-flex' } },
          h('button', {
            className: `compact-action-btn btn btn-tmux split-btn-primary`,
            onClick: (e) => { e.stopPropagation(); onConnect(session); },
            disabled: connecting,
            title: local
              ? `Attach to this ${muxName} session in a new terminal window (click the caret to pick a terminal)`
              : `Open a local terminal and attach to this ${muxName} session on ${session.machine} (click the caret to pick a terminal)`,
            style: { opacity: connecting ? 0.6 : 1 },
          }, connecting ? 'Attaching…' : 'Attach'),
          h(TerminalPicker, {
            // Terminal runs on the orchestrator (the daemon host), not on
            // the remote where the mux session lives — attach opens a new
            // terminal window locally that SSH's into the mux session. So
            // probe the daemon host's adapters regardless of which machine
            // the tmux session lives on.
            machine: LOCAL_MACHINE || session.machine,
            variant: 'tmux',
            disabled: connecting,
            onPick: tid => onConnect(session, tid),
          }),
        ),
      ),

      // Stream toggle + terminal preview
      h('div', { style: { marginTop: 8 } },
        // Checkbox row
        h('label', {
          style: {
            display: 'flex', alignItems: 'center', gap: 6,
            fontSize: '0.72rem', color: '#8b949e', cursor: 'pointer',
            userSelect: 'none',
          },
          title: 'Enable live streaming of this session\'s terminal output',
        },
          h('input', {
            type: 'checkbox',
            checked: streamOn,
            onChange: () => onToggleStream(session.machine, session.session_name || session.name),
            style: { accentColor: '#58a6ff', cursor: 'pointer' },
          }),
          h('span', { className: 'material-icons-round', style: { fontSize: '0.85rem', color: streamOn ? '#58a6ff' : '#484f58' } }, 'cast'),
          'Stream session',
          muxName === 'psmux' && h('span', { style: { fontSize: '0.6rem', color: '#484f58', marginLeft: 4 } }, '(no color — psmux limitation)'),
        ),

        // Terminal preview (only when streaming is on and content exists)
        streamOn && paneContent && h('div', {
          ref: containerRef,
          style: {
            marginTop: 6,
            background: '#0d1117',
            border: '1px solid #21262d',
            borderRadius: 6,
            padding: '8px 10px',
            height: 160,
            minHeight: 80,
            maxHeight: 600,
            resize: 'vertical',
            overflow: 'hidden',
            position: 'relative',
          },
          title: 'Live terminal output (read-only, no TTY attached) — drag bottom edge to resize',
        },
          h('div', {
            ref: innerRef,
            style: {
              fontFamily: '"SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace',
              fontSize: '0.7rem',
              lineHeight: 1.4,
              color: '#c9d1d9',
              whiteSpace: 'pre',
              wordBreak: 'normal',
              transformOrigin: 'top left',
            },
            dangerouslySetInnerHTML: { __html: ansiToHtml(paneContent) },
          }),
        ),

        // Loading indicator when streaming but no content yet
        streamOn && !paneContent && h('div', {
          style: {
            marginTop: 6, fontSize: '0.65rem', color: '#484f58',
            display: 'flex', alignItems: 'center', gap: 4,
          }
        },
          h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '0.7rem' } }, '\u21bb'),
          'Waiting for stream\u2026',
        ),
      ),
    ),
  );
}

const TmuxCardMemo = memo(TmuxCard);

// ─── Hardware Info Component ──────────────────────────────────────────────────

function HardwareInfo({ machine, hwCache, fetchHardware }) {
  const cached = hwCache[machine];

  useEffect(() => {
    if (!cached || Date.now() - cached.timestamp > 30000) {
      fetchHardware(machine);
    }
  }, [machine]);

  if (!cached) return h('div', {
    style: { fontSize: '0.7rem', color: '#484f58', fontFamily: 'monospace', marginTop: 6, display: 'flex', alignItems: 'center', gap: 6 }
  },
    h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '0.7rem' } }, '↻'),
    'Loading hardware info…',
  );

  if (cached.error) return h('div', {
    style: { fontSize: '0.7rem', color: '#484f58', fontFamily: 'monospace', marginTop: 6 }
  }, `hw: ${cached.error}`);

  const { cpu, gpus, memory } = cached.data || {};

  const usageColor = (pct) => pct > 70 ? '#f85149' : pct > 40 ? '#e3b341' : '#8b949e';
  const tempColor = (t) => t > 80 ? '#f85149' : t > 60 ? '#e3b341' : '#8b949e';
  const ramColor = memory && memory.percent != null
    ? (memory.percent > 85 ? '#f85149' : memory.percent > 70 ? '#e3b341' : '#8b949e')
    : '#8b949e';

  return h('div', {
    style: { fontSize: '0.7rem', color: '#6e7681', fontFamily: 'monospace', marginTop: 6, display: 'flex', flexWrap: 'wrap', gap: 0, alignItems: 'center' }
  },
    cpu && h('span', null,
      h('span', { style: { color: '#484f58' } }, 'CPU: '),
      h('span', { style: { color: '#8b949e' } }, `${cpu.name || 'CPU'}${cpu.cores ? ` (${cpu.cores} cores)` : ''}`),
      cpu.usage_percent != null && h('span', { style: { color: usageColor(cpu.usage_percent) } }, ` ${cpu.usage_percent.toFixed(1)}%`),
      cpu.temp_c != null && h('span', null,
        h('span', { className: 'material-icons', style: { fontSize: '0.65rem', verticalAlign: 'middle', color: tempColor(cpu.temp_c), marginLeft: 3 } }, 'thermostat'),
        h('span', { style: { color: tempColor(cpu.temp_c) } }, `${cpu.temp_c.toFixed(0)}°C`),
      ),
    ),

    gpus && gpus.length > 0 && gpus.map((gpu, i) => {
      const vram = (gpu.memory_used_mb != null && gpu.memory_total_mb != null)
        ? `${gpu.memory_used_mb}/${gpu.memory_total_mb} MB`
        : null;
      const tc = gpu.temp_c != null ? tempColor(gpu.temp_c) : '#8b949e';
      return h('span', { key: i },
        h('span', { style: { color: '#484f58' } }, i === 0 ? ' | GPU: ' : ' | '),
        h('span', { style: { color: '#8b949e' } }, gpu.name || 'GPU'),
        gpu.usage_percent != null && h('span', { style: { color: usageColor(gpu.usage_percent) } }, ` ${gpu.usage_percent.toFixed(1)}%`),
        gpu.temp_c != null && h('span', null,
          h('span', { className: 'material-icons', style: { fontSize: '0.65rem', verticalAlign: 'middle', color: tc, marginLeft: 3 } }, 'thermostat'),
          h('span', { style: { color: tc } }, `${gpu.temp_c.toFixed(0)}°C`),
        ),
        vram && h('span', { style: { color: '#6e7681' } }, ` ${vram}`),
      );
    }),

    memory && h('span', null,
      h('span', { style: { color: '#484f58' } }, ' | RAM: '),
      h('span', { style: { color: ramColor } }, `${memory.used_gb != null ? memory.used_gb.toFixed(1) : '?'}/${memory.total_gb != null ? memory.total_gb.toFixed(1) : '?'} GB`),
      memory.percent != null && h('span', { style: { color: ramColor } }, ` (${Math.round(memory.percent)}%)`),
    ),
  );
}

// ─── Machine Section ──────────────────────────────────────────────────────────

function MachineSection({ machine, children, count, collapseKey, collapseState, setCollapseState }) {
  // Use local state for instant toggle — sync to parent for persistence
  const defaultVal = collapseState && collapseKey && collapseState[collapseKey] !== undefined
    ? collapseState[collapseKey] : true;
  const [isOpen, setIsOpen] = useState(defaultVal);

  // Sync from parent when collapseState changes externally (e.g. selectClaudeSession
  // programmatically expands a section to scroll a target into view).
  const externalOpen = collapseState && collapseKey ? collapseState[collapseKey] : undefined;
  useEffect(() => {
    if (externalOpen !== undefined && externalOpen !== isOpen) setIsOpen(externalOpen);
    // Only react when the parent-controlled value flips; ignore internal isOpen.
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [externalOpen]);

  const toggle = useCallback((e) => {
    e.stopPropagation();
    setIsOpen(prev => {
      const next = !prev;
      if (setCollapseState && collapseKey) {
        setCollapseState(p => ({ ...p, [collapseKey]: next }));
      }
      return next;
    });
  }, [collapseKey, setCollapseState]);

  return h('div', { className: 'machine-section' },
    h('div', {
      className: 'machine-header',
      onClick: toggle,
      title: `Click to ${isOpen ? 'collapse' : 'expand'} sessions from ${machine}`,
    },
      h('span', {
        style: { color: '#8b949e', fontSize: '0.75rem', transition: 'transform 0.15s',
          display: 'inline-block',
          transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)' }
      }, '▶'),
      h('span', { style: { color: '#8b949e', fontFamily: 'monospace' } }, machine),
      count != null && h('span', {
        style: {
          background: '#21262d', color: '#8b949e', fontSize: '0.65rem',
          borderRadius: 20, padding: '1px 7px', marginLeft: 4,
        }
      }, count),
    ),
    isOpen && h('div', { style: { paddingLeft: 8 } }, children),
  );
}

// ─── Project Section ──────────────────────────────────────────────────────────

const PROJECT_SECTION_MAX = 20; // max cards before showing "Show all N" button

function ProjectSection({ projectPath, machine, children, count, defaultOpen: defOpen = true, collapseKey, collapseState, setCollapseState, onNewSessionInProject, onNewTmuxInProject }) {
  const shortPath = shortenPath(projectPath) || projectPath || '(unknown)';
  const [showAll, setShowAll] = useState(false);

  const defaultVal = collapseState && collapseKey && collapseState[collapseKey] !== undefined
    ? collapseState[collapseKey] : defOpen;
  const [isOpen, setIsOpen] = useState(defaultVal);

  const externalOpen = collapseState && collapseKey ? collapseState[collapseKey] : undefined;
  useEffect(() => {
    if (externalOpen !== undefined && externalOpen !== isOpen) setIsOpen(externalOpen);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [externalOpen]);

  const toggle = useCallback((e) => {
    e.stopPropagation();
    setIsOpen(prev => {
      const next = !prev;
      if (setCollapseState && collapseKey) {
        setCollapseState(p => ({ ...p, [collapseKey]: next }));
      }
      return next;
    });
  }, [collapseKey, setCollapseState]);

  // Slice children array when over the limit (avoids rendering 100+ cards at once)
  const childArray = Array.isArray(children) ? children : (children ? [children] : []);
  const totalChildren = childArray.length;
  const needsTruncation = totalChildren > PROJECT_SECTION_MAX && !showAll;
  const visibleChildren = needsTruncation ? childArray.slice(0, PROJECT_SECTION_MAX) : childArray;
  const hiddenCount = totalChildren - PROJECT_SECTION_MAX;

  const local = isLocalMachine(machine);
  const muxName = (MACHINE_INFO[machine] || {}).os === 'Windows' ? 'psmux' : 'tmux';

  return h('div', { style: { marginLeft: 8, marginBottom: 4 } },
    h('div', {
      onClick: toggle,
      title: `Click to ${isOpen ? 'collapse' : 'expand'} sessions in ${projectPath}`,
      style: {
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 8px', cursor: 'pointer',
        borderRadius: 4, fontSize: '0.75rem',
        transition: 'background 0.15s',
      },
      onMouseEnter: e => { e.currentTarget.style.background = '#161b22'; },
      onMouseLeave: e => { e.currentTarget.style.background = 'transparent'; },
    },
      h('span', {
        style: {
          color: '#484f58', fontSize: '0.65rem', transition: 'transform 0.15s',
          display: 'inline-block', transform: isOpen ? 'rotate(90deg)' : 'rotate(0)',
        }
      }, '▶'),
      h('span', {
        style: { color: '#8b949e', fontFamily: 'monospace', fontSize: '0.75rem' }
      }, shortPath),
      h('span', {
        style: {
          background: '#161b22', color: '#484f58', fontSize: '0.6rem',
          borderRadius: 10, padding: '1px 6px', marginLeft: 4,
        }
      }, count),
    ),
    isOpen && h('div', { style: { paddingLeft: 4 } },
      visibleChildren,
      needsTruncation && h('button', {
        onClick: () => setShowAll(true),
        style: {
          background: 'none', border: 'none', color: '#58a6ff',
          fontSize: '0.72rem', cursor: 'pointer', padding: '4px 8px',
          textDecoration: 'underline', display: 'block',
        },
      }, `Show ${hiddenCount} more…`),
      // New session buttons row — each is a split-button with a terminal
      // picker caret, so the user can pick iTerm2 / Terminal.app / Alacritty /
      // Windows Terminal / etc. instead of the auto-detected default.
      machine && onNewSessionInProject && h('div', {
        style: { display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 6, paddingLeft: 4 }
      },
        h('div', { className: 'split-btn-group' },
          h('button', {
            className: 'compact-action-btn btn split-btn-primary',
            onClick: (e) => { e.stopPropagation(); onNewSessionInProject(machine, projectPath); },
            title: local
              ? `Open a new terminal in ${shortPath} and start claude`
              : `SSH into ${machine} and start a new claude session in ${shortPath}`,
            style: {
              borderColor: '#2a4a2a', color: '#3fb950', fontSize: '0.65rem',
              padding: '3px 8px', display: 'flex', alignItems: 'center', gap: 4,
            },
          },
            h('span', { className: 'material-icons-round', style: { fontSize: '12px' } }, 'add'),
            local ? 'New session' : 'SSH + New session',
          ),
          h(TerminalPicker, {
            machine,
            variant: 'launch',
            disabled: false,
            onPick: tid => onNewSessionInProject(machine, projectPath, tid),
          }),
        ),
        h('div', { className: 'split-btn-group' },
          h('button', {
            className: 'compact-action-btn btn split-btn-primary',
            onClick: (e) => { e.stopPropagation(); onNewTmuxInProject(machine, projectPath); },
            title: local
              ? `Create a new ${muxName} session in ${shortPath}`
              : `Create a new ${muxName} session on ${machine} in ${shortPath}`,
            style: {
              borderColor: '#1f3a5f', color: '#58a6ff', fontSize: '0.65rem',
              padding: '3px 8px', display: 'flex', alignItems: 'center', gap: 4,
            },
          },
            h('span', { className: 'material-icons-round', style: { fontSize: '12px' } }, 'add'),
            local ? `New ${muxName}` : `SSH + New ${muxName}`,
          ),
          h(TerminalPicker, {
            machine,
            variant: 'tmux',
            disabled: false,
            onPick: tid => onNewTmuxInProject(machine, projectPath, tid),
          }),
        ),
      ),
    ),
  );
}

// ─── New Tmux Modal ───────────────────────────────────────────────────────────

// Returns the default project root for a machine based on its OS.
// "user" is assumed to be "rbgnr" — MACHINE_INFO has no user field.
function defaultProjectRoot(machine) {
  const os = (MACHINE_INFO[machine] || {}).os || 'unknown';
  if (os === 'Windows') return 'C:\\Users\\rbgnr\\git\\';
  if (os === 'macOS') return '/Users/rbgnr/git/';
  return '/home/rbgnr/git/';
}

// Sanitize a display name to a filesystem-safe folder name.
function sanitizeFolderName(name) {
  return name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9_-]/g, '');
}

function NewTmuxModal({ fleet, onClose, onCreated }) {
  const machines = Object.keys(fleet || {});
  const initMachine = machines[0] || '';
  const [machine, setMachine] = useState(initMachine);
  const [name, setName] = useState('');
  const [cwd, setCwd] = useState(() => defaultProjectRoot(initMachine));
  const [pathPristine, setPathPristine] = useState(true);
  const [command, setCommand] = useState('');
  const [creating, setCreating] = useState(false);
  const [browseOpen, setBrowseOpen] = useState(false);
  const [browsePath, setBrowsePath] = useState('');
  const [browseDirs, setBrowseDirs] = useState([]);
  const [browseLoading, setBrowseLoading] = useState(false);
  // selectedDrive is the controlled value for the drive dropdown (Bug 1 fix)
  const [selectedDrive, setSelectedDrive] = useState('');
  const [drives, setDrives] = useState([]);
  const [drivesCache, setDrivesCache] = useState({});
  const [newFolderMode, setNewFolderMode] = useState(false);
  const [newFolderName, setNewFolderName] = useState('');
  const [newFolderCreating, setNewFolderCreating] = useState(false);
  // UX 3: init-git checkbox, persisted in localStorage
  const [initGit, setInitGit] = useState(() => {
    try { return localStorage.getItem('newSessionInitGit') !== 'false'; } catch { return true; }
  });
  // Debounce ref for Bug 2
  const browseDebounceRef = useRef(null);
  const prevMachineRef = useRef(machine);

  // Reset path when machine changes (UX 1)
  useEffect(() => {
    if (machine !== prevMachineRef.current) {
      if (pathPristine) {
        const root = defaultProjectRoot(machine);
        const slug = sanitizeFolderName(name);
        setCwd(slug ? root + slug : root);
      }
    }
  }, [machine]);

  // UX 2: while pathPristine, auto-update cwd as name changes
  const handleNameChange = (val) => {
    const sanitized = val.replace(/[/\\]/g, '_');
    setName(sanitized);
    if (pathPristine) {
      const root = defaultProjectRoot(machine);
      const slug = sanitizeFolderName(sanitized);
      setCwd(slug ? root + slug : root);
    }
  };

  const handleCwdChange = (val) => {
    setCwd(val);
    setPathPristine(false);
  };

  const fetchDrives = async (m) => {
    if (drivesCache[m]) {
      setDrives(drivesCache[m]);
      // Set selectedDrive to system drive if not already on this machine
      const cached = drivesCache[m];
      setSelectedDrive(cached.find(d => d.is_system)?.path || cached[0]?.path || '');
      return cached;
    }
    try {
      const res = await apiFetch('/api/drives', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: m }),
      });
      const data = await res.json();
      if (data.ok) {
        setDrives(data.drives);
        setDrivesCache(prev => ({ ...prev, [m]: data.drives }));
        setSelectedDrive(data.drives.find(d => d.is_system)?.path || data.drives[0]?.path || '');
        return data.drives;
      }
    } catch (e) {
      // silently ignore — drives are optional
    }
    return [];
  };

  // Bug 2: debounced fetch so rapid drive/path changes don't flash the list.
  // Previous results stay visible while the new fetch is in flight.
  const fetchDirsDebounced = (path) => {
    if (browseDebounceRef.current) clearTimeout(browseDebounceRef.current);
    browseDebounceRef.current = setTimeout(() => fetchDirs(path), 250);
  };

  const fetchDirs = async (path) => {
    setBrowseLoading(true);
    try {
      const res = await apiFetch('/api/browse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, path: path || '' }),
      });
      const data = await res.json();
      if (data.ok) {
        setBrowsePath(data.path);
        setBrowseDirs(data.dirs);
        // Keep selectedDrive in sync with browsed path (Bug 1)
        if (drives.length > 0) {
          const match = drives.find(d => data.path.startsWith(d.path));
          if (match) setSelectedDrive(match.path);
        }
      } else {
        toast(data.error || 'Browse failed', 'error');
      }
    } catch (e) {
      toast('Network error browsing directory', 'error');
    } finally {
      setBrowseLoading(false);
    }
  };

  // When machine changes while browser is open — reset and re-fetch
  useEffect(() => {
    if (browseOpen && machine !== prevMachineRef.current) {
      prevMachineRef.current = machine;
      setDrives([]);
      setSelectedDrive('');
      fetchDrives(machine);
      fetchDirs('');
    }
    prevMachineRef.current = machine;
  }, [machine, browseOpen]);

  const handleBrowseToggle = async () => {
    if (browseOpen) {
      setBrowseOpen(false);
      setNewFolderMode(false);
      setNewFolderName('');
    } else {
      setBrowseOpen(true);
      await Promise.all([fetchDrives(machine), fetchDirs(cwd || '')]);
    }
  };

  const handleCreateFolder = async () => {
    const name = newFolderName.trim();
    if (!name) return;
    const sep = browsePath.endsWith('/') || browsePath.endsWith('\\') ? '' : '/';
    const newPath = browsePath + sep + name;
    setNewFolderCreating(true);
    try {
      const res = await apiFetch('/api/mkdir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, path: newPath }),
      });
      const data = await res.json();
      if (data.ok) {
        setNewFolderMode(false);
        setNewFolderName('');
        await fetchDirs(browsePath);
        // auto-select the new folder
        setCwd(data.path);
        setPathPristine(false);
      } else {
        toast(data.error || 'Failed to create folder', 'error');
      }
    } catch (e) {
      toast('Network error creating folder', 'error');
    } finally {
      setNewFolderCreating(false);
    }
  };

  const handleClose = () => {
    setPathPristine(true);
    onClose();
  };

  const handleCreate = async () => {
    if (!machine || !name.trim()) {
      toast('Machine and session name are required', 'error');
      return;
    }
    setCreating(true);
    try {
      const trimmedCwd = cwd.trim();
      // UX 3: if init-git checked, create folder + git init before launching
      if (initGit && trimmedCwd) {
        const createRes = await apiFetch('/api/projects/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ machine, path: trimmedCwd, init_git: true }),
        });
        const createData = await createRes.json();
        if (!createData.ok) {
          toast(createData.error || 'Failed to create project folder', 'error');
          setCreating(false);
          return;
        }
      }
      const res = await apiFetch('/api/tmux/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, name: name.trim(), cwd: trimmedCwd || undefined, command: command.trim() || undefined }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Created tmux session "${name}" on ${machine}`, 'success');
        onCreated?.();
        handleClose();
      } else {
        toast(data.error || 'Failed to create session', 'error');
      }
    } catch (e) {
      toast('Network error creating session', 'error');
    } finally {
      setCreating(false);
    }
  };

  return h('div', {
    className: 'modal-overlay',
    onClick: e => { if (e.target === e.currentTarget) handleClose(); }
  },
    h('div', { className: 'modal-box' },
      h('div', {
        style: {
          display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', marginBottom: 24,
        }
      },
        h('h2', {
          style: { fontSize: '1rem', fontWeight: 700, color: '#e6edf3' }
        }, 'New Tmux / Psmux Session'),
        h('button', {
          className: 'btn',
          onClick: handleClose,
          style: {
            background: 'none', border: 'none', color: '#8b949e',
            fontSize: '1.2rem', cursor: 'pointer', padding: '4px 8px',
            borderRadius: 4,
          }
        }, '×'),
      ),

      h('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Machine'),
          h('select', {
            className: 'form-input',
            title: 'Select which machine to create the session on',
            value: machine,
            onChange: e => { setMachine(e.target.value); },
          },
            machines.map(m => h('option', { key: m, value: m }, m + (isLocalMachine(m) ? ' (local)' : '')))
          ),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Session Name'),
          h('input', {
            className: 'form-input',
            type: 'text',
            placeholder: 'e.g. dev-session',
            title: 'Name for the new tmux/psmux session',
            value: name,
            onChange: e => handleNameChange(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter') handleCreate(); },
          }),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Working Directory (optional)'),
          h('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
            h('input', {
              className: 'form-input',
              type: 'text',
              placeholder: defaultProjectRoot(machine) + 'my-project',
              title: 'Starting directory for the session (leave empty for home directory)',
              value: cwd,
              onChange: e => handleCwdChange(e.target.value),
              style: { flex: 1 },
            }),
            h('button', {
              type: 'button',
              onClick: handleBrowseToggle,
              title: 'Browse directories on the selected machine',
              style: {
                background: browseOpen ? '#1f6feb' : '#21262d',
                color: browseOpen ? '#e6edf3' : '#8b949e',
                border: '1px solid #30363d',
                borderRadius: 6,
                padding: '6px 12px',
                fontSize: '0.8rem',
                cursor: 'pointer',
                whiteSpace: 'nowrap',
                flexShrink: 0,
              }
            },
              h('span', { className: 'material-icons-round', style: { fontSize: '14px', verticalAlign: 'middle', marginRight: 3 } }, 'folder_open'),
              'Browse',
            ),
          ),
          browseOpen && h('div', {
            style: {
              marginTop: 8,
              background: '#161b22',
              border: '1px solid #30363d',
              borderRadius: 8,
              overflow: 'hidden',
            }
          },
            // Drive picker row — Bug 1 fix: value bound to selectedDrive state
            drives.length > 0 && h('div', {
              style: {
                padding: '6px 12px',
                background: '#0d1117',
                borderBottom: '1px solid #30363d',
                display: 'flex',
                alignItems: 'center',
                gap: 8,
              }
            },
              h('span', { style: { fontSize: '0.75rem', color: '#8b949e', flexShrink: 0 } }, 'Drive:'),
              h('select', {
                value: selectedDrive,
                onChange: e => {
                  const drv = e.target.value;
                  setSelectedDrive(drv);
                  fetchDirsDebounced(drv);
                },
                title: 'Select a drive/volume on the selected machine',
                style: {
                  flex: 1,
                  background: '#161b22',
                  color: '#e6edf3',
                  border: '1px solid #30363d',
                  borderRadius: 4,
                  padding: '3px 6px',
                  fontSize: '0.78rem',
                  cursor: 'pointer',
                },
              },
                drives.map(d => h('option', { key: d.path, value: d.path },
                  `${d.is_system ? '* ' : ''}${d.label} (${d.path}) \u2014 ${d.free_gb} GB free`
                ))
              ),
            ),
            // Path bar — Bug 2: spinner as overlay badge, old list stays visible
            h('div', {
              style: {
                padding: '8px 12px',
                background: '#0d1117',
                borderBottom: '1px solid #30363d',
                fontFamily: 'monospace',
                fontSize: '0.78rem',
                color: '#58a6ff',
                display: 'flex',
                alignItems: 'center',
                gap: 6,
              }
            },
              h('span', { className: 'material-icons-round', style: { fontSize: '14px', verticalAlign: 'middle', flexShrink: 0 } }, 'folder'),
              h('span', { style: { flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, browsePath || '~'),
              browseLoading && h('span', {
                title: 'Loading…',
                style: {
                  fontSize: '0.68rem', color: '#8b949e', flexShrink: 0,
                  background: '#21262d', borderRadius: 4, padding: '1px 6px',
                  border: '1px solid #30363d',
                }
              }, '\u29d7'),
              !browseLoading && !newFolderMode && h('button', {
                type: 'button',
                onClick: () => { setNewFolderMode(true); setNewFolderName(''); },
                title: 'Create a new folder in the current directory',
                style: {
                  background: '#21262d',
                  color: '#e6edf3',
                  border: '1px solid #30363d',
                  borderRadius: 4,

              borderRadius: 8, padding: '8px 20px', fontSize: '0.85rem',
              fontWeight: 600, cursor: creating ? 'not-allowed' : 'pointer',
              opacity: creating ? 0.7 : 1,
            }
          }, creating ? 'Creating…' : 'Create Session'),
