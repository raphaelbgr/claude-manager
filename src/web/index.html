        }, label)
      ),
      h('button', {
        className: `filter-pill${filters.showArchived ? ' active-archived' : ''}`,
        onClick: () => setFilters(prev => ({ ...prev, showArchived: !prev.showArchived })),
        title: filters.showArchived ? 'Hide archived sessions' : 'Show archived sessions',
        style: { display: 'inline-flex', alignItems: 'center', gap: 4 },
      },
        h('span', { className: 'material-icons-round', style: { fontSize: '10px', verticalAlign: 'middle' } }, 'archive'),
        'ARCHIVED',
      ),
    ),

    // Row 2: Time range + Sort + Search + Reset + Count
    h('div', { className: 'filter-row' },
      h('span', { className: 'filter-label' }, 'Time'),
      h('select', {
        className: 'filter-select',
        title: 'Filter sessions by when they were last modified',
        value: filters.timeRange,
        onChange: e => setFilters(prev => ({ ...prev, timeRange: e.target.value })),
      }, timeRangeOptions.map(o => h('option', { key: o.value, value: o.value }, o.label))),

      h('span', { className: 'filter-label', style: { marginLeft: 8 } }, 'Sort'),
      h('select', {
        className: 'filter-select',
        title: 'Change the order sessions are displayed',
        value: filters.sortBy,
        onChange: e => setFilters(prev => ({ ...prev, sortBy: e.target.value })),
      }, sortByOptions.map(o => h('option', { key: o.value, value: o.value }, o.label))),

      h('input', {
        type: 'text',
        className: 'form-input',
        placeholder: 'Search sessions…',
        title: 'Search sessions by project name, path, summary, or machine',
        value: filters.text,
        onChange: e => setFilters(prev => ({ ...prev, text: e.target.value })),
        style: { fontSize: '0.75rem', padding: '3px 10px', maxWidth: 200, marginLeft: 8 },
      }),

      isFiltersActive && h('button', {
        className: 'filter-reset',
        onClick: resetFilters,
        title: 'Clear all active filters',
      }, 'Reset'),

      h('span', {
        className: 'filter-count',
        title: `Number of sessions matching current filters out of total`,
      },
        visibleCount === totalSessions
          ? `${totalSessions} sessions`
          : `Showing ${visibleCount} of ${totalSessions} sessions`
      ),
      hiddenArchivedCount > 0 && h('span', {
        style: { fontSize: '0.65rem', color: '#6e4fa0', marginLeft: 4, whiteSpace: 'nowrap' },
      }, `· ${hiddenArchivedCount} archived hidden`),
    ),
  );
}

// ─── Scan Progress ────────────────────────────────────────────────────────────

function ScanProgress({ progress, isFirstScan }) {
  const machines = Object.entries(progress);
  if (!machines.length) return null;

  // Subsequent scans: thin silent bar at top, absolute positioned, doesn't push content
  if (!isFirstScan) {
    const totalFound = machines.reduce((sum, [, info]) => sum + (info.found || 0), 0);
    const totalFiles = machines.reduce((sum, [, info]) => sum + (info.total || 0), 0);
    const overallPct = totalFiles > 0 ? Math.round((totalFound / totalFiles) * 100) : 0;
    const activeCount = machines.filter(([, info]) => info.current_file !== 'done').length;

    return h('div', {
      title: `Background scan: ${activeCount} machine${activeCount !== 1 ? 's' : ''} scanning`,
      style: {
        position: 'fixed',
        top: 0, left: 0, right: 0,
        height: 2,
        background: '#21262d',
        zIndex: 200,
        overflow: 'hidden',
        pointerEvents: 'none',
      }
    },
      // Progress bar fill (determinate if total known, else indeterminate pulse)
      totalFiles > 0
        ? h('div', {
            style: {
              width: `${overallPct}%`, height: '100%',
              background: '#58a6ff',
              transition: 'width 0.3s ease',
            }
          })
        : h('div', {
            style: {
              width: '30%', height: '100%',
              background: '#58a6ff',
              animation: 'indeterminate 1.5s ease-in-out infinite',
            }
          }),
    );
  }

  // First scan: full panel with per-machine details
  return h('div', {
    style: {
      padding: '10px 24px',
      background: '#161b22',
      borderBottom: '1px solid #21262d',
      display: 'flex',
      flexDirection: 'column',
      gap: 6,
      flexShrink: 0,
    }
  },
    h('div', {
      style: { fontSize: '0.72rem', color: '#8b949e', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }
    },
      h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '0.8rem' } }, '↻'),
      'Scanning fleet...',
    ),
    machines.map(([machine, info]) => {
      const isDone = info.current_file === 'done';
      const isIndeterminate = info.total === 0 && !isDone;
      const pct = info.total > 0 ? Math.round((info.found / info.total) * 100) : 0;

      return h('div', {
        key: machine,
        style: { display: 'flex', alignItems: 'center', gap: 10, fontSize: '0.68rem' }
      },
        // Machine name
        h('span', {
          style: { color: '#e6edf3', fontWeight: 600, minWidth: 120 }
        }, machine),

        // Progress bar (only for local scan with known total)
        !isIndeterminate && !isDone && h('div', {
          style: {
            flex: 1, maxWidth: 200, height: 4,
            background: '#21262d', borderRadius: 2, overflow: 'hidden',
          }
        },
          h('div', {
            style: {
              width: `${pct}%`, height: '100%',
              background: '#58a6ff', borderRadius: 2,
              transition: 'width 0.2s ease',
            }
          }),
        ),

        // Indeterminate bar (pulsing for remote)
        isIndeterminate && h('div', {
          style: {
            flex: 1, maxWidth: 200, height: 4,
            background: '#21262d', borderRadius: 2, overflow: 'hidden',
          }
        },
          h('div', {
            style: {
              width: '30%', height: '100%',
              background: '#58a6ff', borderRadius: 2,
              animation: 'indeterminate 1.5s ease-in-out infinite',
            }
          }),
        ),

        // Count
        h('span', { style: { color: isDone ? '#3fb950' : '#8b949e', minWidth: 60 } },
          isDone ? `${info.found} found` : info.total > 0 ? `${info.found}/${info.total}` : '',
        ),

        // Current file or status
        h('span', {
          style: {
            color: '#484f58',
            fontFamily: 'monospace',
            fontSize: '0.6rem',
            overflow: 'hidden',
            textOverflow: 'ellipsis',
            whiteSpace: 'nowrap',
            maxWidth: 250,
          }
        }, isDone ? '' : info.current_file || ''),
      );
    }),
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────

const COLLAPSE_KEY = 'claude-manager-collapse-state';

function App() {
  const [sessions, setSessions]           = useState([]);
  const [tmuxSessions, setTmuxSessions]   = useState([]);
  const [fleet, setFleet]                 = useState({});
  const [health, setHealth]               = useState(null);
  const [lastScan, setLastScan]           = useState(null);
  const [filters, setFilters]             = useState({
    machines: new Set(),
    statuses: new Set(),
    timeRange: 'all',
    sortBy: 'recent',
    text: '',
    showArchived: false,
  });
  const [scanning, setScanning]           = useState(false);
  const [scanProgress, setScanProgress]   = useState({});
  const [isFirstScan, setIsFirstScan]     = useState(true);
  const [launchingId, setLaunchingId]     = useState(null);
  const [tmuxLaunchingId, setTmuxLaunchingId] = useState(null);
  const [connectingId, setConnectingId]   = useState(null);
  const [showModal, setShowModal]         = useState(false);
  const [loading, setLoading]             = useState(true);
  const [skipPermissions, setSkipPermissions] = useState(false);
  const [pinnedIds, setPinnedIds]         = useState([]);
  const [archivedIds, setArchivedIds]     = useState(new Set());
  const [showLogs, setShowLogs]           = useState(false);
  const [authStatus, setAuthStatus]       = useState(null);
  const [showSecurity, setShowSecurity]   = useState(false);
  const [updateStatus, setUpdateStatus]   = useState(null);
  const [applyingUpdate, setApplyingUpdate] = useState(false);
  const [sessionsView, setSessionsView] = useState(() => {
    try { return localStorage.getItem('sessionsView') || 'project'; } catch { return 'project'; }
  });
  const [wsSessionUpdateCount, setWsSessionUpdateCount] = useState(0);

  // Normalize a filesystem path so Windows backslashes, mixed slashes, trailing
  // separators, and case differences don't break string compares. claude-manager
  // runs on macOS and decodes Windows project folders with '/', while session
  // cwds from the JSONL and tmux pane cwds keep '\' — without normalization the
  // lookup misses every Windows session.
  const normalizePath = (p) => {
    if (!p) return '';
    return p.replace(/\\/g, '/').replace(/\/+$/, '').toLowerCase();
  };

  // Reverse index: (machine, normalized-cwd) → [tmuxSession, ...]. Rebuilt whenever
  // the tmux list changes. Used by SessionCard to render the highlight chip +
  // attach button when a live mux session exists for the same project path.
  const tmuxByCwdKey = useMemo(() => {
    const idx = {};
    const add = (key, t) => { (idx[key] ||= []).push(t); };
    tmuxSessions.forEach(t => {
      const cwd = normalizePath(t.cwd);
      if (!cwd || !t.machine) return;
      add(t.machine + '|' + cwd, t);
    });
    return idx;
  }, [tmuxSessions]);

  const getMatchingTmux = useCallback((session) => {
    if (!session || !session.machine) return [];
    const out = [];
    const seen = new Set();

    // Primary path: the server already enriched each tmux with
    // claude_session_id when its pane is running claude and its cwd matches
    // a session's cwd/project_path. Trust that directly — it skips every
    // frontend normalization edge case (Windows '\\', case, trailing /).
    for (const t of tmuxSessions) {
      if (t.claude_session_id && t.claude_session_id === session.session_id) {
        const id = t.machine + ':' + (t.session_name || t.name);
        if (!seen.has(id)) { seen.add(id); out.push(t); }
      }
    }

    // Secondary path: cwd-based lookup. Picks up tmuxes the server suppressed
    // (pane at a shell prompt, not running claude) but still usable for attach.
    const candidatePaths = [session.cwd, session.project_path].filter(Boolean);
    for (const p of candidatePaths) {
      const key = session.machine + '|' + normalizePath(p);
      for (const t of (tmuxByCwdKey[key] || [])) {
        const id = t.machine + ':' + (t.session_name || t.name);
        if (!seen.has(id)) { seen.add(id); out.push(t); }
      }
    }

    return out;
  }, [tmuxByCwdKey, tmuxSessions]);

  // Shared nextFrame helper used by both selectClaudeSession and selectTmuxCard.
  const nextFrame = () => new Promise((r) => requestAnimationFrame(() => r()));

  // Scroll a node into view, awaiting scrollend (700ms fallback for Safari <17
  // and containers that never fire the event). Then play the flash animation.
  const scrollAndFlash = useCallback(async (node) => {
    if (!node) return;

    const scrollParent = (() => {
      let el = node.parentElement;
      while (el) {
        const oy = getComputedStyle(el).overflowY;
        if ((oy === 'auto' || oy === 'scroll') && el.scrollHeight > el.clientHeight) return el;
        el = el.parentElement;
      }
      return window;
    })();

    await new Promise((resolve) => {
      let done = false;
      const finish = () => { if (done) return; done = true; cleanup(); resolve(); };
      const target = scrollParent === window ? window : scrollParent;
      const cleanup = () => {
        target.removeEventListener('scrollend', finish);
        clearTimeout(timeoutId);
      };
      target.addEventListener('scrollend', finish, { once: true });
      const timeoutId = setTimeout(finish, 700);
      node.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    node.classList.remove('session-flash');
    // eslint-disable-next-line no-unused-expressions
    void node.offsetWidth;
    node.classList.add('session-flash');
    await new Promise((r) => setTimeout(r, 1500));
    node.classList.remove('session-flash');
  }, []);

  // Selecting a Claude session from a tmux-card chip runs a strict sequence.
  // Works in both "Machine" and "Project" view tabs — expands every enclosing
  // section before the scroll so the target actually exists in the DOM.
  //
  //   1. compute the enclosing collapse keys from the session object
  //   2. open MachineSection (machineKey) + ProjectSection (projKey)
  //   3. dispatch 'expandProjectForSession' for the Project tab's folder
  //   4. expand the target session card if collapsed
  //   5. wait 2 rAFs so React commits and layout settles
  //   6. scrollIntoView → scrollend / 700ms → flash
  const selectClaudeSession = useCallback(async (sessionId) => {
    if (!sessionId) return;
    const session = (sessions || []).find(s => s.session_id === sessionId);
    if (!session) return;

    const projectPath = session.cwd || session.project_path || '';
    const machineKey = session.machine;
    const projKey = `project:${session.machine}:${projectPath}`;

    // Open ancestors regardless of active tab.
    setCollapseState(prev => {
      if (prev[machineKey] === true && prev[projKey] === true) return prev;
      return { ...prev, [machineKey]: true, [projKey]: true };
    });

    // Project tab — reach into ProjectsView through a window event.
    window.dispatchEvent(new CustomEvent('expandProjectForSession', { detail: { sessionId } }));

    if (!expandedCardsRef.current.has(sessionId)) {
      setExpandedCards(prev => {
        if (prev.has(sessionId)) return prev;
        const next = new Set(prev); next.add(sessionId); return next;
      });
    }

    await nextFrame();
    await nextFrame();

    const node = document.querySelector(`[data-session-id="${sessionId}"]`);
    if (!node) return;

    await scrollAndFlash(node);
  }, [sessions, scrollAndFlash]);

  // Reverse direction: flash and scroll to a tmux card on the right pane.
  // Called by the SessionCard "Attach" button so the user sees BOTH sides
  // light up — session row on the left, tmux card on the right.
  const selectTmuxCard = useCallback(async (machine, tmuxName) => {
    if (!machine || !tmuxName) return;

    // Ensure the tmux panel's MachineSection is open.
    setCollapseState(prev => {
      const key = `tmux:${machine}`;
      if (prev[key] === true) return prev;
      return { ...prev, [key]: true };
    });

    await nextFrame();
    await nextFrame();

    const key = `${machine}:${tmuxName}`;
    const selector = `[data-tmux-key="${(window.CSS && CSS.escape) ? CSS.escape(key) : key.replace(/"/g, '\\"')}"]`;
    const node = document.querySelector(selector);
    if (!node) return;

    await scrollAndFlash(node);
  }, [scrollAndFlash]);

  // ── Auth config on startup ────────────────────────────────────────────────
  useEffect(() => {
    fetch('/api/auth/config').then(r => r.json()).then(data => {
      setAuthStatus(data);
      if (data.enabled && !localStorage.getItem('claude-manager-auth-token') && data.loopback) {
        fetch('/api/auth/token').then(r => r.json()).then(t => {
          try { if (t.token) localStorage.setItem('claude-manager-auth-token', t.token); } catch {}
        }).catch(() => {});
      }
    }).catch(() => {});
  }, []);

  // ── Check for updates on startup + every 5 minutes ───────────────────────
  const fetchUpdateStatus = useCallback(async () => {
    try {
      const resp = await fetch('/api/update/check');
      if (resp.ok) {
        const data = await resp.json();
        setUpdateStatus(data);
      }
    } catch {}
  }, []);

  useEffect(() => {
    fetchUpdateStatus();
    const id = setInterval(fetchUpdateStatus, 5 * 60 * 1000);
    return () => clearInterval(id);
  }, [fetchUpdateStatus]);

  // ── Apply update (git pull + restart) ───────────────────────────────────
  const handleApplyUpdate = useCallback(async () => {
    if (applyingUpdate) return;
    if (!confirm('Pull latest code and restart?\n\nThe window will briefly close and reopen.')) return;
    setApplyingUpdate(true);
    toast('Pulling latest code…', 'info');
    try {
      const resp = await apiFetch('/api/update/apply', { method: 'POST' });
      const data = await resp.json();
      if (data.ok) {
        toast('Update applied — restarting…', 'success');
        // The server will restart itself; the WS will disconnect and reconnect
        // once the new process is up. Refresh update status after a bit.
        setTimeout(() => {
          fetchUpdateStatus();
          setApplyingUpdate(false);
        }, 6000);
      } else {
        toast(`Update failed: ${data.error || 'unknown'}`, 'error');
        setApplyingUpdate(false);
      }
    } catch (e) {
      toast(`Update failed: ${e.message}`, 'error');
      setApplyingUpdate(false);
    }
  }, [applyingUpdate, fetchUpdateStatus]);

  // Pane stream state: { "machine:session_name": "content string" }
  const [paneStreams, setPaneStreams] = useState({});

  // Track which sessions have streaming enabled: { "machine:session_name": false }
  // Default: key absent = enabled (true). Only explicit false = disabled.
  const [streamEnabled, setStreamEnabled] = useState({});

  // Hardware cache: maps machine name → { data, timestamp } or { error, timestamp }
  const [hwCache, setHwCache] = useState({});

  const fetchHardware = useCallback(async (machine) => {
    try {
      const res = await apiFetch('/api/hardware', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine }),
      });
      const data = await res.json();
      if (data.ok) {
        setHwCache(prev => ({ ...prev, [machine]: { data, timestamp: Date.now() } }));
      } else {
        setHwCache(prev => ({ ...prev, [machine]: { error: data.error || 'unavailable', timestamp: Date.now() } }));
      }
    } catch {
      setHwCache(prev => ({ ...prev, [machine]: { error: 'network error', timestamp: Date.now() } }));
    }
  }, []);

  // Expanded card state: Set of session_ids, persisted to localStorage
  const [expandedCards, setExpandedCards] = useState(() => {
    try {
      const saved = localStorage.getItem('claude-manager-expanded-cards');
      return saved ? new Set(JSON.parse(saved)) : new Set();
    } catch { return new Set(); }
  });

  const expandedCardsRef = useRef(expandedCards);
  expandedCardsRef.current = expandedCards;
  useEffect(() => {
    const timer = setTimeout(() => {
      try { localStorage.setItem('claude-manager-expanded-cards', JSON.stringify([...expandedCardsRef.current])); } catch {}
    }, 500);
    return () => clearTimeout(timer);
  }, [expandedCards]);

  const handleToggleExpand = useCallback((sessionId) => {
    setExpandedCards(prev => {
      const next = new Set(prev);
      if (next.has(sessionId)) next.delete(sessionId); else next.add(sessionId);
      return next;
    });
  }, []);

  // Collapse state: persisted to localStorage
  const [collapseState, setCollapseState] = useState(() => {
    try {
      const saved = localStorage.getItem(COLLAPSE_KEY);
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  });

  const collapseStateRef = useRef(collapseState);
  collapseStateRef.current = collapseState;
  useEffect(() => {
    const timer = setTimeout(() => {
      try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapseStateRef.current)); } catch {}
    }, 500);
    return () => clearTimeout(timer);
  }, [collapseState]);

  // ── Filtered sessions ────────────────────────────────────────────────────
  const filteredSessions = useMemo(() => {
    let result = sessions;

    // Hide archived unless showArchived is on
    if (!filters.showArchived) {
      result = result.filter(s => !archivedIds.has(s.session_id));
    }

    if (filters.machines.size > 0) {
      result = result.filter(s => filters.machines.has(s.machine));
    }

    if (filters.statuses.size > 0) {
      result = result.filter(s => filters.statuses.has(s.status));
    }

    if (filters.timeRange !== 'all') {
      const cutoffs = { hour: 3600000, today: 86400000, week: 604800000, month: 2592000000 };
      const cutoff = Date.now() - cutoffs[filters.timeRange];
      result = result.filter(s => new Date(s.modified).getTime() > cutoff);
    }

    if (filters.text.trim()) {
      const q = filters.text.toLowerCase();
      result = result.filter(s =>
        (s.project_path || '').toLowerCase().includes(q) ||
        (s.summary || '').toLowerCase().includes(q) ||
        (s.machine || '').toLowerCase().includes(q) ||
        (s.cwd || '').toLowerCase().includes(q) ||
        (s.name || '').toLowerCase().includes(q) ||
        (s.slug || '').toLowerCase().includes(q)
      );
    }

    const sorters = {
      recent:   (a, b) => new Date(b.modified) - new Date(a.modified),
      oldest:   (a, b) => new Date(a.modified) - new Date(b.modified),
      messages: (a, b) => (b.messages || 0) - (a.messages || 0),
      size:     (a, b) => (b.file_size || 0) - (a.file_size || 0),
      name:     (a, b) => (a.cwd || '').localeCompare(b.cwd || ''),
    };
    result = [...result].sort(sorters[filters.sortBy] || sorters.recent);

    return result;
  }, [sessions, filters, archivedIds]);

  // ── Filtered tmux sessions (machine filter only) ─────────────────────────
  const filteredTmux = useMemo(() => {
    if (filters.machines.size === 0) return tmuxSessions;
    return tmuxSessions.filter(s => filters.machines.has(s.machine));
  }, [tmuxSessions, filters.machines]);

  // ── WS message handler ───────────────────────────────────────────────────
  const handleWsMessage = useCallback((msg) => {
    if (msg.type === 'scan_progress') {
      setScanProgress(prev => ({
        ...prev,
        [msg.machine]: { found: msg.found, total: msg.total, current_file: msg.current_file },
      }));
    } else if (msg.channel === 'sessions') {
      // Clear scan progress — but only if it's not already empty, so we
      // don't create a new state reference and force a full App re-render
      // every scan cycle.
      setScanProgress(prev => (Object.keys(prev).length === 0 ? prev : {}));
      // After first scan completes, subsequent scans use the silent thin bar
      setIsFirstScan(prev => (prev === false ? prev : false));
      const data = msg.data;
      let newSessions;
      // data can be a flat list (update) or grouped dict (snapshot)
      if (Array.isArray(data)) {
        newSessions = data;
      } else if (data && typeof data === 'object') {
        // grouped: { machine: [{project_folder, sessions:[]}] }
        newSessions = [];
        for (const [machine, projects] of Object.entries(data)) {
          for (const proj of projects) {
            for (const s of proj.sessions) {
              newSessions.push({ ...s, machine });
            }
          }
        }
      }
      if (newSessions) {
        setSessions(prev => {
          // Full content check across every session — prevents unrelated
          // components from re-rendering when the scan produced no changes.
          if (prev.length === newSessions.length) {
            let same = true;
            for (let i = 0; i < prev.length; i++) {
              const a = prev[i], b = newSessions[i];
              if (
                a.session_id !== b.session_id ||
                a.modified !== b.modified ||
                a.messages !== b.messages ||
                a.status !== b.status
              ) { same = false; break; }
            }
            if (same) return prev;
          }
          return newSessions;
        });
        setWsSessionUpdateCount(n => n + 1);
      }
    } else if (msg.channel === 'fleet') {
      const data = msg.data;
      if (data && typeof data === 'object' && !Array.isArray(data)) {
        setFleet(prev => {
          // Only replace if a machine's online status or key set actually changed.
          const prevKeys = Object.keys(prev);
          const nextKeys = Object.keys(data);
          if (prevKeys.length === nextKeys.length) {
            let same = true;
            for (const k of nextKeys) {
              const a = prev[k], b = data[k];
              if (!a || !b || a.online !== b.online || a.ip !== b.ip) { same = false; break; }
            }
            if (same) return prev;
          }
          return data;
        });
      }
    } else if (msg.channel === 'tmux') {
      if (Array.isArray(msg.data)) {
        setTmuxSessions(prev => {
          // Content check: name, machine, attached, cwd, windows. If nothing
          // changed, return the same reference so the [tmuxSessions] effects
          // (pane subscribe, filtered memos) don't re-run on every scan.
          if (prev.length === msg.data.length) {
            let same = true;
            for (let i = 0; i < prev.length; i++) {
              const a = prev[i], b = msg.data[i];
              const an = a.session_name || a.name;
              const bn = b.session_name || b.name;
              if (
                an !== bn ||
                a.machine !== b.machine ||
                a.attached !== b.attached ||
                (a.cwd || '') !== (b.cwd || '') ||
                (a.windows || 0) !== (b.windows || 0)
              ) { same = false; break; }
            }
            if (same) return prev;
          }
          return msg.data;
        });
      }
    } else if (msg.type === 'pane_output') {
      const key = msg.machine + ':' + msg.session_name;
      setPaneStreams(prev => {
        if (prev[key] === msg.content) return prev;
        return { ...prev, [key]: msg.content };
      });
    }
  }, []);

  // Refs for pane stream state — used in reconnect callback without stale closure
  const tmuxSessionsRef = useRef(tmuxSessions);
  tmuxSessionsRef.current = tmuxSessions;
  const streamEnabledRef = useRef(streamEnabled);
  streamEnabledRef.current = streamEnabled;

  const subscribedPanesRef = useRef(new Set());
  const handleWsReconnect = useCallback((ws) => {
    // Clear tracked set so useEffect re-subscribes all
    subscribedPanesRef.current.clear();
    // Re-subscribe to all pane streams that are enabled after a WS reconnect
    for (const session of tmuxSessionsRef.current) {
      const key = session.machine + ':' + (session.session_name || session.name);
      const sessionName = session.session_name || session.name;
      if (streamEnabledRef.current[key] !== false) {
        ws.send(JSON.stringify({ type: 'subscribe_pane', machine: session.machine, session_name: sessionName }));
        subscribedPanesRef.current.add(key);
      }
    }
  }, []);

  const { connected: wsConnected, wsRef } = useWebSocket(handleWsMessage, handleWsReconnect);

  // ── Pane stream toggle ───────────────────────────────────────────────────
  const toggleStream = useCallback((machine, sessionName) => {
    const key = machine + ':' + sessionName;
    setStreamEnabled(prev => {
      const isCurrentlyOn = prev[key] !== false;
      const newEnabled = { ...prev, [key]: isCurrentlyOn ? false : true };
      const ws = wsRef.current;
      if (ws && ws.readyState === WebSocket.OPEN) {
        if (isCurrentlyOn) {
          // turning off
          ws.send(JSON.stringify({ type: 'unsubscribe_pane', machine, session_name: sessionName }));
          setPaneStreams(p => { const n = { ...p }; delete n[key]; return n; });
          subscribedPanesRef.current.delete(key);
        } else {
          // turning on
          ws.send(JSON.stringify({ type: 'subscribe_pane', machine, session_name: sessionName }));
          subscribedPanesRef.current.add(key);
        }
      }
      return newEnabled;
    });
  }, [wsRef]);

  // ── Auto-subscribe pane streams when tmux sessions load/change ───────────
  useEffect(() => {
    const ws = wsRef.current;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    for (const session of tmuxSessions) {
      const key = session.machine + ':' + (session.session_name || session.name);
      const sessionName = session.session_name || session.name;
      const enabled = streamEnabled[key] !== false;
      const alreadySub = subscribedPanesRef.current.has(key);
      if (enabled && !alreadySub) {
        ws.send(JSON.stringify({ type: 'subscribe_pane', machine: session.machine, session_name: sessionName }));
        subscribedPanesRef.current.add(key);
      } else if (!enabled && alreadySub) {
        ws.send(JSON.stringify({ type: 'unsubscribe_pane', machine: session.machine, session_name: sessionName }));
        subscribedPanesRef.current.delete(key);
      }
    }
  }, [tmuxSessions, streamEnabled, wsRef, wsConnected]);

  // ── Initial data load ────────────────────────────────────────────────────
  useEffect(() => {
    const p1 = fetch('/health')
      .then(r => r.json())
      .then(d => { setHealth(d); setLastScan(d.last_scan); if (d.local_machine) LOCAL_MACHINE = d.local_machine; })
      .catch(() => {});

    const p2 = apiFetch('/api/sessions')
      .then(r => r.json())
      .then(data => {
        if (data && typeof data === 'object' && !Array.isArray(data)) {
          const flat = [];
          for (const [machine, projects] of Object.entries(data)) {
            for (const proj of projects) {
              for (const s of proj.sessions) {
                flat.push({ ...s, machine });
              }
            }
          }
          setSessions(flat);
        }
      })
      .catch(() => {});

    const p3 = apiFetch('/api/fleet')
      .then(r => r.json())
      .then(d => { if (d && typeof d === 'object') setFleet(d); })
      .catch(() => {});

    const p4 = apiFetch('/api/tmux')
      .then(r => r.json())
      .then(d => { if (Array.isArray(d)) setTmuxSessions(d); })
      .catch(() => {});

    const p5 = apiFetch('/api/preferences')
      .then(r => r.json())
      .then(d => {
        if (d && typeof d.skip_permissions === 'boolean') setSkipPermissions(d.skip_permissions);
        // Pin is per-project now; legacy pinned_sessions ignored.
        if (d && Array.isArray(d.pinned_projects)) setPinnedIds(d.pinned_projects);
        if (d && Array.isArray(d.archived_sessions)) setArchivedIds(new Set(d.archived_sessions));
      })
      .catch(() => {});

    Promise.all([p1, p2, p3, p4, p5]).finally(() => setLoading(false));
  }, []);

  // ── Scan ─────────────────────────────────────────────────────────────────
  const handleScan = useCallback(async () => {
    setScanning(true);
    try {
      const res = await apiFetch('/api/sessions/scan', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        toast(`Scan complete · ${(data.sessions || []).length} sessions`, 'success');
        setLastScan(data.last_scan);
        if (Array.isArray(data.sessions)) {
          setSessions(data.sessions);
        }
      } else {
        toast(data.error || 'Scan failed', 'error');
      }
    } catch {
      toast('Network error during scan', 'error');
    } finally {
      setScanning(false);
    }
  }, []);

  // ── Skip permissions ──────────────────────────────────────────────────────
  const handleSkipPermissionsChange = useCallback(async (val) => {
    setSkipPermissions(val);
    try {
      await apiFetch('/api/preferences', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skip_permissions: val }),
      });
    } catch {
      // non-fatal — preference not saved server-side, still works for this session
    }
  }, []);

  // ── Pin / Unpin project ───────────────────────────────────────────────────
  // Pin is per-project — the entire project folder (with all its sessions)
  // moves into the Pinned section above everything else. pinnedIds stores
  // project_ids.
  const handlePin = useCallback(async (projectId) => {
    setPinnedIds(prev => prev.includes(projectId) ? prev : [...prev, projectId]);
    try {
      await apiFetch('/api/projects/pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_id: projectId }),
      });
    } catch {
      // non-fatal
    }
  }, []);

  const handleUnpin = useCallback(async (projectId) => {
    setPinnedIds(prev => prev.filter(id => id !== projectId));
    try {
      await apiFetch('/api/projects/unpin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_id: projectId }),
      });
    } catch {
      // non-fatal
    }
  }, []);

  // ── Archive / Unarchive session ───────────────────────────────────────────
  const handleArchive = useCallback(async (sessionId) => {
    setArchivedIds(prev => { if (prev.has(sessionId)) return prev; const next = new Set(prev); next.add(sessionId); return next; });
    try {
      await apiFetch('/api/sessions/archive', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
      toast('Session archived', 'info');
    } catch {
      // non-fatal
    }
  }, []);

  const handleUnarchive = useCallback(async (sessionId) => {
    setArchivedIds(prev => { const next = new Set(prev); next.delete(sessionId); return next; });
    try {
      await apiFetch('/api/sessions/unarchive', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
      toast('Session unarchived', 'info');
    } catch {
      // non-fatal
    }
  }, []);

  // ── Launch session ────────────────────────────────────────────────────────
  const handleLaunch = useCallback(async (session, terminalId) => {
    setLaunchingId(session.session_id);
    const payload = {
      machine: session.machine,
      session_id: session.session_id,
      cwd: session.cwd || session.project_path,
      skip_permissions: skipPermissions,
      mode: 'terminal',
      ...(terminalId ? { terminal_id: terminalId } : {}),
    };
    console.log('[launch]', payload);
    try {
      const res = await apiFetch('/api/sessions/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const text = await res.text();
      let data = {};
      try { data = JSON.parse(text); } catch { /* not json */ }
      if (!res.ok || data.ok === false) {
        const msg = data.error || text.slice(0, 300) || `HTTP ${res.status}`;
        console.error('[launch failed]', res.status, msg, payload);
        toast(`Launch failed (${res.status}): ${msg}`, 'error', 8000);
        return;
      }
      toast(`Resumed session on ${session.machine}`, 'success');
    } catch (e) {
      console.error('[launch network error]', e, payload);
      toast(`Network error: ${e.message || 'Could not reach server'}`, 'error', 8000);
    } finally {
      setLaunchingId(null);
    }
  }, [skipPermissions]);

  // ── Tmux launch (create tmux session + launch claude in it) ──────────────
  const handleTmuxLaunch = useCallback(async (session, terminalId) => {
    const mux = (MACHINE_INFO[session.machine] || {}).os === 'Windows' ? 'psmux' : 'tmux';
    setTmuxLaunchingId(session.session_id);
    const payload = {
      machine: session.machine,
      session_id: session.session_id,
      cwd: session.cwd || session.project_path,
      skip_permissions: skipPermissions,
      mode: 'tmux',
      ...(terminalId ? { terminal_id: terminalId } : {}),
    };
    console.log('[tmux-launch]', payload);
    try {
      const res = await apiFetch('/api/sessions/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const text = await res.text();
      let data = {};
      try { data = JSON.parse(text); } catch { /* not json */ }
      if (!res.ok || data.ok === false) {
        const msg = data.error || text.slice(0, 300) || `HTTP ${res.status}`;
        console.error('[tmux-launch failed]', res.status, msg, payload);
        toast(`${mux} launch failed (${res.status}): ${msg}`, 'error', 8000);
        return;
      }
      toast(`Resumed in ${mux} on ${session.machine}`, 'success');
    } catch (e) {
      console.error('[tmux-launch network error]', e, payload);
      toast(`Network error: ${e.message || 'Could not reach server'}`, 'error', 8000);
    } finally {
      setTmuxLaunchingId(null);
    }
  }, [skipPermissions]);

  // ── New session in project folder ────────────────────────────────────────
  const handleNewSessionInProject = useCallback(async (machine, cwd, terminalId) => {
    try {
      const res = await apiFetch('/api/sessions/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          machine, cwd, mode: 'terminal',
          skip_permissions: skipPermissions,
          terminal_id: terminalId || null,
        }),
      });
      const data = await res.json();
      if (data.ok) toast('Terminal opened', 'success');
      else toast(data.error || 'Failed', 'error');
    } catch (e) { toast('Network error', 'error'); }
  }, [skipPermissions]);

  const handleNewTmuxInProject = useCallback(async (machine, cwd, terminalId) => {
    // Reuse the exact endpoint handleTmuxLaunch uses. mode='tmux' with no
    // session_id tells the server to create a fresh psmux/tmux session,
    // run `claude` inside it, and attach — all in one call.
    const muxName = (MACHINE_INFO[machine] || {}).os === 'Windows' ? 'psmux' : 'tmux';
    try {
      const res = await apiFetch('/api/sessions/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          machine,
          cwd,
          mode: 'tmux',
          skip_permissions: skipPermissions,
          terminal_id: terminalId || null,
        }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Started in ${muxName} on ${machine}`, 'success');
      } else {
        toast(data.error || `Failed to start ${muxName} session`, 'error');
      }
    } catch (e) { toast(`Network error: ${e.message || e}`, 'error'); }
  }, [skipPermissions]);

  // ── Collapse / Expand All ────────────────────────────────────────────────
  const handleExpandAll = useCallback(() => {
    // Collect all known machine and project keys from current data
    const newState = {};
    const machineNames = [...new Set(sessions.map(s => s.machine).filter(Boolean))];
    const tmuxMachines = [...new Set(tmuxSessions.map(s => s.machine || 'unknown'))];
    for (const m of machineNames) { newState[m] = true; }
    for (const m of tmuxMachines) { newState[`tmux:${m}`] = true; }
    // Project keys (Machine view)
    for (const s of sessions) {
      const path = s.cwd || s.project_path || '';
      if (path && s.machine) { newState[`project:${s.machine}:${path}`] = true; }
    }
    setCollapseState(newState);
    // Project view: broadcast to ProjectsView to expand all project folders
    window.dispatchEvent(new CustomEvent('projectsSetAllExpanded', { detail: true }));
  }, [sessions, tmuxSessions]);

  const handleCollapseAll = useCallback(() => {
    const newState = {};
    const machineNames = [...new Set(sessions.map(s => s.machine).filter(Boolean))];
    const tmuxMachines = [...new Set(tmuxSessions.map(s => s.machine || 'unknown'))];
    for (const m of machineNames) { newState[m] = false; }
    for (const m of tmuxMachines) { newState[`tmux:${m}`] = false; }
    for (const s of sessions) {
      const path = s.cwd || s.project_path || '';
      if (path && s.machine) { newState[`project:${s.machine}:${path}`] = false; }
    }
    setCollapseState(newState);
    window.dispatchEvent(new CustomEvent('projectsSetAllExpanded', { detail: false }));
  }, [sessions, tmuxSessions]);

  // ── Tmux connect ──────────────────────────────────────────────────────────
  const handleConnectTmux = useCallback(async (session, terminalId) => {
    const name = session.session_name || session.name;
    const key = `${session.machine}-${name}`;
    setConnectingId(key);
    try {
      // Pre-flight liveness probe. Stops us from spawning a terminal window
      // for a tmux/psmux session that has died since the last scan (ghost
      // entry in the list). On verify failure we still proceed so the feature
      // degrades gracefully when the endpoint is unreachable.
      try {
        const vres = await apiFetch('/api/tmux/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ machine: session.machine, session_name: name }),
        });
        if (vres.ok) {
          const vdata = await vres.json();
          if (vdata && vdata.ok && vdata.alive === false) {
            const extra = vdata.error ? ` (${vdata.error})` : '';
            toast(`"${name}" is no longer running on ${session.machine}${extra} — refreshing list`, 'error');
            apiFetch('/api/sessions/scan', { method: 'POST' }).catch(() => {});
            return;
          }
        }
      } catch (_verr) {
        // Network error on verify — fall through and try the attach anyway.
      }

      const payload = {
        machine: session.machine,
        session_name: name,
        skip_permissions: skipPermissions,
        ...(terminalId ? { terminal_id: terminalId } : {}),
      };
      const res = await apiFetch('/api/tmux/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const text = await res.text();
      let data = {};
      try { data = JSON.parse(text); } catch { /* not json */ }
      if (!res.ok || data.ok === false) {
        const msg = data.error || text.slice(0, 300) || `HTTP ${res.status}`;
        console.error('[tmux-connect failed]', res.status, msg, payload);
        toast(`Attach failed (${res.status}): ${msg}`, 'error', 8000);
        return;
      }
      toast(`Attached to "${name}" on ${session.machine}`, 'success');
    } catch (e) {
      toast(`Network error: ${e.message || 'Could not reach server'}`, 'error');
    } finally {
      setConnectingId(null);
    }
  }, [skipPermissions]);

  // Clicking the attach button on a SessionCard: start the attach AND flash
  // the matching tmux card on the right pane so the user sees which session
  // they just attached to. Attach is fire-and-forget; the flash runs in
  // parallel so the UI responds even if SSH is slow.
  const handleAttachAndFlash = useCallback((tmuxSession, terminalId) => {
    if (!tmuxSession) return;
    const name = tmuxSession.session_name || tmuxSession.name;
    selectTmuxCard(tmuxSession.machine, name);
    handleConnectTmux(tmuxSession, terminalId);
  }, [handleConnectTmux, selectTmuxCard]);

  // ── Kill tmux session ────────────────────────────────────────────────────
  const [killingId, setKillingId] = useState(null);
  const [killConfirm, setKillConfirm] = useState(null); // key → timeout id
  const handleKillTmux = useCallback(async (session) => {
    const name = session.session_name || session.name;
    const key = `${session.machine}-${name}`;
    if (!killConfirm || !killConfirm[key]) {
      // First click: show confirm state, auto-reset after 3s
      const tid = setTimeout(() => setKillConfirm(prev => { const n = { ...prev }; delete n[key]; return n; }), 3000);
      setKillConfirm(prev => ({ ...(prev || {}), [key]: tid }));
      return;
    }
    // Second click: execute
    clearTimeout(killConfirm[key]);
    setKillConfirm(prev => { const n = { ...prev }; delete n[key]; return n; });
    setKillingId(key);
    try {
      const res = await apiFetch('/api/tmux/kill', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: session.machine, name }),
      });
      if (!res.ok) {
        const text = await res.text();
        toast(`Kill failed (${res.status}): ${text.slice(0, 120)}`, 'error');
        return;
      }
      const data = await res.json();
      if (data.ok) {
        toast(`Killed "${name}" on ${session.machine}`, 'success');
        // Server already pushed tmux update via WS, but also fetch as fallback
        apiFetch('/api/tmux').then(r => r.json()).then(d => { if (Array.isArray(d)) setTmuxSessions(d); }).catch(() => {});
      } else {
        toast(`Kill error on ${session.machine}: ${data.error || 'Unknown'}`, 'error');
      }
    } catch (e) {
      toast(`Network error killing "${name}": ${e.message || 'Could not reach server'}`, 'error');
    } finally {
      setKillingId(null);
    }
  }, [killConfirm]);

  // ── Remote attach (open terminal on the remote machine's display) ────────
  const [remoteAttachingId, setRemoteAttachingId] = useState(null);
  const handleRemoteAttach = useCallback(async (session) => {
    const name = session.session_name || session.name;
    const key = `${session.machine}-${name}`;
    setRemoteAttachingId(key);
    try {
      // Same pre-flight liveness probe as the regular Attach button. Without
      // this, clicking Remote on a ghost-tmux (host offline / psmux dead)
      // spawns a terminal that SSH-fails and then leaks psmux keystrokes
      // into the local zsh shell.
      try {
        const vres = await apiFetch('/api/tmux/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ machine: session.machine, session_name: name }),
        });
        if (vres.ok) {
          const vdata = await vres.json();
          if (vdata && vdata.ok && vdata.alive === false) {
            const extra = vdata.error ? ` (${vdata.error})` : '';
            toast(`"${name}" is no longer running on ${session.machine}${extra} — refreshing list`, 'error');
            apiFetch('/api/sessions/scan', { method: 'POST' }).catch(() => {});
            return;
          }
        }
      } catch (_verr) {
        // Network error on verify — fall through, attempt the attach anyway.
      }

      const res = await apiFetch('/api/tmux/connect-remote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: session.machine, session_name: name }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Opened terminal on ${session.machine}`, 'success');
      } else {
        toast(data.error || 'Remote attach failed', 'error');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setRemoteAttachingId(null);
    }
  }, []);

  // ── Render ────────────────────────────────────────────────────────────────
  return h(Fragment, null,
    h('div', {
      style: {
        height: '100vh', display: 'flex', flexDirection: 'column',
        overflow: 'hidden',
      }
    },

      // Header
      h(Header, {
        health, sessions, tmuxSessions, fleet,
        onScan: handleScan,
        scanning,
        scanProgress,
        skipPermissions,
        onSkipPermissionsChange: handleSkipPermissionsChange,
        showLogs,
        onToggleLogs: () => setShowLogs(v => !v),
        authStatus,
        onToggleSecurity: () => setShowSecurity(v => !v),
        updateStatus,
        onApplyUpdate: handleApplyUpdate,
        applyingUpdate,
      }),

      // Filter bar
      h(FilterBar, {
        sessions, tmuxSessions, fleet,
        filters, setFilters,
        archivedIds,
      }),

      // Main panels
      h('div', {
        className: 'main-panels',
        style: {
          display: 'flex', flex: 1, minHeight: 0,
          gap: 0, overflow: 'hidden',
        }
      },

        // Sessions panel
        h('div', {
          className: 'panel-sessions',
          style: {
            flex: '1 1 0', minWidth: 280,
            borderRight: '1px solid #30363d',
            display: 'flex', flexDirection: 'column',
            overflow: 'hidden',
          }
        },
          h('div', {
            style: {
              padding: '16px 16px 8px',
              borderBottom: '1px solid #21262d',
              flexShrink: 0,
              display: 'flex', alignItems: 'center', gap: 8,
            }
          },
            h('span', {
              style: {
                fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
                textTransform: 'uppercase', color: '#484f58',
              },
              title: 'Total unique projects across the fleet',
            }, (() => {
              const projectCount = new Set(
                (sessions || [])
                  .map(s => (s.git_remote || '').trim() || (s.project_path || s.cwd || '').split('/').filter(Boolean).pop() || '')
                  .filter(Boolean)
              ).size;
              return projectCount ? `Sessions · ${projectCount} projects` : 'Sessions';
            })()),
            // Project | Machine segmented toggle
            h('div', {
              style: {
                display: 'flex', borderRadius: 6, overflow: 'hidden',
                border: '1px solid #30363d', marginLeft: 8,
              }
            },
              ['project', 'machine'].map(v =>
                h('button', {
                  key: v,
                  className: 'btn',
                  onClick: () => {
                    setSessionsView(v);
                    try { localStorage.setItem('sessionsView', v); } catch {}
                  },
                  title: v === 'project' ? 'Group sessions by project (cross-machine)' : 'Group sessions by machine',
                  style: {
                    padding: '2px 10px', fontSize: '0.65rem', fontWeight: 600,
                    border: 'none', cursor: 'pointer', letterSpacing: '0.04em',
                    background: sessionsView === v ? '#1f3a5f' : 'none',
                    color: sessionsView === v ? '#58a6ff' : '#484f58',
                    textTransform: 'capitalize',
                    transition: 'background 0.15s, color 0.15s',
                  },
                }, v)
              ),
            ),
            h('div', { style: { flex: 1 } }),
            h('button', {
              className: 'btn',
              onClick: handleExpandAll,
              title: 'Expand all machine and project sections',
              style: {
                background: 'none', border: '1px solid #30363d', borderRadius: 4,
                color: '#8b949e', padding: '2px 8px', fontSize: '0.65rem',
                fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap',
              }
            }, '▼ Expand'),
            h('button', {
              className: 'btn',
              onClick: handleCollapseAll,
              title: 'Collapse all machine and project sections',
              style: {
                background: 'none', border: '1px solid #30363d', borderRadius: 4,
                color: '#8b949e', padding: '2px 8px', fontSize: '0.65rem',
                fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap',
              }
            }, '▲ Collapse'),
          ),
          h('div', {
            style: { flex: 1, overflowY: 'auto', padding: '12px 16px' }
          },
            loading
              ? h('div', {
                  style: {
                    display: 'flex', flexDirection: 'column', alignItems: 'center',
                    justifyContent: 'center', height: '200px', gap: 12, color: '#484f58',
                  }
                },
                  h('span', {
                    style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '2rem' }
                  }, '↻'),
                  h('span', { style: { fontSize: '0.875rem' } }, 'Scanning fleet...'),
                  h('span', { style: { fontSize: '0.78rem', textAlign: 'center' } }, 'Discovering machines\nand sessions'),
                )
              : sessionsView === 'project'
                ? h(ProjectsView, {
                    sessions: filteredSessions,
                    onLaunch: handleLaunch,
                    onTmuxLaunch: handleTmuxLaunch,
                    launchingId,
                    tmuxLaunchingId,
                    skipPermissions,
                    scanning,
                    pinnedIds,
                    onPin: handlePin,
                    onUnpin: handleUnpin,
                    onArchive: handleArchive,
                    onUnarchive: handleUnarchive,
                    archivedIds,
                    expandedCards,
                    onToggleExpand: handleToggleExpand,
                    hwCache,
                    fetchHardware,
                    wsUpdateCount: wsSessionUpdateCount,
                    getMatchingTmux,
                    onAttachTmux: handleAttachAndFlash,
                    onHighlightTmux: (t) => selectTmuxCard(t.machine, t.session_name || t.name),
                  })
                : h(SessionsPanel, {
                    sessions: filteredSessions,
                    onLaunch: handleLaunch,
                    onTmuxLaunch: handleTmuxLaunch,
                    launchingId,
                    tmuxLaunchingId,
                    skipPermissions,
                    scanning,
                    collapseState,
                    setCollapseState,
                    pinnedIds,
                    onPin: handlePin,
                    onUnpin: handleUnpin,
                    onArchive: handleArchive,
                    onUnarchive: handleUnarchive,
                    archivedIds,
                    expandedCards,
                    onToggleExpand: handleToggleExpand,
                    hwCache,
                    fetchHardware,
                    onNewSessionInProject: handleNewSessionInProject,
                    onNewTmuxInProject: handleNewTmuxInProject,
                    wsUpdateCount: wsSessionUpdateCount,
                    getMatchingTmux,
                    onAttachTmux: handleAttachAndFlash,
                    onHighlightTmux: (t) => selectTmuxCard(t.machine, t.session_name || t.name),
                  }),
          ),
        ),

        // Tmux panel
        h('div', {
          className: 'panel-tmux',
          style: {
            width: 320, flexShrink: 0,
            display: 'flex', flexDirection: 'column',
            overflow: 'hidden',
          }
        },
          h('div', {
            style: {
              padding: '16px 16px 8px',
              borderBottom: '1px solid #21262d',
              flexShrink: 0,
            }
          },
            h('span', {
              title: 'Terminal multiplexer sessions across all machines',
              style: {
                fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
                textTransform: 'uppercase', color: '#484f58',
              }
            }, 'Tmux / Psmux'),
          ),
          h('div', {
            style: { flex: 1, overflowY: 'auto', padding: '12px 16px', display: 'flex', flexDirection: 'column' }
          },
            loading
              ? h('div', {
                  style: {
                    display: 'flex', flexDirection: 'column', alignItems: 'center',
                    justifyContent: 'center', height: '160px', gap: 12, color: '#484f58',
                  }
                },
                  h('span', {
                    style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '2rem' }
                  }, '↻'),
                  h('span', { style: { fontSize: '0.875rem' } }, 'Scanning fleet...'),
                )
              : h(TmuxPanel, {
                  tmuxSessions: filteredTmux,
                  fleet,
                  onConnectTmux: handleConnectTmux,
                  connectingId,
                  onKillTmux: handleKillTmux,
                  killingId,
                  killConfirm,
                  onRemoteAttach: handleRemoteAttach,
                  remoteAttachingId,
                  onNewSession: () => setShowModal(true),
                  scanning,
                  collapseState,
                  setCollapseState,
                  paneStreams,
                  streamEnabled,
                  onToggleStream: toggleStream,
                  onSelectClaudeSession: selectClaudeSession,
                }),
          ),
        ),
      ),

      // Log panel (above fleet bar, collapsible)
      h(LogPanel, { visible: showLogs, onClose: () => setShowLogs(false) }),

      // Fleet bar
      h(FleetBar, { fleet, lastScan, wsConnected }),
    ),

    // Modal
    showModal && h(NewTmuxModal, {
      fleet,
      onClose: () => setShowModal(false),
      onCreated: () => {
        apiFetch('/api/tmux')
          .then(r => r.json())
          .then(d => { if (Array.isArray(d)) setTmuxSessions(d); })
          .catch(() => {});
      },
    }),

    // Security modal
    showSecurity && h(SecurityModal, {
      authStatus,
      onClose: () => setShowSecurity(false),
      onAuthStatusChange: (updated) => setAuthStatus(updated),
    }),

    // Toaster
    h(Toaster, null),
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root = createRoot(document.getElementById('root'));
root.render(h(App, null));
</script>
</body>
</html>
