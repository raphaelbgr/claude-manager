  <style>

<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react":            "https://esm.sh/react@19",
    "react-dom/client": "https://esm.sh/react-dom@19/client",
    "react/jsx-runtime":"https://esm.sh/react@19/jsx-runtime"

<script type="module">
import { createElement as h, useState, useEffect, useRef, useCallback, useMemo, Fragment, memo } from 'react';
import { createRoot } from 'react-dom/client';

// ─── Utility functions ────────────────────────────────────────────────────────

// ANSI SGR color code → HTML span converter
const ANSI_COLORS_16 = {
  30: '#484f58', 31: '#f85149', 32: '#56d364', 33: '#e3b341',
  34: '#58a6ff', 35: '#bc8cff', 36: '#76e3ea', 37: '#c9d1d9',
  90: '#6e7681', 91: '#ff7b72', 92: '#7ee787', 93: '#f2cc60',
  94: '#79c0ff', 95: '#d2a8ff', 96: '#a5d6ff', 97: '#f0f6fc',
};
const ANSI_COLORS_16_BG = {
  40: '#484f58', 41: '#5a1e1e', 42: '#1e3a1e', 43: '#3a3520',
  44: '#1e2d4a', 45: '#2d1e4a', 46: '#1e3a3a', 47: '#3b4048',
  100: '#6e7681', 101: '#7a2a2a', 102: '#2a5a2a', 103: '#5a5030',
  104: '#2a3d5a', 105: '#4a2d6a', 106: '#2a5a5a', 107: '#484f58',
};

function ansiToHtml(text) {
  if (!text) return '';
  const parts = [];
  let i = 0;
  let fg = null, bg = null, bold = false, dim = false, italic = false, underline = false;

  function styleStr() {
    const s = [];
    if (fg) s.push('color:' + fg);
    if (bg) s.push('background:' + bg);
    if (bold) s.push('font-weight:700');
    if (dim) s.push('opacity:0.6');
    if (italic) s.push('font-style:italic');
    if (underline) s.push('text-decoration:underline');
    return s.join(';');
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  while (i < text.length) {
    const esc = text.indexOf('\x1b[', i);
    if (esc === -1) {
      parts.push(escapeHtml(text.slice(i)));
      break;
    }
    if (esc > i) parts.push(escapeHtml(text.slice(i, esc)));

    const end = text.indexOf('m', esc + 2);
    if (end === -1) { parts.push(escapeHtml(text.slice(esc))); break; }

    const codes = text.slice(esc + 2, end).split(';').map(Number);
    let ci = 0;
    while (ci < codes.length) {
      const c = codes[ci];
      if (c === 0) { fg = null; bg = null; bold = false; dim = false; italic = false; underline = false; }
      else if (c === 1) bold = true;
      else if (c === 2) dim = true;
      else if (c === 3) italic = true;
      else if (c === 4) underline = true;
      else if (c === 22) { bold = false; dim = false; }
      else if (c === 23) italic = false;
      else if (c === 24) underline = false;
      else if (c === 39) fg = null;
      else if (c === 49) bg = null;
      else if (c >= 30 && c <= 37) fg = ANSI_COLORS_16[bold ? c + 60 : c] || ANSI_COLORS_16[c];
      else if (c >= 90 && c <= 97) fg = ANSI_COLORS_16[c];
      else if (c >= 40 && c <= 47) bg = ANSI_COLORS_16_BG[c];
      else if (c >= 100 && c <= 107) bg = ANSI_COLORS_16_BG[c];
      else if (c === 38 && codes[ci + 1] === 5) { // 256-color fg
        const idx = codes[ci + 2] || 0;
        fg = ansi256ToHex(idx); ci += 2;
      } else if (c === 48 && codes[ci + 1] === 5) { // 256-color bg
        const idx = codes[ci + 2] || 0;
        bg = ansi256ToHex(idx); ci += 2;
      }
      ci++;
    }

    const st = styleStr();
    if (st) parts.push('</span><span style="' + st + '">');
    else parts.push('</span><span>');

    i = end + 1;
  }

  return '<span>' + parts.join('') + '</span>';
}

function ansi256ToHex(n) {
  if (n < 16) {
    const basic = [
      '#000000','#aa0000','#00aa00','#aa5500','#0000aa','#aa00aa','#00aaaa','#aaaaaa',
      '#555555','#ff5555','#55ff55','#ffff55','#5555ff','#ff55ff','#55ffff','#ffffff',
    ];
    return basic[n] || '#c9d1d9';
  }
  if (n < 232) {
    const i = n - 16;
    const r = Math.floor(i / 36) * 51;
    const g = Math.floor((i % 36) / 6) * 51;
    const b = (i % 6) * 51;
    return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
  }
  const gray = (n - 232) * 10 + 8;
  return '#' + gray.toString(16).padStart(2,'0').repeat(3);
}

function relativeTime(isoStr) {
  if (!isoStr) return '—';
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 5)   return 'just now';
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function shortenPath(p) {
  if (!p) return '';
  const parts = p.replace(/\\/g, '/').split('/').filter(Boolean);
  if (parts.length <= 2) return parts.join('/');
  return parts.slice(-2).join('/');
}

function groupBy(arr, key) {
  const out = {};
  for (const item of arr) {
    const k = typeof key === 'function' ? key(item) : item[key];
    if (!out[k]) out[k] = [];
    out[k].push(item);
  }
  return out;
}

function clsx(...args) {
  return args.filter(Boolean).join(' ');
}

// ─── Icon helper (Material Icons Round) ──────────────────────────────────────

function Icon({ name, size = 16, style: extraStyle = {}, title }) {
  return h('span', {
    className: 'material-icons-round',
    title,
    style: {
      fontSize: `${size}px`,
      verticalAlign: 'middle',
      lineHeight: 1,
      userSelect: 'none',
      ...extraStyle,
    },
  }, name);
}

// ─── Machine / Design System ──────────────────────────────────────────────────

const MACHINE_INFO = {
  'mac-mini':        { ip: '192.168.7.102', os: 'macOS',   osIcon: 'laptop_mac' },
  'ubuntu-desktop':  { ip: '192.168.7.13',  os: 'Linux',   osIcon: 'computer' },
  'avell-i7':        { ip: '192.168.7.103', os: 'Windows', osIcon: 'desktop_windows' },
  'windows-desktop': { ip: '192.168.7.101', os: 'Windows', osIcon: 'desktop_windows' },
};

// Detect local machine from the page's hostname (API host).
// If served from one of the known IPs, map it back to a machine name.
function detectLocalMachine() {
  const h = location.hostname;
  for (const [name, info] of Object.entries(MACHINE_INFO)) {
    if (h === info.ip || h === name || h === 'localhost' || h === '127.0.0.1') {
      // localhost / 127.0.0.1 → assume mac-mini (the primary orchestrator)
      if (h === 'localhost' || h === '127.0.0.1') return 'mac-mini';
      return name;
    }
  }
  return 'mac-mini'; // fallback
}

const LOCAL_MACHINE = detectLocalMachine();

function isLocalMachine(machine) {
  return machine === LOCAL_MACHINE;
}

function getMachineOS(machine) {
  return MACHINE_INFO[machine]?.os || 'unknown';
}

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(1) + ' GB';
}

// ─── Badge Component ──────────────────────────────────────────────────────────

function Badge({ text, color = '#8b949e', bg = '#21262d', border = '#30363d', icon, title }) {
  return h('span', {
    title,
    style: {
      display: 'inline-flex', alignItems: 'center', gap: 4,
      fontSize: '0.65rem', fontWeight: 600,
      padding: '2px 8px', borderRadius: 12,
      background: bg, color: color, border: `1px solid ${border}`,
      whiteSpace: 'nowrap',
      fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
    }
  }, icon && h('span', { style: { fontSize: '0.7rem' } }, icon), text);
}

function MachineBadge({ machine }) {
  const info = MACHINE_INFO[machine] || {};
  const local = isLocalMachine(machine);
  if (local) {
    return h(Badge, { text: 'LOCAL', color: '#3fb950', bg: '#1a3a2a', border: '#2a5a3a' });
  }
  const label = info.ip ? `${machine} (${info.ip})` : machine;
  return h(Badge, { text: label, color: '#8b949e', bg: '#21262d', border: '#30363d' });
}

function OsBadge({ machine }) {
  const info = MACHINE_INFO[machine] || {};
  const os = info.os || 'unknown';
  const iconName = info.osIcon || 'computer';
  return h('span', {
    style: {
      display: 'inline-flex', alignItems: 'center', gap: 4,
      fontSize: '0.65rem', fontWeight: 600,
      padding: '2px 8px', borderRadius: 12,
      background: '#21262d', color: '#8b949e', border: '1px solid #30363d',
      whiteSpace: 'nowrap',
      fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
    }
  },
    h('span', {
      className: 'material-icons-round',
      style: { fontSize: '10px', verticalAlign: 'middle', lineHeight: 1 },
    }, iconName),
    os,
  );
}

// ─── Toast system ─────────────────────────────────────────────────────────────

let _addToast = null;
function toast(msg, type = 'info') {
  if (_addToast) _addToast(msg, type);
}

function Toaster() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    _addToast = (msg, type) => {
      const id = Date.now() + Math.random();
      setToasts(t => [...t, { id, msg, type }]);
      setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    };
    return () => { _addToast = null; };
  }, []);

  return h('div', { className: 'toaster' },
    toasts.map(t =>
      h('div', { key: t.id, className: `toast ${t.type}` }, t.msg)
    )
  );
}

// ─── WebSocket hook ───────────────────────────────────────────────────────────

function useWebSocket(onMessage, onReconnect) {
  const wsRef = useRef(null);
  const reconnectTimer = useRef(null);
  const retryCount = useRef(0);
  const [connected, setConnected] = useState(false);
  const onReconnectRef = useRef(onReconnect);
  onReconnectRef.current = onReconnect;

  const connect = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState < 2) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    wsRef.current = ws;

    ws.onopen = () => {
      setConnected(true);
      retryCount.current = 0;
      ['sessions', 'tmux', 'fleet'].forEach(ch =>
        ws.send(JSON.stringify({ type: 'subscribe', channel: ch }))
      );
      // Re-subscribe to active pane streams after reconnect
      if (onReconnectRef.current) onReconnectRef.current(ws);
    };

    ws.onmessage = evt => {
      try { onMessage(JSON.parse(evt.data)); } catch {}
    };

    ws.onclose = () => {
      setConnected(false);
      const delay = Math.min(1000 * Math.pow(2, retryCount.current), 30000);
      retryCount.current++;
      reconnectTimer.current = setTimeout(connect, delay);
    };

    ws.onerror = () => { ws.close(); };
  }, [onMessage]);

  useEffect(() => {
    connect();
    return () => {
      clearTimeout(reconnectTimer.current);
      wsRef.current?.close();
    };
  }, [connect]);

  return { connected, wsRef };
}

// ─── Status Dot ──────────────────────────────────────────────────────────────

const STATUS_DOT_TITLES = {
  working: 'Working — Claude is actively generating output',
  active:  'Active — Claude Code is running, waiting for input',
  idle:    'Idle — session exists but Claude Code is not currently running',
};

function StatusDot({ status, pulse = false }) {
  return h('span', {
    className: clsx('status-dot', status, pulse && (status === 'active' || status === 'working') && 'pulse'),
    title: STATUS_DOT_TITLES[status] || status,
  });
}

// ─── Session Card ─────────────────────────────────────────────────────────────

function SessionCard({ session, onLaunch, onTmuxLaunch, launching, tmuxLaunching, skipPermissions, onPin, onUnpin, isPinned, onArchive, onUnarchive, isArchived, expanded, onToggleExpand, inMachineSection, hwCache, fetchHardware, onRename }) {
  const isWorking = session.status === 'working';
  const isActive = session.status === 'active' || isWorking;
  const effectivePath = session.cwd || session.project_path || session.project_folder || '';
  const projectName = shortenPath(effectivePath);
  const summary = session.summary || '(no message preview)';
  const [copied, setCopied] = useState(false);
  const [renaming, setRenaming] = useState(false);
  const [renameName, setRenameName] = useState('');

  const sessionId = session.session_id || '';
  const local = isLocalMachine(session.machine);
  const os = getMachineOS(session.machine);

  const handleCopy = (e) => {
    e.stopPropagation();
    const cmd = `claude --resume ${sessionId}`;
    navigator.clipboard.writeText(cmd).then(() => {
      setCopied(true);
      toast('Copied resume command', 'info');
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => { toast('Failed to copy', 'error'); });
  };

  const handleRename = async () => {
    const res = await fetch('/api/sessions/rename', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ machine: session.machine, session_id: session.session_id, pid: session.pid, name: renameName }),
    });
    const data = await res.json();
    if (data.ok) {
      session.name = renameName;
      if (onRename) onRename(session.session_id, renameName);
      toast('Session renamed', 'success');
      setRenaming(false);
    } else {
      toast(data.error || 'Rename failed', 'error');
    }
  };

  const launchBg    = local ? '#1f3a5f' : '#3a2200';
  const launchColor = local ? '#58a6ff' : '#e3b341';
  const launchBorder = local ? '#2d4f7a' : '#5a3a00';
  const muxType = os === 'Windows' ? 'psmux' : 'tmux';
  // Full labels for expanded card buttons
  const launchLabel = local ? 'Resume in terminal' : 'Resume via SSH';
  const tmuxLabel = local ? `Resume in ${muxType}` : `Resume via SSH + ${muxType}`;
  // Short labels for compact row buttons
  const launchShort = local ? 'Resume' : 'SSH Resume';
  const tmuxShort = local ? muxType : `SSH + ${muxType}`;

  // ── Collapsed compact row ────────────────────────────────────────────────
  const compactRow = h('div', {
    className: 'session-card-compact',
    onClick: onToggleExpand,

  },
    // Status dot
    h(StatusDot, { status: session.status, pulse: true }),

    // Project name (bold)
    h('span', {
      style: {
        fontWeight: 600, fontSize: '0.82rem', color: '#e6edf3',
        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        maxWidth: '28%', flexShrink: 0,
      },
      title: effectivePath,
    }, projectName),

    // Custom session name in parentheses (muted)
    session.name && h('span', {
      style: { fontSize: '0.72rem', color: '#8b949e', whiteSpace: 'nowrap', flexShrink: 0 },
      title: `Custom session name (set via /rename in Claude Code)`,
    }, `(${session.name})`),

    // Status badge (only working/active — compact, no machine stats)
    isWorking && h('span', {
      style: { fontSize: '0.6rem', fontWeight: 700, color: '#e3b341', flexShrink: 0, letterSpacing: '0.04em' }
    }, 'WORKING'),
    !isWorking && isActive && h('span', {
      style: { fontSize: '0.6rem', fontWeight: 700, color: '#3fb950', flexShrink: 0, letterSpacing: '0.04em' }
    }, 'ACTIVE'),

    // Archived badge
    isArchived && h('span', {
      style: {
        fontSize: '0.6rem', fontWeight: 700, color: '#a371f7', flexShrink: 0,
        letterSpacing: '0.04em',
        background: '#2a1a3a', borderRadius: 4, padding: '1px 5px',

    // Stats — message count, size, time (compact essentials only)
    h('span', {

      style: { fontSize: '0.65rem', color: '#8b949e', fontFamily: 'monospace', whiteSpace: 'nowrap', flexShrink: 0 },

    h('span', {
      style: { fontSize: '0.65rem', color: '#484f58', fontFamily: 'monospace', whiteSpace: 'nowrap', flexShrink: 0 },
      title: `Last activity: ${session.modified || 'unknown'}`,

      launching ? '…' : launchShort,

    // tmux/psmux launch button
    h('button', {
      className: `compact-action-btn btn btn-tmux${tmuxLaunching ? '' : ''}`,

    ),

    // Archive button
    h('button', {

    },
      h('span', { className: 'material-icons-round', style: { fontSize: '12px' } }, 'archive'),
    ),

    // Expand toggle icon
    h('span', {
      className: 'material-icons-round',
      style: { color: '#484f58', fontSize: '16px', flexShrink: 0, userSelect: 'none', verticalAlign: 'middle' },
      title: expanded ? 'Click to collapse session details' : 'Click to show full session details',

  // ── Expanded details section ─────────────────────────────────────────────
  const expandedSection = expanded && h('div', { className: 'session-card-expanded' },
    // Summary
    h('div', {
      style: {
        fontSize: '0.75rem', color: '#6e7681', fontStyle: 'italic',
        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        marginBottom: 6,
      },
      title: summary,
    }, `"${summary}"`),

    // CWD (full path, monospace)
    effectivePath && h('div', {
      style: {
        fontSize: '0.68rem', color: '#8b949e',
        fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',

    // Session ID + copy + rename

        },

      !renaming && h('button', {
        className: 'btn',
        onClick: handleCopy,

        style: {

        }
      },
        h('span', {
          className: 'material-icons-round',
          style: { fontSize: '14px', verticalAlign: 'middle' },
        }, copied ? 'check' : 'content_copy'),
      ),

      // Session name display
      !renaming && session.name && h('span', {
        style: { fontSize: '0.72rem', color: '#8b949e', whiteSpace: 'nowrap' }
      }, `"${session.name}"`),

      // Rename button (only for active/working sessions)
      isActive && !renaming && h('button', {
        className: 'compact-action-btn',
        onClick: () => { setRenaming(true); setRenameName(session.name || ''); },
        title: 'Rename this session (equivalent to /rename in Claude Code)',
      }, h(Icon, { name: 'edit', size: 11 }), ' Rename'),

      // Inline rename form
      renaming && h('div', { style: { display: 'flex', gap: 6, alignItems: 'center', flex: 1, minWidth: 0 } },
        h('input', {
          className: 'form-input',
          value: renameName,
          onChange: e => setRenameName(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter') handleRename(); if (e.key === 'Escape') setRenaming(false); },
          style: { fontSize: '0.78rem', padding: '3px 8px', flex: 1 },

        h('button', { className: 'compact-action-btn btn-launch', onClick: handleRename }, 'Save'),
        h('button', { className: 'compact-action-btn', onClick: () => setRenaming(false) }, 'Cancel'),
      ),

      h('span', {
        title: `${session.machine} at ${(MACHINE_INFO[session.machine] || {}).ip || 'unknown IP'} — ${isLocalMachine(session.machine) ? 'local' : 'remote'} machine running ${getMachineOS(session.machine)}`,
      }, h(MachineBadge, { machine: session.machine })),
      h('span', {
        title: `Operating system: ${getMachineOS(session.machine)}`,
      }, h(OsBadge, { machine: session.machine })),
      session.cpu_percent > 0 && h(Badge, {
        text: `${session.cpu_percent}% CPU`,
        color: session.cpu_percent > 30 ? '#e3b341' : '#8b949e',

        text: `${session.subprocess_count} subprocesses`,
        color: '#8b949e',
        title: `Number of child processes spawned by this Claude Code session`,

        className: 'compact-action-btn',

          cursor: 'default',
          fontSize: '0.62rem',

          color: session.git_branch === 'HEAD' ? '#e3b341' : '#7ee787',

      },
        h('span', { className: 'material-icons-round', style: { fontSize: '11px' } }, 'account_tree'),
        ' ' + session.git_branch,

    h('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap' } },
      h('button', {
        className: 'btn',
        onClick: () => onLaunch(session),
        disabled: launching,
        title: local
          ? `Open a new terminal and resume this Claude Code session on ${session.machine || 'local'}`
          : `Open a new terminal and resume this Claude Code session via SSH on ${session.machine}`,
        style: {
          fontSize: '0.72rem', fontWeight: 600,
          background: launchBg, color: launchColor,
          border: `1px solid ${launchBorder}`, borderRadius: 6,

      }, launching ? 'Resuming…' : launchLabel),

        className: 'btn',
        onClick: () => onTmuxLaunch(session),
        disabled: tmuxLaunching,
        title: local
          ? `Create a new ${muxType} session on ${session.machine || 'local'} and resume Claude Code inside it`
          : `Create a new ${muxType} session on ${session.machine} via SSH and resume Claude Code inside it`,
        style: {
          fontSize: '0.72rem', fontWeight: 600,
          background: '#1a3a2a', color: '#3fb950',
          border: '1px solid #2a5a3a', borderRadius: 6,
          padding: '4px 12px', cursor: tmuxLaunching ? 'not-allowed' : 'pointer',
          opacity: tmuxLaunching ? 0.6 : 1,
        }
      }, tmuxLaunching ? 'Resuming…' : tmuxLabel),
    ),
  );

  return h('div', { className: clsx('session-card', isArchived && 'session-card-archived') },
    compactRow,
    expandedSection,
  );
}

// ─── Tmux Card ────────────────────────────────────────────────────────────────

function TmuxCard({ session, onConnect, connecting, onKill, killing, onRemoteAttach, remoteAttaching, confirmKill, paneContent, streamOn, onToggleStream }) {
  const isAttached = session.attached;
  const local = isLocalMachine(session.machine);
  const muxOS = (MACHINE_INFO[session.machine] || {}).os || 'macOS';
  const muxName = muxOS === 'Windows' ? 'psmux' : 'tmux';
  const sessionName = session.session_name || session.name || '(unnamed)';

  const containerRef = useRef(null);
  const innerRef = useRef(null);
  useEffect(() => {
    const container = containerRef.current;
    const inner = innerRef.current;
    if (!container || !inner) return;
    // Reset scale to measure natural size
    inner.style.transform = 'none';
    const cw = container.clientWidth - 20; // account for padding
    const ch = container.clientHeight - 16;
    const sw = inner.scrollWidth;
    const sh = inner.scrollHeight;
    if (sw > 0 && sh > 0) {
      const scale = Math.min(1, cw / sw, ch / sh);
      inner.style.transform = `scale(${scale})`;
    }
  }, [paneContent]);

  // Recalculate scale on container resize (user drags handle)
  useEffect(() => {
    const container = containerRef.current;
    if (!container || typeof ResizeObserver === 'undefined') return;
    const ro = new ResizeObserver(() => {
      const inner = innerRef.current;
      if (!inner) return;
      inner.style.transform = 'none';
      const cw = container.clientWidth - 20;
      const ch = container.clientHeight - 16;
      const sw = inner.scrollWidth;
      const sh = inner.scrollHeight;
      if (sw > 0 && sh > 0) {
        inner.style.transform = `scale(${Math.min(1, cw / sw, ch / sh)})`;
      }
    });
    ro.observe(container);
    return () => ro.disconnect();
  }, []);

  return h('div', { className: 'tmux-card' },
    h('div', { style: { flex: 1, minWidth: 0 } },
      // Session name
      h('div', {
        title: `${muxName} session name`,
        style: {
          fontSize: '0.85rem', fontWeight: 700, color: '#e6edf3',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          marginBottom: session.cwd ? 2 : 5,
        }
      }, sessionName),

      // Working directory (when available)
      session.cwd && h('div', {
        style: {
          fontSize: '0.68rem', color: '#8b949e',
          fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          marginBottom: 5,
        },
        title: `Working directory of the active pane: ${session.cwd}`,
      }, session.cwd),

      // Badge row
      h('div', {
        style: { display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center', marginBottom: 8 }
      },
        h('span', {
          title: `${session.machine} at ${(MACHINE_INFO[session.machine] || {}).ip || 'unknown IP'} — ${isLocalMachine(session.machine) ? 'local' : 'remote'} machine`,
        }, h(MachineBadge, { machine: session.machine })),
        h('span', {
          title: `Operating system: ${getMachineOS(session.machine)}`,
        }, h(OsBadge, { machine: session.machine })),
        session.windows != null && h(Badge, { text: `${session.windows} win`, title: `Number of windows in this ${muxName} session` }),
        isAttached && h(Badge, { text: 'attached', color: '#58a6ff', bg: '#1f3a5f', border: '#2d4f7a', title: 'A client is currently attached to this session' }),
      ),

      // Action buttons — compact single row, text only
      h('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap' } },
        h('button', {
          className: 'compact-action-btn btn',
          onClick: (e) => { e.stopPropagation(); onKill(session); },
          disabled: killing,
          title: confirmKill
            ? `Click again to confirm — this will terminate "${sessionName}" on ${session.machine}`
            : local
              ? `Terminate this ${muxName} session (click twice to confirm)`
              : `Terminate this ${muxName} session on ${session.machine} (click twice to confirm)`,
          style: {
            borderColor: confirmKill ? '#7a2a2a' : '#5a2a2a',
            color: '#f85149',
            background: confirmKill ? '#5a2a2a' : undefined,
            opacity: killing ? 0.6 : 1,
          },
        }, killing ? 'Killing…' : confirmKill ? 'Confirm?' : 'Kill'),
        !local && h('button', {
          className: 'compact-action-btn btn',
          onClick: (e) => { e.stopPropagation(); onRemoteAttach(session); },
          disabled: remoteAttaching,
          title: `Open a terminal directly on ${session.machine}'s own display attached to this session`,
          style: {
            borderColor: '#3a2a5a',
            color: '#a371f7',
            opacity: remoteAttaching ? 0.6 : 1,
          },
        }, remoteAttaching ? 'Opening…' : 'Remote'),
        h('button', {
          className: `compact-action-btn btn btn-tmux`,
          onClick: (e) => { e.stopPropagation(); onConnect(session); },
          disabled: connecting,
          title: local
            ? `Attach to this ${muxName} session in a new terminal window`
            : `Open a local terminal and attach to this ${muxName} session on ${session.machine}`,
          style: { opacity: connecting ? 0.6 : 1 },
        }, connecting ? 'Attaching…' : 'Attach'),
      ),

      // Stream toggle + terminal preview
      h('div', { style: { marginTop: 8 } },
        // Checkbox row
        h('label', {
          style: {
            display: 'flex', alignItems: 'center', gap: 6,
            fontSize: '0.72rem', color: '#8b949e', cursor: 'pointer',
            userSelect: 'none',
          },
          title: 'Enable live streaming of this session\'s terminal output',
        },
          h('input', {
            type: 'checkbox',
            checked: streamOn,
            onChange: () => onToggleStream(session.machine, session.session_name || session.name),
            style: { accentColor: '#58a6ff', cursor: 'pointer' },
          }),
          h('span', { className: 'material-icons-round', style: { fontSize: '0.85rem', color: streamOn ? '#58a6ff' : '#484f58' } }, 'cast'),
          'Stream session',
        ),

        // Terminal preview (only when streaming is on and content exists)
        streamOn && paneContent && h('div', {
          ref: containerRef,
          style: {
            marginTop: 6,
            background: '#0d1117',
            border: '1px solid #21262d',
            borderRadius: 6,
            padding: '8px 10px',
            height: 160,
            minHeight: 80,
            maxHeight: 600,
            resize: 'vertical',
            overflow: 'hidden',
            position: 'relative',
          },
          title: 'Live terminal output (read-only, no TTY attached) — drag bottom edge to resize',
        },
          h('div', {
            ref: innerRef,
            style: {
              fontFamily: '"SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace',
              fontSize: '0.7rem',
              lineHeight: 1.4,
              color: '#c9d1d9',
              whiteSpace: 'pre',
              wordBreak: 'normal',
              transformOrigin: 'top left',
            },
            dangerouslySetInnerHTML: { __html: ansiToHtml(paneContent) },
          }),
        ),

        // Loading indicator when streaming but no content yet
        streamOn && !paneContent && h('div', {
          style: {
            marginTop: 6, fontSize: '0.65rem', color: '#484f58',
            display: 'flex', alignItems: 'center', gap: 4,
          }
        },
          h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '0.7rem' } }, '\u21bb'),
          'Waiting for stream\u2026',
        ),
      ),
    ),
  );
}

const TmuxCardMemo = memo(TmuxCard);

// ─── Hardware Info Component ──────────────────────────────────────────────────

function HardwareInfo({ machine, hwCache, fetchHardware }) {
  const cached = hwCache[machine];

  useEffect(() => {
    if (!cached || Date.now() - cached.timestamp > 30000) {
      fetchHardware(machine);
    }
  }, [machine]);

  if (!cached) return h('div', {
    style: { fontSize: '0.7rem', color: '#484f58', fontFamily: 'monospace', marginTop: 6, display: 'flex', alignItems: 'center', gap: 6 }
  },
    h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '0.7rem' } }, '↻'),
    'Loading hardware info…',
  );

  if (cached.error) return h('div', {
    style: { fontSize: '0.7rem', color: '#484f58', fontFamily: 'monospace', marginTop: 6 }
  }, `hw: ${cached.error}`);

  const { cpu, gpus, memory } = cached.data || {};

  const cpuColor = cpu && cpu.percent > 70 ? '#f85149' : cpu && cpu.percent > 40 ? '#e3b341' : '#8b949e';
  const ramColor = memory && (memory.used / memory.total) > 0.85 ? '#f85149' : memory && (memory.used / memory.total) > 0.7 ? '#e3b341' : '#8b949e';

  return h('div', {
    style: { fontSize: '0.7rem', color: '#6e7681', fontFamily: 'monospace', marginTop: 6, display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center' }
  },
    cpu && h('span', null,
      h('span', { style: { color: '#484f58' } }, 'CPU: '),
      h('span', { style: { color: '#8b949e' } }, `${cpu.name || 'CPU'}${cpu.cores ? ` (${cpu.cores} cores)` : ''}`),
      cpu.percent != null && h('span', { style: { color: cpuColor } }, ` ${cpu.percent}%`),
    ),

    gpus && gpus.length > 0 && gpus.map((gpu, i) => {
      const tempColor = gpu.temp > 80 ? '#f85149' : gpu.temp > 60 ? '#e3b341' : '#8b949e';
      return h('span', { key: i },
        h('span', { style: { color: '#484f58' } }, i === 0 ? ' | GPU: ' : ' | '),
        h('span', { style: { color: '#8b949e' } }, gpu.name || 'GPU'),
        gpu.vram && h('span', { style: { color: '#6e7681' } }, ` ${gpu.vram}`),
        gpu.temp != null && h('span', { style: { color: tempColor } }, ` ${gpu.temp}°C`),
        gpu.percent != null && h('span', { style: { color: '#8b949e' } }, ` ${gpu.percent}%`),
      );
    }),

    memory && h('span', null,
      h('span', { style: { color: '#484f58' } }, ' | RAM: '),
      h('span', { style: { color: ramColor } }, `${memory.used != null ? memory.used.toFixed(1) : '?'}/${memory.total != null ? memory.total.toFixed(1) : '?'} GB`),
      memory.total > 0 && h('span', { style: { color: '#484f58' } }, ` (${Math.round(memory.used / memory.total * 100)}%)`),
    ),
  );
}

// ─── Machine Section ──────────────────────────────────────────────────────────

function MachineSection({ machine, children, count, collapseKey, collapseState, setCollapseState }) {
  // Use local state for instant toggle — sync to parent for persistence
  const defaultVal = collapseState && collapseKey && collapseState[collapseKey] !== undefined
    ? collapseState[collapseKey] : true;
  const [isOpen, setIsOpen] = useState(defaultVal);

  const toggle = useCallback((e) => {
    e.stopPropagation();
    setIsOpen(prev => {
      const next = !prev;
      if (setCollapseState && collapseKey) {
        setCollapseState(p => ({ ...p, [collapseKey]: next }));
      }
      return next;
    });
  }, [collapseKey, setCollapseState]);

  return h('div', { className: 'machine-section' },
    h('div', {
      className: 'machine-header',
      onClick: toggle,
      title: `Click to ${isOpen ? 'collapse' : 'expand'} sessions from ${machine}`,
    },
      h('span', {
        style: { color: '#8b949e', fontSize: '0.75rem', transition: 'transform 0.15s',
          display: 'inline-block',
          transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)' }
      }, '▶'),
      h('span', { style: { color: '#8b949e', fontFamily: 'monospace' } }, machine),
      count != null && h('span', {
        style: {
          background: '#21262d', color: '#8b949e', fontSize: '0.65rem',
          borderRadius: 20, padding: '1px 7px', marginLeft: 4,
        }
      }, count),
    ),
    isOpen && h('div', { style: { paddingLeft: 8 } }, children),
  );
}

// ─── Project Section ──────────────────────────────────────────────────────────

const PROJECT_SECTION_MAX = 20; // max cards before showing "Show all N" button

function ProjectSection({ projectPath, children, count, defaultOpen: defOpen = true, collapseKey, collapseState, setCollapseState }) {
  const shortPath = shortenPath(projectPath) || projectPath || '(unknown)';
  const [showAll, setShowAll] = useState(false);

  const defaultVal = collapseState && collapseKey && collapseState[collapseKey] !== undefined
    ? collapseState[collapseKey] : defOpen;
  const [isOpen, setIsOpen] = useState(defaultVal);

  const toggle = useCallback((e) => {
    e.stopPropagation();
    setIsOpen(prev => {
      const next = !prev;
      if (setCollapseState && collapseKey) {
        setCollapseState(p => ({ ...p, [collapseKey]: next }));
      }
      return next;
    });
  }, [collapseKey, setCollapseState]);

  // Slice children array when over the limit (avoids rendering 100+ cards at once)
  const childArray = Array.isArray(children) ? children : (children ? [children] : []);
  const totalChildren = childArray.length;
  const needsTruncation = totalChildren > PROJECT_SECTION_MAX && !showAll;
  const visibleChildren = needsTruncation ? childArray.slice(0, PROJECT_SECTION_MAX) : childArray;
  const hiddenCount = totalChildren - PROJECT_SECTION_MAX;

  return h('div', { style: { marginLeft: 8, marginBottom: 4 } },
    h('div', {
      onClick: toggle,
      title: `Click to ${isOpen ? 'collapse' : 'expand'} sessions in ${projectPath}`,
      style: {
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 8px', cursor: 'pointer',
        borderRadius: 4, fontSize: '0.75rem',
        transition: 'background 0.15s',
      },
      onMouseEnter: e => { e.currentTarget.style.background = '#161b22'; },
      onMouseLeave: e => { e.currentTarget.style.background = 'transparent'; },
    },
      h('span', {
        style: {
          color: '#484f58', fontSize: '0.65rem', transition: 'transform 0.15s',
          display: 'inline-block', transform: isOpen ? 'rotate(90deg)' : 'rotate(0)',
        }
      }, '▶'),
      h('span', {
        style: { color: '#8b949e', fontFamily: 'monospace', fontSize: '0.75rem' }
      }, shortPath),
      h('span', {
        style: {
          background: '#161b22', color: '#484f58', fontSize: '0.6rem',
          borderRadius: 10, padding: '1px 6px', marginLeft: 4,
        }
      }, count),
    ),
    isOpen && h('div', { style: { paddingLeft: 4 } },
      visibleChildren,
      needsTruncation && h('button', {
        onClick: () => setShowAll(true),
        style: {
          background: 'none', border: 'none', color: '#58a6ff',
          fontSize: '0.72rem', cursor: 'pointer', padding: '4px 8px',
          textDecoration: 'underline', display: 'block',
        },
      }, `Show ${hiddenCount} more…`),
    ),
  );
}

// ─── New Tmux Modal ───────────────────────────────────────────────────────────

function NewTmuxModal({ fleet, onClose, onCreated }) {
  const machines = Object.keys(fleet || {});
  const [machine, setMachine] = useState(machines[0] || '');
  const [name, setName] = useState('');
  const [cwd, setCwd] = useState('');
  const [command, setCommand] = useState('');
  const [creating, setCreating] = useState(false);
  const [browseOpen, setBrowseOpen] = useState(false);
  const [browsePath, setBrowsePath] = useState('');
  const [browseDirs, setBrowseDirs] = useState([]);
  const [browseLoading, setBrowseLoading] = useState(false);
  const [drives, setDrives] = useState([]);
  const [drivesCache, setDrivesCache] = useState({});
  const [newFolderMode, setNewFolderMode] = useState(false);
  const [newFolderName, setNewFolderName] = useState('');
  const [newFolderCreating, setNewFolderCreating] = useState(false);
  const prevMachineRef = useRef(machine);

  const fetchDrives = async (m) => {
    if (drivesCache[m]) {
      setDrives(drivesCache[m]);
      return drivesCache[m];
    }
    try {
      const res = await fetch('/api/drives', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: m }),
      });
      const data = await res.json();
      if (data.ok) {
        setDrives(data.drives);
        setDrivesCache(prev => ({ ...prev, [m]: data.drives }));
        return data.drives;
      }
    } catch (e) {
      // silently ignore — drives are optional
    }
    return [];
  };

  const fetchDirs = async (path) => {
    setBrowseLoading(true);
    try {
      const res = await fetch('/api/browse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, path: path || '' }),
      });
      const data = await res.json();
      if (data.ok) {
        setBrowsePath(data.path);
        setBrowseDirs(data.dirs);
      } else {
        toast(data.error || 'Browse failed', 'error');
      }
    } catch (e) {
      toast('Network error browsing directory', 'error');
    } finally {
      setBrowseLoading(false);
    }
  };

  // When machine changes while browser is open — reset and re-fetch
  useEffect(() => {
    if (browseOpen && machine !== prevMachineRef.current) {
      prevMachineRef.current = machine;
      setDrives([]);
      fetchDrives(machine);
      fetchDirs('');
    }
    prevMachineRef.current = machine;
  }, [machine, browseOpen]);

  const handleBrowseToggle = async () => {
    if (browseOpen) {
      setBrowseOpen(false);
      setNewFolderMode(false);
      setNewFolderName('');
    } else {
      setBrowseOpen(true);
      await Promise.all([fetchDrives(machine), fetchDirs(cwd || '')]);
    }
  };

  const handleCreateFolder = async () => {
    const name = newFolderName.trim();
    if (!name) return;
    const sep = browsePath.endsWith('/') || browsePath.endsWith('\\') ? '' : '/';
    const newPath = browsePath + sep + name;
    setNewFolderCreating(true);
    try {
      const res = await fetch('/api/mkdir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, path: newPath }),
      });
      const data = await res.json();
      if (data.ok) {
        setNewFolderMode(false);
        setNewFolderName('');
        await fetchDirs(browsePath);
        // auto-select the new folder
        setCwd(data.path);
      } else {
        toast(data.error || 'Failed to create folder', 'error');
      }
    } catch (e) {
      toast('Network error creating folder', 'error');
    } finally {
      setNewFolderCreating(false);
    }
  };

  const handleCreate = async () => {
    if (!machine || !name.trim()) {
      toast('Machine and session name are required', 'error');
      return;
    }
    setCreating(true);
    try {
      const res = await fetch('/api/tmux/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, name: name.trim(), cwd: cwd.trim() || undefined, command: command.trim() || undefined }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Created tmux session "${name}" on ${machine}`, 'success');
        onCreated?.();
        onClose();
      } else {
        toast(data.error || 'Failed to create session', 'error');
      }
    } catch (e) {
      toast('Network error creating session', 'error');
    } finally {
      setCreating(false);
    }
  };

  return h('div', {
    className: 'modal-overlay',
    onClick: e => { if (e.target === e.currentTarget) onClose(); }
  },
    h('div', { className: 'modal-box' },
      h('div', {
        style: {
          display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', marginBottom: 24,
        }
      },
        h('h2', {
          style: { fontSize: '1rem', fontWeight: 700, color: '#e6edf3' }
        }, 'New Tmux / Psmux Session'),
        h('button', {
          className: 'btn',
          onClick: onClose,
          style: {
            background: 'none', border: 'none', color: '#8b949e',
            fontSize: '1.2rem', cursor: 'pointer', padding: '4px 8px',
            borderRadius: 4,
          }
        }, '×'),
      ),

      h('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Machine'),
          h('select', {
            className: 'form-input',
            title: 'Select which machine to create the session on',
            value: machine,
            onChange: e => setMachine(e.target.value),
          },
            machines.map(m => h('option', { key: m, value: m }, m + (isLocalMachine(m) ? ' (local)' : '')))
          ),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Session Name'),
          h('input', {
            className: 'form-input',
            type: 'text',
            placeholder: 'e.g. dev-session',
            title: 'Name for the new tmux/psmux session',
            value: name,
            onChange: e => setName(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter') handleCreate(); },
          }),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Working Directory (optional)'),
          h('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
            h('input', {
              className: 'form-input',
              type: 'text',
              placeholder: '/Users/rbgnr/git/project',
              title: 'Starting directory for the session (leave empty for home directory)',
              value: cwd,
              onChange: e => setCwd(e.target.value),
              style: { flex: 1 },
            }),
            h('button', {
              type: 'button',
              onClick: handleBrowseToggle,
              title: 'Browse directories on the selected machine',
              style: {
                background: browseOpen ? '#1f6feb' : '#21262d',
                color: browseOpen ? '#e6edf3' : '#8b949e',
                border: '1px solid #30363d',
                borderRadius: 6,
                padding: '6px 12px',
                fontSize: '0.8rem',
                cursor: 'pointer',
                whiteSpace: 'nowrap',
                flexShrink: 0,
              }
            },
              h('span', { className: 'material-icons-round', style: { fontSize: '14px', verticalAlign: 'middle', marginRight: 3 } }, 'folder_open'),
              'Browse',
            ),
          ),
          browseOpen && h('div', {
            style: {
              marginTop: 8,
              background: '#161b22',
              border: '1px solid #30363d',
              borderRadius: 8,
              overflow: 'hidden',
            }
          },
            // Drive picker row
            drives.length > 0 && h('div', {
              style: {
                padding: '6px 12px',
                background: '#0d1117',
                borderBottom: '1px solid #30363d',
                display: 'flex',
                alignItems: 'center',
                gap: 8,
              }
            },
              h('span', { style: { fontSize: '0.75rem', color: '#8b949e', flexShrink: 0 } }, 'Drive:'),
              h('select', {
                value: drives.find(d => browsePath.startsWith(d.path))?.path || (drives.find(d => d.is_system)?.path || ''),
                onChange: e => fetchDirs(e.target.value),
                title: 'Select a drive/volume on the selected machine',
                style: {
                  flex: 1,
                  background: '#161b22',
                  color: '#e6edf3',
                  border: '1px solid #30363d',
                  borderRadius: 4,
                  padding: '3px 6px',
                  fontSize: '0.78rem',
                  cursor: 'pointer',
                },
              },
                drives.map(d => h('option', { key: d.path, value: d.path },
                  `${d.is_system ? '* ' : ''}${d.label} (${d.path}) \u2014 ${d.free_gb} GB free`
                ))
              ),
            ),
            // Path bar with New Folder button
            h('div', {
              style: {
                padding: '8px 12px',
                background: '#0d1117',
                borderBottom: '1px solid #30363d',
                fontFamily: 'monospace',
                fontSize: '0.78rem',
                color: '#58a6ff',
                display: 'flex',
                alignItems: 'center',
                gap: 6,
              }
            },
              h('span', { className: 'material-icons-round', style: { fontSize: '14px', verticalAlign: 'middle', flexShrink: 0 } }, 'folder'),
              browseLoading
                ? h('span', { style: { color: '#8b949e' } }, 'Loading\u2026')
                : h('span', { style: { flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, browsePath || '~'),
              !browseLoading && !newFolderMode && h('button', {
                type: 'button',
                onClick: () => { setNewFolderMode(true); setNewFolderName(''); },
                title: 'Create a new folder in the current directory',
                style: {
                  background: '#21262d',
                  color: '#e6edf3',
                  border: '1px solid #30363d',
                  borderRadius: 4,
                  padding: '2px 8px',
                  fontSize: '0.72rem',
                  cursor: 'pointer',
                  flexShrink: 0,
                  whiteSpace: 'nowrap',
                }
              }, '+ New Folder'),
            ),
            // Inline new-folder input
            newFolderMode && h('div', {
              style: {
                padding: '6px 12px',
                background: '#0d1117',
                borderBottom: '1px solid #30363d',
                display: 'flex',
                alignItems: 'center',
                gap: 6,
              }
            },
              h('span', { className: 'material-icons-round', style: { fontSize: '14px', verticalAlign: 'middle', flexShrink: 0 } }, 'create_new_folder'),
              h('input', {
                type: 'text',
                autoFocus: true,
                placeholder: 'new-folder-name',
                value: newFolderName,
                onChange: e => setNewFolderName(e.target.value),
                onKeyDown: e => {
                  if (e.key === 'Enter') handleCreateFolder();
                  if (e.key === 'Escape') { setNewFolderMode(false); setNewFolderName(''); }
                },
                style: {
                  flex: 1,
                  background: '#161b22',
                  color: '#e6edf3',
                  border: '1px solid #30363d',
                  borderRadius: 4,
                  padding: '3px 8px',
                  fontSize: '0.82rem',
                  fontFamily: 'monospace',
                },
              }),
              h('button', {
                type: 'button',
                onClick: handleCreateFolder,
                disabled: newFolderCreating || !newFolderName.trim(),
                style: {
                  background: '#238636',
                  color: '#e6edf3',
                  border: 'none',
                  borderRadius: 4,
                  padding: '3px 10px',
                  fontSize: '0.78rem',
                  cursor: 'pointer',
                  flexShrink: 0,
                }
              }, newFolderCreating ? '\u2026' : '\u2713'),
              h('button', {
                type: 'button',
                onClick: () => { setNewFolderMode(false); setNewFolderName(''); },
                style: {
                  background: '#21262d',
                  color: '#e6edf3',
                  border: '1px solid #30363d',
                  borderRadius: 4,
                  padding: '3px 8px',
                  fontSize: '0.78rem',
                  cursor: 'pointer',
                  flexShrink: 0,
                }
              }, '\u2717'),
            ),
            h('div', {
              style: {
                maxHeight: 240,
                overflowY: 'auto',
                padding: '4px 0',
              }
            },
              !browseLoading && browsePath && h('div', {
                onClick: async () => {
                  // Handle both Unix and Windows paths
                  const sep = browsePath.includes('\\') ? '\\' : '/';
                  const parts = browsePath.split(sep).filter(Boolean);
                  parts.pop();
                  const parent = parts.length === 0 ? sep : (browsePath.startsWith('/') ? '/' : '') + parts.join(sep);
                  await fetchDirs(parent || sep);
                },
                style: {
                  padding: '6px 14px',
                  fontSize: '0.82rem',
                  color: '#8b949e',
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  gap: 8,
                },
                onMouseEnter: e => e.currentTarget.style.background = '#21262d',
                onMouseLeave: e => e.currentTarget.style.background = 'transparent',
              },
                h('span', { className: 'material-icons-round', style: { fontSize: '14px', verticalAlign: 'middle' } }, 'folder'),
              '.. (go up)'
              ),
              !browseLoading && browseDirs.map(dir =>
                h('div', {
                  key: dir.path,
                  onClick: () => fetchDirs(dir.path),
                  style: {
                    padding: '6px 14px',
                    fontSize: '0.82rem',
                    color: '#e6edf3',
                    cursor: 'pointer',
                    display: 'flex',
                    alignItems: 'center',
                    gap: 8,
                  },
                  onMouseEnter: e => e.currentTarget.style.background = '#21262d',
                  onMouseLeave: e => e.currentTarget.style.background = 'transparent',
                },
                  h('span', { className: 'material-icons-round', style: { fontSize: '14px', verticalAlign: 'middle' } }, 'folder'),
                  dir.name
                )
              ),
              browseLoading && h('div', {
                style: { padding: '12px 14px', color: '#8b949e', fontSize: '0.82rem' }
              }, 'Loading\u2026'),
            ),
            h('div', {
              style: {
                padding: '8px 12px',
                borderTop: '1px solid #30363d',
                display: 'flex',
                justifyContent: 'flex-end',
              }
            },
              h('button', {
                type: 'button',
                onClick: () => {
                  if (browsePath) setCwd(browsePath);
                  setBrowseOpen(false);
                  setNewFolderMode(false);
                  setNewFolderName('');
                },
                style: {
                  background: '#1f6feb',
                  color: '#e6edf3',
                  border: 'none',
                  borderRadius: 6,
                  padding: '6px 14px',
                  fontSize: '0.8rem',
                  fontWeight: 600,
                  cursor: 'pointer',
                }
              }, 'Select This Folder'),
            ),
          ),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Command (optional)'),
          h('input', {
            className: 'form-input',
            type: 'text',
            placeholder: 'e.g. claude',
            title: 'Command to run inside the new session (e.g. claude)',
            value: command,
            onChange: e => setCommand(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter') handleCreate(); },
          }),
        ),

        h('div', { style: { display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 } },
          h('button', {
            className: 'btn',
            onClick: onClose,
            style: {
              background: '#21262d', color: '#8b949e', border: '1px solid #30363d',
              borderRadius: 8, padding: '8px 20px', fontSize: '0.85rem',
              fontWeight: 600, cursor: 'pointer',
            }
          }, 'Cancel'),
          h('button', {
            className: 'btn',
            onClick: handleCreate,
            disabled: creating,
            style: {
              background: creating ? '#1a3a2a' : '#238636',
              color: '#3fb950', border: '1px solid #2a5a3a',
              borderRadius: 8, padding: '8px 20px', fontSize: '0.85rem',
              fontWeight: 600, cursor: creating ? 'not-allowed' : 'pointer',
              opacity: creating ? 0.7 : 1,
            }
          }, creating ? 'Creating…' : 'Create Session'),
        ),
      ),
    ),
  );
}

// ─── Pinned Section ───────────────────────────────────────────────────────────

function PinnedSection({ sessions, pinnedIds, onLaunch, launchingId, onTmuxLaunch, tmuxLaunchingId, skipPermissions, onPin, onUnpin, onArchive, onUnarchive, archivedIds, expandedCards, onToggleExpand, hwCache, fetchHardware }) {

  if (!pinned.length) return null;

  return h('div', {
    style: { marginBottom: 16, borderBottom: '1px solid #30363d', paddingBottom: 12 }
  },
    h('div', {
      style: { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8, padding: '0 2px' }
    },
      h('span', {
        title: "Sessions you've pinned for quick access",
        style: {
          fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
          textTransform: 'uppercase', color: '#e3b341',
          display: 'inline-flex', alignItems: 'center', gap: 4,
        }
      },
        h('span', { className: 'material-icons-round', style: { fontSize: '12px', verticalAlign: 'middle' } }, 'push_pin'),
        'PINNED',
      ),
      h('span', {
        style: {
          background: '#3a2a0a', color: '#e3b341', fontSize: '0.65rem',
          borderRadius: 20, padding: '1px 7px', marginLeft: 4,
          border: '1px solid #5a4a1a',
        }
      }, pinned.length),
    ),
    pinned.map(s =>
      h(SessionCardMemo, {
        key: s.session_id,
        session: s,
        onLaunch,
        onTmuxLaunch,
        launching: launchingId === s.session_id,
        tmuxLaunching: tmuxLaunchingId === s.session_id,
        skipPermissions,
        onPin,
        onUnpin,
        isPinned: true,
        onArchive,
        onUnarchive,
        isArchived: (archivedIds || new Set()).has(s.session_id),
        expanded: expandedCards.has(s.session_id),
        onToggleExpand: () => onToggleExpand(s.session_id),
        inMachineSection: false,
        hwCache,
        fetchHardware,
      })
    ),
  );
}

// ─── Sessions Panel ───────────────────────────────────────────────────────────

function SessionsPanel({ sessions, onLaunch, onTmuxLaunch, launchingId, tmuxLaunchingId, skipPermissions, scanning, collapseState, setCollapseState, pinnedIds, onPin, onUnpin, onArchive, onUnarchive, archivedIds, expandedCards, onToggleExpand, hwCache, fetchHardware }) {
  // sessions is already filtered/sorted by App; just group by machine then by project
  const byMachine = useMemo(() => groupBy(sessions, 'machine'), [sessions]);

  const machineProjectTree = useMemo(() => {
    const tree = {};
    for (const [machine, machineSessions] of Object.entries(byMachine)) {
      const byProject = groupBy(machineSessions, s => s.cwd || s.project_path || '');
      const entries = Object.entries(byProject).sort(([, a], [, b]) => {
        const aMax = a.reduce((m, s) => s.modified > m ? s.modified : m, '');
        const bMax = b.reduce((m, s) => s.modified > m ? s.modified : m, '');
        return bMax > aMax ? 1 : bMax < aMax ? -1 : 0;
      });
      tree[machine] = entries;
    }
    return tree;
  }, [byMachine]);

  if (!sessions.length) {
    return h('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', height: '200px', gap: 12,
        color: '#484f58',
      }
    },
      h('span', { className: 'material-icons-round', style: { fontSize: '2rem', color: '#484f58' } }, 'search'),
      h('span', { style: { fontSize: '0.875rem' } }, 'No sessions found'),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 6, fontSize: '0.78rem' } },
        h('span', {
          style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '1rem' }
        }, '↻'),
        h('span', null, 'Scanning fleet…'),
      ),
    );
  }

  if (!Object.keys(byMachine).length) {
    return h('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', height: '200px', gap: 8,
        color: '#484f58',
      }
    },
      h('span', { style: { fontSize: '0.875rem' } }, 'No sessions match your filter'),
    );
  }

  const machineCount = Object.keys(byMachine).length;

  return h('div', null,
    // Pinned section (always above machine sections)
    h(PinnedSection, {
      sessions: sessions,
      pinnedIds: pinnedIds || [],
      onLaunch,
      launchingId,
      onTmuxLaunch,
      tmuxLaunchingId,
      skipPermissions,
      onPin,
      onUnpin,
      onArchive,
      onUnarchive,
      archivedIds,
      expandedCards: expandedCards || new Set(),
      onToggleExpand,
      hwCache,
      fetchHardware,
    }),
    // Scan progress indicator
    scanning && h('div', {
      style: {
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '6px 4px 8px', fontSize: '0.72rem', color: '#58a6ff',
      }
    },
      h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite' } }, '↻'),
      h('span', null, `Scanning ${machineCount} machine${machineCount !== 1 ? 's' : ''}…`),
    ),
    Object.entries(machineProjectTree).map(([machine, projectEntries]) => {
      const machineSessions = byMachine[machine] || [];
      const machineKey = machine;

      return h(MachineSection, {
        key: machine,
        machine,
        count: machineSessions.length,
        collapseKey: machineKey,
        collapseState,
        setCollapseState,
      },
        projectEntries.map(([projectPath, projectSessions]) => {
          const projKey = `project:${machine}:${projectPath}`;
          return h(ProjectSection, {
            key: projectPath,
            projectPath,
            count: projectSessions.length,
            defaultOpen: projectSessions.length <= 3,
            collapseKey: projKey,
            collapseState,
            setCollapseState,
          },
            projectSessions.map(s =>
              h(SessionCardMemo, {
                key: s.session_id,
                session: s,
                onLaunch,
                onTmuxLaunch,
                launching: launchingId === s.session_id,
                tmuxLaunching: tmuxLaunchingId === s.session_id,
                skipPermissions,
                onPin,
                onUnpin,
                isPinned: (pinnedIds || []).includes(s.session_id),
                onArchive,
                onUnarchive,
                isArchived: (archivedIds || new Set()).has(s.session_id),
                expanded: (expandedCards || new Set()).has(s.session_id),
                onToggleExpand: () => onToggleExpand(s.session_id),
                inMachineSection: true,
                hwCache,
                fetchHardware,
              })
            )
          );
        })
      );
    })
  );
}

// ─── Log Panel ────────────────────────────────────────────────────────────────

const LOG_LEVEL_COLORS = {
  ERROR:   { color: '#f85149', bg: '#3a1a1a', border: '#5a2a2a' },
  WARNING: { color: '#e3b341', bg: '#3a2a0a', border: '#5a4a1a' },
  INFO:    { color: '#8b949e', bg: 'transparent', border: 'transparent' },
  DEBUG:   { color: '#484f58', bg: 'transparent', border: 'transparent' },
};

function LogPanel({ visible, onClose }) {
  const [logs, setLogs] = useState([]);
  const [autoRefresh, setAutoRefresh] = useState(true);
  const [levelFilter, setLevelFilter] = useState('');
  const scrollRef = useRef(null);

  useEffect(() => {
    if (!visible || !autoRefresh) return;
    const fetchLogs = () => {
      const params = levelFilter ? `?limit=50&level=${levelFilter}` : '?limit=50';
      fetch('/api/logs' + params)
        .then(r => r.json())
        .then(d => {
          setLogs(d.logs || []);
          if (scrollRef.current) {
            scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
          }
        })
        .catch(() => {});
    };
    fetchLogs();
    const interval = setInterval(fetchLogs, 3000);
    return () => clearInterval(interval);
  }, [visible, autoRefresh, levelFilter]);

  if (!visible) return null;

  return h('div', {
    style: {
      borderTop: '1px solid #30363d',
      background: '#0a0d10',
      flexShrink: 0,
      display: 'flex',
      flexDirection: 'column',
      maxHeight: 220,
    }
  },
    // Header bar
    h('div', {
      style: {
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '6px 16px',
        borderBottom: '1px solid #21262d',
        flexShrink: 0,
      }
    },
      h('span', {
        style: {
          fontSize: '0.65rem', fontWeight: 700, letterSpacing: '0.08em',
          textTransform: 'uppercase', color: '#484f58',
        }
      }, 'Logs'),

      // Level filter pills
      ['', 'ERROR', 'WARNING', 'INFO', 'DEBUG'].map(lv =>
        h('button', {
          key: lv || 'all',
          onClick: () => setLevelFilter(lv),
          title: lv ? `Show only ${lv} messages` : 'Show all log messages',
          style: {
            fontSize: '0.6rem', fontWeight: 700, padding: '1px 7px',
            borderRadius: 10, border: '1px solid',
            cursor: 'pointer', letterSpacing: '0.04em',
            background: levelFilter === lv ? (LOG_LEVEL_COLORS[lv] || { bg: '#1f3a5f' }).bg || '#1f3a5f' : '#21262d',
            color: levelFilter === lv ? (LOG_LEVEL_COLORS[lv] || { color: '#58a6ff' }).color || '#58a6ff' : '#6e7681',
            borderColor: levelFilter === lv ? (LOG_LEVEL_COLORS[lv] || { border: '#2d4f7a' }).border || '#2d4f7a' : '#30363d',
            transition: 'all 0.1s',
          }
        }, lv || 'ALL')
      ),

      // Auto-refresh toggle
      h('label', {
        style: {
          display: 'flex', alignItems: 'center', gap: 4,
          cursor: 'pointer', userSelect: 'none',
          fontSize: '0.65rem', color: autoRefresh ? '#3fb950' : '#6e7681',
          marginLeft: 4,
        }
      },
        h('input', {
          type: 'checkbox',
          checked: autoRefresh,
          onChange: e => setAutoRefresh(e.target.checked),
          style: { accentColor: '#3fb950', cursor: 'pointer', width: 11, height: 11 },
        }),
        'Auto',
      ),

      h('div', { style: { flex: 1 } }),

      // Close button
      h('button', {
        onClick: onClose,
        title: 'Close the log panel',
        style: {
          background: 'none', border: 'none', cursor: 'pointer',
          color: '#484f58', fontSize: '14px', padding: '0 2px',
          display: 'flex', alignItems: 'center',
        }
      }, h('span', { className: 'material-icons-round', style: { fontSize: '14px' } }, 'close')),
    ),

    // Log entries
    h('div', {
      ref: scrollRef,
      style: {
        overflowY: 'auto', flex: 1,
        padding: '4px 0',
        fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
        fontSize: '0.68rem',
      }
    },
      logs.length === 0
        ? h('div', {
            style: { color: '#484f58', padding: '8px 16px', fontStyle: 'italic' }
          }, 'No log entries yet.')
        : logs.map((entry, i) => {
            const colors = LOG_LEVEL_COLORS[entry.level] || LOG_LEVEL_COLORS.INFO;
            const ts = entry.timestamp ? entry.timestamp.replace('T', ' ').replace('Z', '').slice(11, 23) : '';
            return h('div', {
              key: i,
              style: {
                display: 'flex', alignItems: 'baseline', gap: 6,
                padding: '1px 16px',
              }
            },
              h('span', { style: { color: '#484f58', flexShrink: 0 } }, ts),
              h('span', {
                style: {
                  color: colors.color, flexShrink: 0,
                  minWidth: 52, textAlign: 'right', fontWeight: 700,
                }
              }, entry.level),
              h('span', { style: { color: '#6e7681', flexShrink: 0 } }, entry.module),
              h('span', { style: { color: '#8b949e', wordBreak: 'break-all' } }, entry.message),
            );
          })
    ),
  );
}

function FleetBar({ fleet, lastScan, wsConnected }) {

  const entries = Object.values(fleet || {});
  const online = entries.filter(m => m.online).length;
  const total = entries.length;

  return h('div', {
    style: {
      borderTop: '1px solid #30363d', background: '#0d0f12',
      padding: '8px 24px', display: 'flex', alignItems: 'center',

      fontSize: '0.72rem', fontFamily: 'monospace',

    h('div', {
      style: { display: 'flex', alignItems: 'center', gap: 6, marginRight: 8 }
    },
      h('span', { style: { color: '#484f58' } }, 'COMPUTERS'),
      h('span', {
        style: {
          color: online === total ? '#3fb950' : online > 0 ? '#e3b341' : '#f85149'
        }
      }, `${online}/${total}`),
    ),

    ...entries.map(m => {
      const info = MACHINE_INFO[m.name] || {};
      return h('div', {
        key: m.name,
        title: `${m.name} (${info.ip || 'unknown IP'}) — ${m.online ? 'online' : 'offline'}, ${info.os || 'unknown OS'}`,

          className: clsx('status-dot', m.online ? 'active' : 'idle'),

        info.osIcon && h('span', {
          className: 'material-icons-round',
          style: { fontSize: '10px', color: m.online ? '#8b949e' : '#484f58', verticalAlign: 'middle' },
        }, info.osIcon),
        h('span', {
          style: { color: m.online ? '#e6edf3' : '#484f58' }
        }, m.name),
        info.ip && h('span', {
          style: { color: '#484f58', fontSize: '0.65rem' }

      );
    }),

    h('div', {
      style: { marginLeft: 'auto', color: '#484f58', display: 'flex', gap: 12, alignItems: 'center' }
    },
      lastScan && h('span', { title: 'Time since last automatic scan of all machines' }, `scan: ${relativeTime(lastScan)}`),
      h('div', {
        title: `WebSocket connection status — live updates ${wsConnected ? 'connected' : 'disconnected'}`,
        style: { display: 'flex', alignItems: 'center', gap: 5 }
      },
        h('span', {
          className: clsx('status-dot', wsConnected ? 'active' : 'idle', wsConnected && 'pulse'),
          style: { width: 6, height: 6 },
        }),
        h('span', {
          style: { color: wsConnected ? '#3fb950' : '#f85149' }

      ),
    ),
  );
}

        setRestartConfirm(false);

          if (res.ok) {
            toast('Server restarted — rescanning fleet...', 'success');

            setTimeout(async () => {
              try {
                const scanRes = await fetch('/api/sessions/scan', { method: 'POST' });

            toast('Restart failed', 'error');

      className: 'btn',

        if (!confirm('Exit claude-manager? This will stop the server.')) return;

      },
      title: 'Stop the server and close claude-manager',
      style: {
        background: '#3a0d0d',
        border: '1px solid #6e1a1a', borderRadius: 8,
        color: '#f85149', padding: '6px 10px', fontSize: '0.75rem', fontWeight: 600,
