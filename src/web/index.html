// ─── Pinned Section ───────────────────────────────────────────────────────────

function PinnedSection({ pinnedIds, onLaunch, launchingId, onTmuxLaunch, tmuxLaunchingId, skipPermissions, onPin, onUnpin, onArchive, onUnarchive, archivedIds, expandedCards, onToggleExpand, hwCache, fetchHardware, wsUpdateCount }) {
  // Pinned projects now — we fetch /api/projects and filter by pinned project_ids.
  // The entire project folder (with all its sessions) moves into this section
  // above everything else. Section itself is collapsible (state persisted).
  const [projects, setProjects] = useState([]);
  const [collapsed, setCollapsed] = useState(() => {
    try { return localStorage.getItem('pinnedSectionCollapsed') === '1'; } catch { return false; }
  });
  const debounceRef = useRef(null);

  const fetchProjects = useCallback(() => {
    apiFetch('/api/projects')
      .then(r => r.json())
      .then(d => { setProjects(d.projects || []); })
      .catch(() => {});
  }, []);

  useEffect(() => { fetchProjects(); }, [fetchProjects]);

  useEffect(() => {
    if (!wsUpdateCount) return;
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(fetchProjects, 300);
    return () => clearTimeout(debounceRef.current);
  }, [wsUpdateCount, fetchProjects]);

  const toggleCollapsed = () => {
    setCollapsed(v => {
      const next = !v;
      try { localStorage.setItem('pinnedSectionCollapsed', next ? '1' : '0'); } catch {}
      return next;
    });
  };

  const pinnedProjects = projects.filter(p => (pinnedIds || []).includes(p.project_id));
  if (!pinnedProjects.length) return null;

  return h('div', {
    style: { marginBottom: 16, borderBottom: '1px solid #30363d', paddingBottom: 12 }
  },
    // Collapsible header
    h('div', {
      onClick: toggleCollapsed,
      style: { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8, padding: '4px 2px', cursor: 'pointer', userSelect: 'none' }
    },
      h('span', {
        className: 'material-icons-round',
        style: { fontSize: '14px', color: '#e3b341', transition: 'transform 0.15s', transform: collapsed ? 'none' : 'rotate(90deg)' },
      }, 'chevron_right'),
      h('span', {
        title: "Projects you've pinned for quick access (click to collapse/expand)",
        style: {
          fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
          textTransform: 'uppercase', color: '#e3b341',
          display: 'inline-flex', alignItems: 'center', gap: 4,
        }
      },
        h('span', { className: 'material-icons-round', style: { fontSize: '12px', verticalAlign: 'middle' } }, 'push_pin'),
        'PINNED',
      ),
      h('span', {
        style: {
          background: '#3a2a0a', color: '#e3b341', fontSize: '0.65rem',
          borderRadius: 20, padding: '1px 7px', marginLeft: 4,
          border: '1px solid #5a4a1a',
        }
      }, pinnedProjects.length),
    ),
    !collapsed && pinnedProjects.map(proj =>
      h('div', { key: proj.project_id, className: 'machine-section' },
        h('div', {
          className: 'machine-header',
          style: { justifyContent: 'flex-start', gap: 8 },
        },
          h('span', { className: 'material-icons-round', style: { fontSize: '14px', color: '#58a6ff' } }, 'folder'),
          h('span', {
            style: { fontWeight: 700, color: '#e6edf3', fontSize: '0.82rem', letterSpacing: 0, textTransform: 'none' },
            title: proj.git_remote || proj.project_id,
          }, proj.display_name),
          h('span', {
            style: { background: '#161b22', color: '#484f58', fontSize: '0.6rem', borderRadius: 10, padding: '1px 6px', marginLeft: 2 }
          }, proj.session_count),
          h('div', { style: { flex: 1 } }),
          h('button', {
            className: 'compact-action-btn btn btn-icon-only btn-pin-active',
            onClick: e => { e.stopPropagation(); onUnpin(proj.project_id); },
            title: 'Unpin this project',
          },
            h('span', { className: 'material-icons-round', style: { fontSize: '12px' } }, 'push_pin'),
          ),
        ),
        h(ProjectRunList, {
          project: proj,
          onLaunch, onTmuxLaunch, launchingId, tmuxLaunchingId, skipPermissions,
          onPin, onUnpin, pinnedIds,
          onArchive, onUnarchive, archivedIds,
          expandedCards, onToggleExpand, hwCache, fetchHardware,
          getMatchingTmux, onAttachTmux, onHighlightTmux,
        }),
      )
    ),
  );
}

// ─── Project Run List (grouped same-machine runs inside expanded project) ──────

function ProjectRunList({ project, onLaunch, onTmuxLaunch, launchingId, tmuxLaunchingId, skipPermissions, onPin, onUnpin, pinnedIds, onArchive, onUnarchive, archivedIds, expandedCards, onToggleExpand, hwCache, fetchHardware, getMatchingTmux, onAttachTmux, onHighlightTmux, onPull, pullingKey }) {
  // extraMap keyed by "{project_id}::{machine}::{firstSessionId}" — how many extra rows beyond 3 to show
  const [extraMap, setExtraMap] = useState({});

  const sessions = project.sessions || [];

  // Build consecutive same-machine runs O(n)
  const runs = [];
  for (const s of sessions) {
    const last = runs[runs.length - 1];
    if (last && last.machine === s.machine) {
      last.sessions.push(s);
    } else {
      runs.push({ machine: s.machine, sessions: [s] });
    }
  }

  return h('div', { style: { paddingLeft: 4 } },
    runs.map((run, ri) => {
      const mc = machineColor(run.machine);
      const runKey = `${project.project_id}::${run.machine}::${run.sessions[0].session_id}`;
      const extra = extraMap[runKey] || 0;
      const visible = run.sessions.slice(0, 3 + extra);
      const remaining = run.sessions.length - (3 + extra);

      return h('div', {
        key: runKey,
        style: {
          marginTop: ri === 0 ? 0 : 12,
          borderLeft: `3px solid ${mc.border}`,
          paddingLeft: 6,
        }
      },
        // Run header: small machine-name label shown above the sessions in this run
        h('div', {
          style: {
            fontSize: '0.6rem', fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase', color: mc.color,
            padding: '2px 0 4px 2px',
          },
        }, run.machine),
        // Per-cwd git state + Pull button (Phase D). One row per distinct
        // working-tree on this machine within this project. Pull button is
        // gated on: branch ∈ {master,main} AND not dirty AND ahead==0 AND
        // behind>0. Disabled otherwise with a tooltip explaining why.
        (() => {
          const details = (project.machines_detail || []).filter(d => d.machine === run.machine);
          if (!details.length) return null;
          return details.map(d => {
            const branchOk = d.git_branch === 'master' || d.git_branch === 'main';
            const behind = d.git_behind == null ? 0 : d.git_behind;
            const ahead = d.git_ahead == null ? 0 : d.git_ahead;
            const dirty = d.git_dirty === true;
            const noUpstream = !d.git_upstream;
            let disabled = true;
            let reason = '';
            if (noUpstream) { reason = 'No upstream configured'; }
            else if (!branchOk) { reason = `Pull is limited to master/main (current: ${d.git_branch || '?'})`; }
            else if (dirty) { reason = 'Working tree has uncommitted changes'; }
            else if (ahead > 0) { reason = `${ahead} local commit${ahead === 1 ? '' : 's'} would block fast-forward`; }
            else if (behind === 0) { reason = 'Already up to date'; }
            else { disabled = false; reason = `Fast-forward ${behind} commit${behind === 1 ? '' : 's'} from ${d.git_upstream}`; }
            const pullingThis = pullingKey === `${run.machine}::${d.cwd}`;
            return h('div', {
              key: `detail::${run.machine}::${d.cwd}`,
              style: {
                display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap',
                padding: '2px 2px 6px 2px',
                fontSize: '0.62rem', fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
                color: '#8b949e',
              },
            },
              h('span', { style: { color: '#484f58' } }, d.cwd),
              d.git_branch && h('span', {
                style: { color: '#58a6ff', fontWeight: 600 },
                title: `current branch: ${d.git_branch}`,
              }, d.git_branch),
              behind > 0 && h('span', {
                style: { color: '#f85149', fontWeight: 700 },
                title: `${behind} commit${behind === 1 ? '' : 's'} behind ${d.git_upstream || 'upstream'}`,
              }, `↓${behind}`),
              ahead > 0 && h('span', {
                style: { color: '#d29922', fontWeight: 700 },
                title: `${ahead} local commit${ahead === 1 ? '' : 's'} not yet pushed`,
              }, `↑${ahead}`),
              dirty && h('span', {
                style: { color: '#f0b84a', fontWeight: 700 },
                title: 'Uncommitted changes in tracked files',
              }, '● dirty'),
              !disabled || (disabled && reason !== 'Already up to date') ? h('button', {
                disabled: disabled || pullingThis,
                onClick: () => onPull && onPull(run.machine, d.cwd),
                title: reason,
                style: {
                  marginLeft: 'auto',
                  padding: '2px 10px',
                  fontSize: '0.62rem',
                  fontWeight: 600,
                  background: disabled ? '#161b22' : '#238636',
                  color: disabled ? '#484f58' : '#ffffff',
                  border: `1px solid ${disabled ? '#21262d' : '#2ea043'}`,
                  borderRadius: 6,
                  cursor: disabled ? 'not-allowed' : 'pointer',
                  opacity: pullingThis ? 0.6 : 1,
                  fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
                },
              }, pullingThis ? 'pulling…' : 'Pull') : null,
            );
          });
        })(),
        visible.map((s, si) => {
          // Project header already shows the repo — inside the project, show the
          // Claude session name (slug) instead of repeating the folder.
          const rawPath = s.project_path || s.cwd || '';
          const lastSeg = rawPath.split('/').filter(Boolean).pop() || rawPath;
          const label = s.name || s.slug || (s.session_id ? s.session_id.slice(0, 8) : lastSeg);
          // Only override the display label — never the real filesystem paths,
          // because handleLaunch sends `cwd: session.cwd || session.project_path`
          // to the backend. Clobbering those makes the terminal run
          // `cd <friendly-name> && claude` against a path that doesn't exist.
          const displaySession = Object.assign({}, s, { displayLabel: label });

          return h(SessionCardMemo, {
            key: s.session_id,
            session: displaySession,
            onLaunch,
            onTmuxLaunch,
            launching: launchingId === s.session_id,
            tmuxLaunching: tmuxLaunchingId === s.session_id,
            skipPermissions,
            onPin,
            onUnpin,
            isPinned: (pinnedIds || []).includes(s.session_id),
            onArchive,
            onUnarchive,
            isArchived: (archivedIds || new Set()).has(s.session_id),
            expanded: (expandedCards || new Set()).has(s.session_id),
            onToggleExpand: () => onToggleExpand(s.session_id),
            inMachineSection: si !== 0,  // suppress machine badge on rows 2+
            hideMachineLabel: true,
            hwCache,
            fetchHardware,
            matchingTmux: getMatchingTmux ? getMatchingTmux(s) : [],
            onAttachTmux,
            onHighlightTmux,
          });
        }),
        remaining > 0 && h('button', {
          onClick: () => setExtraMap(m => ({ ...m, [runKey]: (m[runKey] || 0) + 3 })),
          style: {
            display: 'inline-block',
            margin: '4px 0 2px 0',
            padding: '2px 10px',
            fontSize: '0.62rem',
            fontWeight: 600,
            background: '#161b22',
            color: mc.color,
            border: `1px solid ${mc.border}`,
            borderRadius: 10,
            cursor: 'pointer',
            fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
          }
        }, remaining >= 3 ? `+3 more${remaining > 3 ? ` (${remaining - 3} still hidden)` : ''}` : `+${remaining} older`),
      );
    })
  );
}

// ─── Projects View ────────────────────────────────────────────────────────────

function ProjectsView({ sessions, onLaunch, onTmuxLaunch, launchingId, tmuxLaunchingId, skipPermissions, scanning, pinnedIds, onPin, onUnpin, onArchive, onUnarchive, archivedIds, expandedCards, onToggleExpand, hwCache, fetchHardware, wsUpdateCount, getMatchingTmux, onAttachTmux, onHighlightTmux }) {
  const [projects, setProjects] = useState([]);
  const [projectsLoading, setProjectsLoading] = useState(true);
  const [expandedProjects, setExpandedProjects] = useState(() => {
    try { return JSON.parse(localStorage.getItem('expandedProjects') || '{}'); } catch { return {}; }
  });
  const [pullingKey, setPullingKey] = useState(null);
  const debounceRef = useRef(null);

  const handlePull = useCallback(async (machine, cwd) => {
    const key = `${machine}::${cwd}`;
    setPullingKey(key);
    try {
      const resp = await apiFetch('/api/projects/pull', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, cwd }),
      });
      const data = await resp.json();
      if (data.ok && data.merged) {
        const n = (data.behind_before || 0);
        toast(`${machine}: fast-forwarded ${n} commit${n === 1 ? '' : 's'}`, 'success');
      } else if (data.ok && !data.merged) {
        toast(`${machine}: already up to date`, 'info');
      } else {
        const reason = data.error || 'unknown error';
        toast(`${machine}: pull failed — ${reason}`, 'error');
      }
    } catch (e) {
      toast(`${machine}: pull request failed — ${e.message || e}`, 'error');
    } finally {
      setPullingKey(null);
    }
  }, []);

  const fetchProjects = useCallback(() => {
    apiFetch('/api/projects')
      .then(r => r.json())
      .then(data => {
        setProjects(data.projects || []);
        setProjectsLoading(false);
      })
      .catch(() => setProjectsLoading(false));
  }, []);

  // Initial fetch
  useEffect(() => { fetchProjects(); }, [fetchProjects]);

  // Re-fetch on WS sessions update, debounced 300ms
  useEffect(() => {
    if (wsUpdateCount === 0) return;
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(fetchProjects, 300);
    return () => clearTimeout(debounceRef.current);
  }, [wsUpdateCount, fetchProjects]);

  // Listen for global Expand/Collapse All from the header
  useEffect(() => {
    const onSetAll = (e) => {
      const all = !!e.detail;
      const next = {};
      for (const p of projects) { next[p.project_id] = all; }
      setExpandedProjects(next);
      try { localStorage.setItem('expandedProjects', JSON.stringify(next)); } catch {}
    };
    window.addEventListener('projectsSetAllExpanded', onSetAll);
    return () => window.removeEventListener('projectsSetAllExpanded', onSetAll);
  }, [projects]);

  // Expand the project that contains a given session — fired by
  // App.selectClaudeSession so clicks on a tmux chip reveal the session row
  // even when the Project tab is active and the folder is collapsed.
  useEffect(() => {
    const onExpandForSession = (e) => {
      const sid = e.detail && e.detail.sessionId;
      if (!sid) return;
      const proj = projects.find(p => (p.sessions || []).some(s => s.session_id === sid));
      if (!proj) return;
      setExpandedProjects(prev => {
        if (prev[proj.project_id]) return prev;
        const next = { ...prev, [proj.project_id]: true };
        try { localStorage.setItem('expandedProjects', JSON.stringify(next)); } catch {}
        return next;
      });
    };
    window.addEventListener('expandProjectForSession', onExpandForSession);
    return () => window.removeEventListener('expandProjectForSession', onExpandForSession);
  }, [projects]);

  // Cross-filter /api/projects against the sessions the parent has already
  // filtered (text search, machine/status/time-range toggles). Without this,
  // the Projects tab ignores the top-bar filters entirely.
  const filteredProjects = useMemo(() => {
    const allowedIds = new Set((sessions || []).map(s => s.session_id));
    // If the sessions array is empty while filters are active, still
    // return [] (not all projects). If it's empty and nothing's filtered
    // the caller wouldn't be on this tab. Safe either way.
    const result = [];
    for (const p of projects) {
      const keep = (p.sessions || []).filter(s => allowedIds.has(s.session_id));
      if (!keep.length) continue;
      // Recompute derived fields so the header counts/badges match the filter.
      const machines = Array.from(new Set(keep.map(s => s.machine).filter(Boolean)));
      const latest = keep.reduce((m, s) => (s.modified > m ? s.modified : m), '');
      result.push({
        ...p,
        sessions: keep,
        session_count: keep.length,
        machines,
        latest_modified: latest || p.latest_modified,
      });
    }
    return result;
  }, [projects, sessions]);

  const toggleProject = useCallback((pid) => {
    setExpandedProjects(prev => {
      const next = { ...prev, [pid]: !prev[pid] };
      try { localStorage.setItem('expandedProjects', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  if (projectsLoading) {
    return h('div', {
      style: { display: 'flex', alignItems: 'center', gap: 8, padding: '24px 16px', color: '#484f58', fontSize: '0.82rem' }
    },
      h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite' } }, '↻'),
      'Loading projects…',
    );
  }

  if (!projects.length) {
    return h('div', {
      style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '200px', gap: 8, color: '#484f58' }
    },
      h('span', { className: 'material-icons-round', style: { fontSize: '2rem' } }, 'folder_off'),
      h('span', { style: { fontSize: '0.875rem' } }, 'No projects found'),
    );
  }

  if (!filteredProjects.length) {
    return h('div', {
      style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '200px', gap: 8, color: '#484f58' }
    },
      h('span', { className: 'material-icons-round', style: { fontSize: '2rem' } }, 'filter_alt_off'),
      h('span', { style: { fontSize: '0.875rem' } }, 'No projects match current filters'),
    );
  }

  return h('div', null,
    scanning && h('div', {
      style: { display: 'flex', alignItems: 'center', gap: 6, padding: '6px 4px 8px', fontSize: '0.72rem', color: '#58a6ff' }
    },
      h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite' } }, '↻'),
      h('span', null, 'Scanning fleet…'),
    ),
    filteredProjects.map(proj => {
      const isOpen = !!expandedProjects[proj.project_id];
      const latestSession = (proj.sessions || [])[0];
      return h('div', { key: proj.project_id, className: 'machine-section' },
        // Project header row
        h('div', {
          className: 'machine-header',
          onClick: () => toggleProject(proj.project_id),
          style: { justifyContent: 'flex-start', gap: 8 },
        },
          h('span', {
            className: 'material-icons-round',
            style: { fontSize: '14px', color: '#484f58', transition: 'transform 0.15s', transform: isOpen ? 'rotate(90deg)' : 'none' },
          }, 'chevron_right'),
          h('span', {
            className: 'material-icons-round',
            style: { fontSize: '14px', color: '#58a6ff' },
          }, 'folder'),
          h('span', {
            style: { fontWeight: 700, color: '#e6edf3', fontSize: '0.82rem', letterSpacing: 0, textTransform: 'none' },
            title: proj.git_remote || proj.project_id,
          }, proj.display_name),
          h('span', {
            style: { background: '#161b22', color: '#484f58', fontSize: '0.6rem', borderRadius: 10, padding: '1px 6px', marginLeft: 2 }
          }, proj.session_count),
          latestSession && h('span', {
            style: { fontSize: '0.62rem', color: '#484f58', fontFamily: 'monospace', marginLeft: 4 }
          }, relativeTime(proj.latest_modified)),
          // Machine badges strip (label · session count for that machine within this project)
          h('div', { style: { display: 'flex', gap: 4, marginLeft: 4, flexWrap: 'wrap' } },
            (() => {
              const counts = {};
              for (const s of (proj.sessions || [])) {
                counts[s.machine] = (counts[s.machine] || 0) + 1;
              }
              // Aggregate machines_detail per machine — show worst-case git
              // state across all cwds on that machine (max behind, any ahead,
              // any dirty). Full per-cwd breakdown + Pull button lives in the
              // expanded ProjectRunList below.
              const detailByMachine = {};
              for (const d of (proj.machines_detail || [])) {
                const prev = detailByMachine[d.machine];
                if (!prev) {
                  detailByMachine[d.machine] = {
                    behind: d.git_behind || 0,
                    ahead: d.git_ahead || 0,
                    dirty: d.git_dirty === true,
                    hasUpstream: !!d.git_upstream,
                  };
                } else {
                  prev.behind = Math.max(prev.behind, d.git_behind || 0);
                  prev.ahead = Math.max(prev.ahead, d.git_ahead || 0);
                  prev.dirty = prev.dirty || d.git_dirty === true;
                  prev.hasUpstream = prev.hasUpstream || !!d.git_upstream;
                }
              }
              return (proj.machines || []).map(m => {
                const mc = machineColor(m);
                const agg = detailByMachine[m] || { behind: 0, ahead: 0, dirty: false, hasUpstream: false };
                const title = `${m} — ${counts[m] || 0} session${(counts[m] || 0) === 1 ? '' : 's'}` +
                  (agg.hasUpstream ? `  ·  ↓${agg.behind} ↑${agg.ahead}${agg.dirty ? ' ●' : ''}` : '');
                return h('span', {
                  key: m,
                  title,
                  style: {
                    display: 'inline-flex', alignItems: 'center', gap: 4,
                    fontSize: '0.58rem', fontWeight: 700, padding: '1px 6px',
                    borderRadius: 10, border: `1px solid ${mc.border}`,
                    background: mc.bg, color: mc.color, whiteSpace: 'nowrap',
                    fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
                  }
                },
                  `${m} · ${counts[m] || 0}`,
                  agg.behind > 0 && h('span', {
                    style: { color: '#f85149', fontWeight: 700 },
                    title: `${agg.behind} commit${agg.behind === 1 ? '' : 's'} behind upstream`,
                  }, `↓${agg.behind}`),
                  agg.ahead > 0 && h('span', {
                    style: { color: '#d29922', fontWeight: 700 },
                    title: `${agg.ahead} local commit${agg.ahead === 1 ? '' : 's'} not yet pushed`,
                  }, `↑${agg.ahead}`),
                  agg.dirty && h('span', {
                    style: { color: '#f0b84a', fontSize: '0.5rem', lineHeight: 1 },
                    title: 'Uncommitted changes in tracked files',
                  }, '●'),
                );
              });
            })()
          ),
          h('div', { style: { flex: 1 } }),
          // Per-project Pin toggle (moves the whole folder to the Pinned section).
          (() => {
            const isP = (pinnedIds || []).includes(proj.project_id);
            return h('button', {
              className: `compact-action-btn btn btn-icon-only${isP ? ' btn-pin-active' : ''}`,
              onClick: e => { e.stopPropagation(); isP ? onUnpin(proj.project_id) : onPin(proj.project_id); },
              title: isP ? 'Unpin this project' : 'Pin this project to the top of the list for quick access',
            },
              h('span', { className: 'material-icons-round', style: { fontSize: '12px' } }, 'push_pin'),
            );
          })(),
        ),
        // Expanded: list sessions grouped into same-machine runs
        isOpen && h(ProjectRunList, {
          project: proj,
          onLaunch,
          onTmuxLaunch,
          launchingId,
          tmuxLaunchingId,
          skipPermissions,
          onPin,
          onUnpin,
          pinnedIds,
          onArchive,
          onUnarchive,
          archivedIds,
          expandedCards,
          onToggleExpand,
          hwCache,
          fetchHardware,
          onPull: handlePull,
          pullingKey,
        }),
      );
    })
  );
}

// ─── Sessions Panel ───────────────────────────────────────────────────────────

function SessionsPanel({ sessions, onLaunch, onTmuxLaunch, launchingId, tmuxLaunchingId, skipPermissions, scanning, collapseState, setCollapseState, pinnedIds, onPin, onUnpin, onArchive, onUnarchive, archivedIds, expandedCards, onToggleExpand, hwCache, fetchHardware, onNewSessionInProject, onNewTmuxInProject, wsUpdateCount, getMatchingTmux, onAttachTmux, onHighlightTmux }) {
  // sessions is already filtered/sorted by App; just group by machine then by project
  const byMachine = useMemo(() => groupBy(sessions, 'machine'), [sessions]);

  const machineProjectTree = useMemo(() => {
    const tree = {};
    for (const [machine, machineSessions] of Object.entries(byMachine)) {
      const byProject = groupBy(machineSessions, s => s.cwd || s.project_path || '');
      const entries = Object.entries(byProject).sort(([, a], [, b]) => {
        const aMax = a.reduce((m, s) => s.modified > m ? s.modified : m, '');
        const bMax = b.reduce((m, s) => s.modified > m ? s.modified : m, '');
        return bMax > aMax ? 1 : bMax < aMax ? -1 : 0;
      });
      tree[machine] = entries;
    }
    return tree;
  }, [byMachine]);

  if (!sessions.length) {
    return h('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', height: '200px', gap: 12,
        color: '#484f58',
      }
    },
      h('span', { className: 'material-icons-round', style: { fontSize: '2rem', color: '#484f58' } }, 'search'),
      h('span', { style: { fontSize: '0.875rem' } }, 'No sessions found'),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 6, fontSize: '0.78rem' } },
        h('span', {
          style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '1rem' }
        }, '↻'),
        h('span', null, 'Scanning fleet…'),
      ),
    );
  }

  if (!Object.keys(byMachine).length) {
    return h('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', height: '200px', gap: 8,
        color: '#484f58',
      }
    },
      h('span', { style: { fontSize: '0.875rem' } }, 'No sessions match your filter'),
    );
  }

  const machineCount = Object.keys(byMachine).length;

  return h('div', null,
    // Pinned section (always above machine sections)
    h(PinnedSection, {
      pinnedIds: pinnedIds || [],
      onLaunch,
      launchingId,
      onTmuxLaunch,
      tmuxLaunchingId,
      skipPermissions,
      onPin,
      onUnpin,
      onArchive,
      onUnarchive,
      archivedIds,
      expandedCards: expandedCards || new Set(),
      onToggleExpand,
      hwCache,
      fetchHardware,
      wsUpdateCount,
    }),
    // Scan progress indicator
    scanning && h('div', {
      style: {
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '6px 4px 8px', fontSize: '0.72rem', color: '#58a6ff',
      }
    },
      h('span', { style: { display: 'inline-block', animation: 'spin 0.8s linear infinite' } }, '↻'),
      h('span', null, `Scanning ${machineCount} machine${machineCount !== 1 ? 's' : ''}…`),
    ),
    Object.entries(machineProjectTree).map(([machine, projectEntries]) => {
      const machineSessions = byMachine[machine] || [];
      const machineKey = machine;

      return h(MachineSection, {
        key: machine,
        machine,
        count: machineSessions.length,
        collapseKey: machineKey,
        collapseState,
        setCollapseState,
      },
        projectEntries.map(([projectPath, projectSessions]) => {
          const projKey = `project:${machine}:${projectPath}`;
          return h(ProjectSection, {
            key: projectPath,
            projectPath,
            machine,
            count: projectSessions.length,
            defaultOpen: projectSessions.length <= 3,
            collapseKey: projKey,
            collapseState,
            setCollapseState,
            onNewSessionInProject,
            onNewTmuxInProject,
          },
            projectSessions.map(s =>
              h(SessionCardMemo, {
                key: s.session_id,
                session: s,
                onLaunch,
                onTmuxLaunch,
                launching: launchingId === s.session_id,
                tmuxLaunching: tmuxLaunchingId === s.session_id,
                skipPermissions,
                onPin,
                onUnpin,
                isPinned: (pinnedIds || []).includes(s.session_id),
                onArchive,
                onUnarchive,
                isArchived: (archivedIds || new Set()).has(s.session_id),
                expanded: (expandedCards || new Set()).has(s.session_id),
                onToggleExpand: () => onToggleExpand(s.session_id),
                inMachineSection: true,
                hwCache,
                fetchHardware,
                matchingTmux: getMatchingTmux ? getMatchingTmux(s) : [],
                onAttachTmux,
                onHighlightTmux,
              })
            )
          );
        })
      );
    })
  );
}

// ─── Log Panel ────────────────────────────────────────────────────────────────

const LOG_LEVEL_COLORS = {
  ERROR:   { color: '#f85149', bg: '#3a1a1a', border: '#5a2a2a' },
  WARNING: { color: '#e3b341', bg: '#3a2a0a', border: '#5a4a1a' },
  INFO:    { color: '#8b949e', bg: 'transparent', border: 'transparent' },
  DEBUG:   { color: '#484f58', bg: 'transparent', border: 'transparent' },
};

function LogPanel({ visible, onClose }) {
  const [logs, setLogs] = useState([]);
  const [autoRefresh, setAutoRefresh] = useState(true);
  const [levelFilter, setLevelFilter] = useState('');
  const scrollRef = useRef(null);

  useEffect(() => {
    if (!visible || !autoRefresh) return;
    const fetchLogs = () => {
      const params = levelFilter ? `?limit=50&level=${levelFilter}` : '?limit=50';
      apiFetch('/api/logs' + params)
        .then(r => r.json())
        .then(d => {
          setLogs(d.logs || []);
          if (scrollRef.current) {
            scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
          }
        })
        .catch(() => {});
    };
    fetchLogs();
    const interval = setInterval(fetchLogs, 3000);
    return () => clearInterval(interval);
  }, [visible, autoRefresh, levelFilter]);

  if (!visible) return null;

  return h('div', {
    style: {
      borderTop: '1px solid #30363d',
      background: '#0a0d10',
      flexShrink: 0,
      display: 'flex',
      flexDirection: 'column',
      maxHeight: 220,
    }
  },
    // Header bar
    h('div', {
      style: {
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '6px 16px',
        borderBottom: '1px solid #21262d',
        flexShrink: 0,
      }
    },
      h('span', {
        style: {
          fontSize: '0.65rem', fontWeight: 700, letterSpacing: '0.08em',
          textTransform: 'uppercase', color: '#484f58',
        }
      }, 'Logs'),

      // Level filter pills
      ['', 'ERROR', 'WARNING', 'INFO', 'DEBUG'].map(lv =>
        h('button', {
          key: lv || 'all',
          onClick: () => setLevelFilter(lv),
          title: lv ? `Show only ${lv} messages` : 'Show all log messages',
          style: {
            fontSize: '0.6rem', fontWeight: 700, padding: '1px 7px',
            borderRadius: 10, border: '1px solid',
            cursor: 'pointer', letterSpacing: '0.04em',
            background: levelFilter === lv ? (LOG_LEVEL_COLORS[lv] || { bg: '#1f3a5f' }).bg || '#1f3a5f' : '#21262d',
            color: levelFilter === lv ? (LOG_LEVEL_COLORS[lv] || { color: '#58a6ff' }).color || '#58a6ff' : '#6e7681',
            borderColor: levelFilter === lv ? (LOG_LEVEL_COLORS[lv] || { border: '#2d4f7a' }).border || '#2d4f7a' : '#30363d',
            transition: 'all 0.1s',
          }
        }, lv || 'ALL')
      ),

      // Auto-refresh toggle
      h('label', {
        style: {
          display: 'flex', alignItems: 'center', gap: 4,
          cursor: 'pointer', userSelect: 'none',
          fontSize: '0.65rem', color: autoRefresh ? '#3fb950' : '#6e7681',
          marginLeft: 4,
        }
      },
        h('input', {
          type: 'checkbox',
          checked: autoRefresh,
          onChange: e => setAutoRefresh(e.target.checked),
          style: { accentColor: '#3fb950', cursor: 'pointer', width: 11, height: 11 },
        }),
        'Auto',
      ),

      h('div', { style: { flex: 1 } }),

      // Close button
      h('button', {
        onClick: onClose,
        title: 'Close the log panel',
        style: {
          background: 'none', border: 'none', cursor: 'pointer',
          color: '#484f58', fontSize: '14px', padding: '0 2px',
          display: 'flex', alignItems: 'center',
        }
      }, h('span', { className: 'material-icons-round', style: { fontSize: '14px' } }, 'close')),
    ),

    // Log entries
    h('div', {
      ref: scrollRef,
      style: {
        overflowY: 'auto', flex: 1,
        padding: '4px 0',
        fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
        fontSize: '0.68rem',
      }
    },
      logs.length === 0
        ? h('div', {
            style: { color: '#484f58', padding: '8px 16px', fontStyle: 'italic' }
          }, 'No log entries yet.')
        : logs.map((entry, i) => {
            const colors = LOG_LEVEL_COLORS[entry.level] || LOG_LEVEL_COLORS.INFO;
            const ts = entry.timestamp ? entry.timestamp.replace('T', ' ').replace('Z', '').slice(11, 23) : '';
            return h('div', {
              key: i,
              style: {
                display: 'flex', alignItems: 'baseline', gap: 6,
                padding: '1px 16px',
              }
            },
              h('span', { style: { color: '#484f58', flexShrink: 0 } }, ts),
              h('span', {
                style: {
                  color: colors.color, flexShrink: 0,
                  minWidth: 52, textAlign: 'right', fontWeight: 700,
                }
              }, entry.level),
              h('span', { style: { color: '#6e7681', flexShrink: 0 } }, entry.module),
              h('span', { style: { color: '#8b949e', wordBreak: 'break-all' } }, entry.message),
            );
          })
    ),
  );
}

// ─── Fleet Bar ────────────────────────────────────────────────────────────────

          style: { color: m.online ? '#e6edf3' : '#484f58' }

      style: { marginLeft: 'auto', color: '#484f58', display: 'flex', gap: 12, alignItems: 'center' }
    },
      lastScan && h('span', { title: 'Time since last automatic scan of all machines' }, `scan: ${relativeTime(lastScan)}`),
      h('div', {
        title: `WebSocket connection status — live updates ${wsConnected ? 'connected' : 'disconnected'}`,
        style: { display: 'flex', alignItems: 'center', gap: 5 }

        h('span', {
          className: clsx('status-dot', wsConnected ? 'active' : 'idle', wsConnected && 'pulse'),
          style: { width: 6, height: 6 },

        h('span', {
          style: { color: wsConnected ? '#3fb950' : '#f85149' }

      ),
    ),
  );

// ─── Security Modal ───────────────────────────────────────────────────────────

function SecurityModal({ authStatus, onClose, onAuthStatusChange }) {
  const [enabled, setEnabled] = useState(authStatus ? !!authStatus.enabled : false);
  const [keyPath, setKeyPath] = useState(authStatus ? (authStatus.key_path || '') : '');
  const [saving, setSaving] = useState(false);
  const [token, setToken] = useState(null);
  const [tokenCopied, setTokenCopied] = useState(false);
  const availableKeys = authStatus ? (authStatus.available_keys || []) : [];

  useEffect(() => {
    fetch('/api/auth/token').then(r => r.json()).then(d => {
      if (d.token) setToken(d.token);
    }).catch(() => {});
  }, []);

  const handleSave = async () => {
    setSaving(true);
    try {
      const res = await fetch('/api/auth/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled, key_path: keyPath }),
      });
      const data = await res.json();
      if (data.ok || res.ok) {
        toast('Auth updated — restart server to take effect', 'success');
        if (onAuthStatusChange) onAuthStatusChange({ ...(authStatus || {}), enabled, key_path: keyPath });
      } else {
        toast(data.error || 'Save failed', 'error');
      }
    } catch {
      toast('Network error saving auth config', 'error');
    } finally {
      setSaving(false);
    }
  };

  const handleCopyToken = () => {
    if (!token) return;
    navigator.clipboard.writeText(token).then(() => {
      setTokenCopied(true);
      setTimeout(() => setTokenCopied(false), 2000);
    }).catch(() => { toast('Failed to copy token', 'error'); });
  };

  const statusEnabled = authStatus ? authStatus.enabled : false;

  return h('div', {
    className: 'modal-overlay',
    onClick: e => { if (e.target === e.currentTarget) onClose(); },
  },
    h('div', { className: 'modal-box', style: { minWidth: 460, maxWidth: 560 } },
      // Header
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },

          h('span', { style: { fontSize: '1rem', fontWeight: 700, color: '#e6edf3' } }, 'Security'),

        h('button', {

          style: { background: 'none', border: 'none', color: '#8b949e', cursor: 'pointer', fontSize: '1.2rem', lineHeight: 1 },

      h('div', { style: { marginBottom: 18 } },
        h('div', { style: { fontSize: '0.75rem', color: '#8b949e', marginBottom: 6 } }, 'Current status'),
        h('span', {
          className: 'badge',
          style: {
            background: statusEnabled ? '#1a3a2a' : '#21262d',
            color: statusEnabled ? '#3fb950' : '#8b949e',

          },
        }, statusEnabled ? 'Auth enabled' : 'Auth disabled'),
      ),

      // Enable toggle
      h('div', { style: { marginBottom: 16 } },
        h('label', {
          style: { display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', userSelect: 'none', fontSize: '0.875rem', color: '#e6edf3' },
        },
          h('input', {

      // Key picker
      h('div', { style: { marginBottom: 16 } },
        h('div', { style: { fontSize: '0.75rem', color: '#8b949e', marginBottom: 6 } }, 'SSH key for token derivation'),
        availableKeys.length > 0
          ? h('select', {
              className: 'form-input',
              value: keyPath,
              onChange: e => setKeyPath(e.target.value),

            )
          : h('input', {
              className: 'form-input',
              type: 'text',
              placeholder: '/path/to/id_rsa',

              onChange: e => setKeyPath(e.target.value),

      // Token display
      token && h('div', { style: { marginBottom: 16 } },

                `v${currentVersion || '?'} · ${currentCommitShort || '?'}`),

    // inside pywebview/WKWebView; mirror the Restart button pattern instead).
    h('button', {
      className: 'btn',
      onClick: async () => {
        if (!exitConfirm) {
          setExitConfirm(true);
          exitTimerRef.current = setTimeout(() => setExitConfirm(false), 3000);
          return;
        }
        clearTimeout(exitTimerRef.current);
        setExitConfirm(false);
        // sendBeacon is the reliable way to fire-and-forget a POST that may
        // outlive the page: the browser queues it even if the socket dies
        // when the server calls os._exit(0). fetch({keepalive:true}) was
        // unreliable inside pywebview's WKWebView on macOS.
        let sent = false;
        try {
          if (navigator.sendBeacon) {
            const blob = new Blob(['{}'], { type: 'application/json' });
            sent = navigator.sendBeacon('/api/exit', blob);
          }
        } catch {}
        if (!sent) {
          try {
            const headers = { 'Content-Type': 'application/json', ...authHeaders() };
            fetch('/api/exit', { method: 'POST', headers, keepalive: true }).catch(() => {});
          } catch {}
        }
        toast('Shutting down…', 'success');

      },
    },
      h('span', { className: 'material-icons-round', style: { fontSize: '14px' } }, 'power_settings_new'),
      exitConfirm ? 'Confirm?' : 'Exit',
    ),
  );

// ─── Filter Bar ───────────────────────────────────────────────────────────────

function FilterBar({ sessions, tmuxSessions, fleet, filters, setFilters, archivedIds }) {
  // Derive unique machines from sessions + tmux + fleet
  const allMachines = useMemo(() => {
    const s = new Set();
    sessions.forEach(x => x.machine && s.add(x.machine));
    tmuxSessions.forEach(x => x.machine && s.add(x.machine));
    Object.keys(fleet || {}).forEach(m => s.add(m));
    return [...s].sort();
  }, [sessions, tmuxSessions, fleet]);

  // Machine counts (sessions only)
  const machineCounts = useMemo(() => {
    const c = {};
    sessions.forEach(s => { if (s.machine) c[s.machine] = (c[s.machine] || 0) + 1; });
    return c;
  }, [sessions]);

  const isFiltersActive = filters.machines.size > 0 || filters.statuses.size > 0 || filters.timeRange !== 'all' || filters.sortBy !== 'recent' || filters.text.trim() || filters.showArchived;

  const toggleMachine = (m) => {
    setFilters(prev => {
      const next = new Set(prev.machines);
      if (next.has(m)) next.delete(m); else next.add(m);
      return { ...prev, machines: next };
    });
  };

  const toggleStatus = (s) => {
    setFilters(prev => {
      const next = new Set(prev.statuses);
      if (next.has(s)) next.delete(s); else next.add(s);
      return { ...prev, statuses: next };
    });
  };

  const resetFilters = () => setFilters({ machines: new Set(), statuses: new Set(), timeRange: 'all', sortBy: 'recent', text: '', showArchived: false });

  // Count hidden archived sessions (archived but showArchived is off)
  const hiddenArchivedCount = useMemo(() => {
    if (filters.showArchived) return 0;
    return sessions.filter(s => (archivedIds || new Set()).has(s.session_id)).length;
  }, [sessions, archivedIds, filters.showArchived]);

  // Compute result count for sessions (mirrors App filteredSessions logic)
  const totalSessions = sessions.length;
  const visibleCount = useMemo(() => {
    let r = sessions;
    if (!filters.showArchived) r = r.filter(s => !(archivedIds || new Set()).has(s.session_id));
    if (filters.machines.size > 0) r = r.filter(s => filters.machines.has(s.machine));
    if (filters.statuses.size > 0) r = r.filter(s => filters.statuses.has(s.status));
    if (filters.timeRange !== 'all') {
      const cutoffs = { hour: 3600000, today: 86400000, week: 604800000, month: 2592000000 };
      const cutoff = Date.now() - cutoffs[filters.timeRange];
      r = r.filter(s => new Date(s.modified).getTime() > cutoff);
    }
    if (filters.text.trim()) {
      const q = filters.text.toLowerCase();
      r = r.filter(s =>
        (s.project_path || '').toLowerCase().includes(q) ||
        (s.summary || '').toLowerCase().includes(q) ||
        (s.machine || '').toLowerCase().includes(q) ||
        (s.cwd || '').toLowerCase().includes(q) ||
        (s.name || '').toLowerCase().includes(q) ||
        (s.slug || '').toLowerCase().includes(q)
      );
    }
    return r.length;
  }, [sessions, filters, archivedIds]);

  const statusDefs = [
    { key: 'working',  label: 'WORKING',  pillClass: 'active-working'  },
    { key: 'active',   label: 'ACTIVE',   pillClass: 'active-active'   },
    { key: 'idle',     label: 'IDLE',     pillClass: 'active-idle'     },
  ];

  const timeRangeOptions = [
    { value: 'all',   label: 'All Time' },
    { value: 'hour',  label: 'Last Hour' },
    { value: 'today', label: 'Today' },
    { value: 'week',  label: 'This Week' },
    { value: 'month', label: 'This Month' },
  ];

  const sortByOptions = [
    { value: 'recent',   label: 'Most Recent' },
    { value: 'oldest',   label: 'Oldest' },
    { value: 'messages', label: 'Most Messages' },
    { value: 'size',     label: 'Largest Size' },
    { value: 'name',     label: 'Name A-Z' },
  ];

  return h('div', { className: 'filter-bar' },

    // Row 1: Machines + Status
    h('div', { className: 'filter-row' },
      h('span', { className: 'filter-label' }, 'Machines'),
      allMachines.map(m =>
        h('button', {
          key: m,
          className: `filter-pill${filters.machines.has(m) ? ' active-machine' : ''}`,
          onClick: () => toggleMachine(m),
          title: `Click to show/hide sessions from ${m} (${(MACHINE_INFO[m] || {}).ip || 'unknown IP'})`,
        }, `${m}${machineCounts[m] != null ? ` (${machineCounts[m]})` : ''}`)
      ),

      h('span', { className: 'filter-label', style: { marginLeft: 8 } }, 'Status'),
      statusDefs.map(({ key, label, pillClass }) =>
        h('button', {
          key,
          className: `filter-pill${filters.statuses.has(key) ? ` ${pillClass}` : ''}`,
          onClick: () => toggleStatus(key),
