  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface:       '#0d1117',
            card:          '#161b22',
            'card-hover':  '#1c2128',
            border:        '#30363d',
            accent:        '#58a6ff',
            'accent-dim':  '#1f3a5f',
            success:       '#3fb950',
            'success-dim': '#1a3a2a',
            danger:        '#f85149',
            'danger-dim':  '#3a1a1a',
            warning:       '#e3b341',
            'text-primary':'#e6edf3',

  <style>

    html, body { height: 100%; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    .fade-in { animation: fade-in 0.2s ease-out; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pulse-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }

    .card-hover:hover { background: #1c2128; border-color: #444c56; }

    .btn:active { transform: scale(0.97); }

    .machine-section { margin-bottom: 12px; }
    .machine-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; cursor: pointer; border-radius: 6px;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: #8b949e;
      transition: background 0.15s;
    }
    .machine-header:hover { background: #161b22; }

    .session-card, .tmux-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 14px 16px; margin-bottom: 8px;
      transition: background 0.15s, border-color 0.15s;
      animation: fade-in 0.2s ease-out;
    }
    .session-card:hover, .tmux-card:hover {
      background: #1c2128; border-color: #444c56;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      display: inline-block;
    }
    .status-dot.active { background: #3fb950; }
    .status-dot.idle   { background: #484f58; }
    .status-dot.pulse  { animation: pulse-dot 1.4s ease-in-out infinite; }

    .badge {
      font-size: 0.65rem; font-family: "SF Mono", "Fira Code", Consolas, monospace;
      padding: 2px 8px; border-radius: 20px; font-weight: 600;
      letter-spacing: 0.04em;
    }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(1, 4, 9, 0.85);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      animation: fade-in 0.15s ease-out;
    }

    .modal-box {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; padding: 28px; min-width: 420px; max-width: 520px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .form-input {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 8px 12px; color: #e6edf3;
      font-size: 0.875rem; outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: #58a6ff; }
    .form-input::placeholder { color: #484f58; }

    select.form-input option { background: #161b22; color: #e6edf3; }

    .panel-scroll { overflow-y: auto; flex: 1; min-height: 0; padding: 0 4px 0 0; }

    .toaster {
      position: fixed; bottom: 24px; right: 24px; z-index: 2000;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 12px 16px;
      font-size: 0.85rem; min-width: 240px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: fade-in 0.2s ease-out;
    }
    .toast.success { border-left: 3px solid #3fb950; }
    .toast.error   { border-left: 3px solid #f85149; }
    .toast.info    { border-left: 3px solid #58a6ff; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .main-panels { flex-direction: column !important; }
      .panel-sessions, .panel-tmux { width: 100% !important; min-width: 0 !important; }
    }
  </style>

<body>
<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react":            "https://esm.sh/react@19",
    "react-dom/client": "https://esm.sh/react-dom@19/client",
    "react/jsx-runtime":"https://esm.sh/react@19/jsx-runtime"
  }
}
</script>

<script type="module">
import { createElement as h, useState, useEffect, useRef, useCallback, useMemo, Fragment } from 'react';
import { createRoot } from 'react-dom/client';

// ─── Utility functions ────────────────────────────────────────────────────────

function relativeTime(isoStr) {
  if (!isoStr) return '—';
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 5)   return 'just now';
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function shortenPath(p) {
  if (!p) return '';
  const parts = p.replace(/\\/g, '/').split('/').filter(Boolean);
  if (parts.length <= 2) return parts.join('/');
  return parts.slice(-2).join('/');
}

function groupBy(arr, key) {
  const out = {};
  for (const item of arr) {
    const k = typeof key === 'function' ? key(item) : item[key];
    if (!out[k]) out[k] = [];
    out[k].push(item);
  }
  return out;
}

function clsx(...args) {
  return args.filter(Boolean).join(' ');
}

// ─── Machine / Design System ──────────────────────────────────────────────────

const MACHINE_INFO = {
  'mac-mini':        { ip: '192.168.7.102', os: 'macOS',   icon: '🍎' },
  'ubuntu-desktop':  { ip: '192.168.7.13',  os: 'Linux',   icon: '🐧' },
  'avell-i7':        { ip: '192.168.7.103', os: 'Windows', icon: '🪟' },
  'windows-desktop': { ip: '192.168.7.101', os: 'Windows', icon: '🪟' },
};

// Detect local machine from the page's hostname (API host).
// If served from one of the known IPs, map it back to a machine name.
function detectLocalMachine() {
  const h = location.hostname;
  for (const [name, info] of Object.entries(MACHINE_INFO)) {
    if (h === info.ip || h === name || h === 'localhost' || h === '127.0.0.1') {
      // localhost / 127.0.0.1 → assume mac-mini (the primary orchestrator)
      if (h === 'localhost' || h === '127.0.0.1') return 'mac-mini';
      return name;
    }
  }
  return 'mac-mini'; // fallback
}

const LOCAL_MACHINE = detectLocalMachine();

function isLocalMachine(machine) {
  return machine === LOCAL_MACHINE;
}

function getMachineOS(machine) {
  return MACHINE_INFO[machine]?.os || 'unknown';
}

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(1) + ' GB';
}

// ─── Badge Component ──────────────────────────────────────────────────────────

function Badge({ text, color = '#8b949e', bg = '#21262d', border = '#30363d', icon }) {
  return h('span', {
    style: {
      display: 'inline-flex', alignItems: 'center', gap: 4,
      fontSize: '0.65rem', fontWeight: 600,
      padding: '2px 8px', borderRadius: 12,
      background: bg, color: color, border: `1px solid ${border}`,
      whiteSpace: 'nowrap',
      fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
    }
  }, icon && h('span', { style: { fontSize: '0.7rem' } }, icon), text);
}

function MachineBadge({ machine }) {
  const info = MACHINE_INFO[machine] || {};
  const local = isLocalMachine(machine);
  if (local) {
    return h(Badge, { text: 'LOCAL', color: '#3fb950', bg: '#1a3a2a', border: '#2a5a3a' });
  }
  const label = info.ip ? `${machine} (${info.ip})` : machine;
  return h(Badge, { text: label, color: '#8b949e', bg: '#21262d', border: '#30363d' });
}

function OsBadge({ machine }) {
  const info = MACHINE_INFO[machine] || {};
  const icon = info.icon || '💻';
  const os = info.os || 'unknown';
  return h(Badge, { text: os, icon, color: '#8b949e', bg: '#21262d', border: '#30363d' });
}

// ─── Toast system ─────────────────────────────────────────────────────────────

let _addToast = null;
function toast(msg, type = 'info') {
  if (_addToast) _addToast(msg, type);
}

function Toaster() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    _addToast = (msg, type) => {
      const id = Date.now() + Math.random();
      setToasts(t => [...t, { id, msg, type }]);
      setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    };
    return () => { _addToast = null; };
  }, []);

  return h('div', { className: 'toaster' },
    toasts.map(t =>
      h('div', { key: t.id, className: `toast ${t.type}` }, t.msg)
    )
  );
}

// ─── WebSocket hook ───────────────────────────────────────────────────────────

function useWebSocket(onMessage) {
  const wsRef = useRef(null);
  const reconnectTimer = useRef(null);
  const retryCount = useRef(0);
  const [connected, setConnected] = useState(false);

  const connect = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState < 2) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    wsRef.current = ws;

    ws.onopen = () => {
      setConnected(true);
      retryCount.current = 0;
      ['sessions', 'tmux', 'fleet'].forEach(ch =>
        ws.send(JSON.stringify({ type: 'subscribe', channel: ch }))
      );
    };

    ws.onmessage = evt => {
      try { onMessage(JSON.parse(evt.data)); } catch {}
    };

    ws.onclose = () => {
      setConnected(false);
      const delay = Math.min(1000 * Math.pow(2, retryCount.current), 30000);
      retryCount.current++;
      reconnectTimer.current = setTimeout(connect, delay);
    };

    ws.onerror = () => { ws.close(); };
  }, [onMessage]);

  useEffect(() => {
    connect();
    return () => {
      clearTimeout(reconnectTimer.current);
      wsRef.current?.close();
    };
  }, [connect]);

  return connected;
}

// ─── Status Dot ──────────────────────────────────────────────────────────────

function StatusDot({ status, pulse = false }) {
  return h('span', {
    className: clsx('status-dot', status, pulse && status === 'active' && 'pulse'),
    title: status,
  });
}

// ─── Session Card ─────────────────────────────────────────────────────────────

function SessionCard({ session, onLaunch, onTmuxLaunch, launching, tmuxLaunching, skipPermissions }) {
  const isActive = session.status === 'active';
  const projectPath = session.project_path || session.project_folder || '';
  const projectName = shortenPath(projectPath);
  const summary = session.summary || '(no message preview)';
  const [copied, setCopied] = useState(false);

  const sessionId = session.session_id || '';
  const cwdDiffersFromProject =
    session.cwd &&
    session.project_path &&
    session.cwd !== session.project_path;

  // Display name: custom name > slug > "(unnamed)"
  const displayName = session.name || session.slug || '(unnamed)';
  const local = isLocalMachine(session.machine);
  const os = getMachineOS(session.machine);

  const handleCopy = () => {
    const cmd = `claude --resume ${sessionId}`;
    navigator.clipboard.writeText(cmd).then(() => {
      setCopied(true);
      toast('Copied resume command', 'info');
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => {
      toast('Failed to copy', 'error');
    });
  };

  const launchLabel = launching ? 'Launching…' : (local ? 'Launch' : 'SSH + Launch');
  const launchBg    = local ? '#1f3a5f' : '#3a2200';
  const launchColor = local ? '#58a6ff' : '#e3b341';
  const launchBorder = local ? '#2d4f7a' : '#5a3a00';

  const tmuxLabel = tmuxLaunching ? 'Launching…' : (os === 'Windows' ? 'psmux Launch' : 'tmux Launch');

  return h('div', { className: 'session-card' },
    h('div', { style: { flex: 1, minWidth: 0 } },

      // Row 1: Display name (bold, primary)
      h('div', {
        style: {
          fontSize: '0.88rem', fontWeight: 700,
          color: '#58a6ff', overflow: 'hidden',
          textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          marginBottom: 3,
        },
        title: displayName,
      }, displayName),

      // Row 2: Project path + CWD if different
      h('div', {
        style: {
          fontSize: '0.7rem', color: '#8b949e',
          fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
          overflow: 'hidden', textOverflow: 'ellipsis',
          whiteSpace: 'nowrap', marginBottom: 4,
        },
        title: cwdDiffersFromProject ? `${projectPath} → ${session.cwd}` : projectPath,
      },
        projectName,
        cwdDiffersFromProject && h('span', { style: { color: '#484f58' } }, ` → ${shortenPath(session.cwd)}`),
      ),

      // Row 3: Summary
      h('div', {
        style: {
          fontSize: '0.75rem', color: '#6e7681',
          overflow: 'hidden', textOverflow: 'ellipsis',
          whiteSpace: 'nowrap', marginBottom: 6,
          fontStyle: 'italic',
        },
        title: summary,
      }, `"${summary}"`),

      // Row 4: Metadata badges
      h('div', {
        style: {
          display: 'flex', flexWrap: 'wrap', gap: 4,
          alignItems: 'center', marginBottom: 6,
        }
      },
        h(MachineBadge, { machine: session.machine }),
        h(OsBadge, { machine: session.machine }),
        h('span', {
          style: {
            display: 'inline-flex', alignItems: 'center', gap: 4,
            fontSize: '0.65rem', fontWeight: 600,
            padding: '2px 8px', borderRadius: 12,
            background: isActive ? '#1a3a2a' : '#21262d',
            color: isActive ? '#3fb950' : '#6e7681',
            border: `1px solid ${isActive ? '#2a5a3a' : '#30363d'}`,
            whiteSpace: 'nowrap',
          }
        },
          h('span', {
            style: {
              width: 6, height: 6, borderRadius: '50%',
              background: isActive ? '#3fb950' : '#484f58',
              display: 'inline-block', flexShrink: 0,
              animation: isActive ? 'pulse-dot 1.4s ease-in-out infinite' : 'none',
            }
          }),
          isActive ? 'ACTIVE' : 'idle',
        ),
        session.file_size && h(Badge, { text: formatFileSize(session.file_size) }),
        h(Badge, { text: `${session.messages || 0} msgs` }),
        h(Badge, { text: relativeTime(session.modified) }),
      ),

      // Row 5: Session ID + copy
      sessionId && h('div', {
        style: { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }
      },
        h('span', {
          style: {
            fontSize: '10px', fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
            color: '#484f58', opacity: 0.6,
            overflow: 'hidden', textOverflow: 'ellipsis',
            whiteSpace: 'nowrap', maxWidth: 200,
          },
          title: sessionId,
        }, sessionId),
        h('button', {
          className: 'btn',
          onClick: handleCopy,
          title: `Copy: claude --resume ${sessionId}`,
          style: {
            background: 'none', border: 'none',
            color: copied ? '#3fb950' : '#484f58',
            padding: '0 2px', cursor: 'pointer',
            fontSize: '0.75rem', lineHeight: 1,
            flexShrink: 0,
          }
        }, copied ? '✓' : '📋'),
      ),

      // Row 6: Action buttons
      h('div', { style: { display: 'flex', gap: 6 } },
        h('button', {
          className: 'btn',
          onClick: () => onLaunch(session),
          disabled: launching,
          style: {
            fontSize: '0.72rem', fontWeight: 600,
            background: launchBg, color: launchColor,
            border: `1px solid ${launchBorder}`, borderRadius: 6,
            padding: '4px 12px', cursor: launching ? 'not-allowed' : 'pointer',
            opacity: launching ? 0.6 : 1,
          }
        }, launchLabel),
        h('button', {
          className: 'btn',
          onClick: () => onTmuxLaunch(session),
          disabled: tmuxLaunching,
          style: {
            fontSize: '0.72rem', fontWeight: 600,
            background: '#1a3a2a', color: '#3fb950',
            border: '1px solid #2a5a3a', borderRadius: 6,
            padding: '4px 12px', cursor: tmuxLaunching ? 'not-allowed' : 'pointer',
            opacity: tmuxLaunching ? 0.6 : 1,
          }
        }, tmuxLabel),
      ),
    ),
  );
}

// ─── Tmux Card ────────────────────────────────────────────────────────────────

function TmuxCard({ session, onConnect, connecting }) {
  const isAttached = session.attached;
  const local = isLocalMachine(session.machine);
  const connectLabel = connecting ? 'Connecting…' : (local ? 'Connect' : 'SSH + Connect');

  return h('div', { className: 'tmux-card' },
    h('div', { style: { flex: 1, minWidth: 0 } },
      // Session name
      h('div', {
        style: {
          fontSize: '0.85rem', fontWeight: 700, color: '#e6edf3',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          marginBottom: 5,
        }
      }, session.session_name || session.name || '(unnamed)'),

      // Badge row
      h('div', {
        style: { display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center', marginBottom: 8 }
      },
        h(MachineBadge, { machine: session.machine }),
        h(OsBadge, { machine: session.machine }),
        session.windows != null && h(Badge, { text: `${session.windows} win` }),
        isAttached && h(Badge, { text: 'attached', color: '#58a6ff', bg: '#1f3a5f', border: '#2d4f7a' }),
      ),

      // Connect button
      h('div', { style: { display: 'flex', justifyContent: 'flex-end' } },
        h('button', {
          className: 'btn',
          onClick: () => onConnect(session),
          disabled: connecting,
          style: {
            fontSize: '0.72rem', fontWeight: 600,
            background: local ? '#1a3a2a' : '#3a2200',
            color: local ? '#3fb950' : '#e3b341',
            border: `1px solid ${local ? '#2a5a3a' : '#5a3a00'}`,
            borderRadius: 6, padding: '4px 12px',
            cursor: connecting ? 'not-allowed' : 'pointer',
            opacity: connecting ? 0.6 : 1,
          }
        }, connectLabel),
      ),
    ),
  );
}

// ─── Machine Section ──────────────────────────────────────────────────────────

function MachineSection({ machine, children, defaultOpen = true, count }) {
  const [open, setOpen] = useState(defaultOpen);

  return h('div', { className: 'machine-section' },
    h('div', {
      className: 'machine-header',
      onClick: () => setOpen(o => !o),
    },
      h('span', {
        style: { color: '#8b949e', fontSize: '0.75rem', transition: 'transform 0.15s',
          display: 'inline-block',
          transform: open ? 'rotate(90deg)' : 'rotate(0deg)' }
      }, '▶'),
      h('span', { style: { color: '#8b949e', fontFamily: 'monospace' } }, machine),
      count != null && h('span', {
        style: {
          background: '#21262d', color: '#8b949e', fontSize: '0.65rem',
          borderRadius: 20, padding: '1px 7px', marginLeft: 4,
        }
      }, count),
    ),
    open && h('div', { style: { paddingLeft: 8 } }, children),
  );
}

// ─── Project Section ──────────────────────────────────────────────────────────

function ProjectSection({ projectPath, children, count, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  const shortPath = shortenPath(projectPath) || projectPath || '(unknown)';

  return h('div', { style: { marginLeft: 8, marginBottom: 4 } },
    h('div', {
      onClick: () => setOpen(o => !o),
      style: {
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 8px', cursor: 'pointer',
        borderRadius: 4, fontSize: '0.75rem',
        transition: 'background 0.15s',
      },
      onMouseEnter: e => { e.currentTarget.style.background = '#161b22'; },
      onMouseLeave: e => { e.currentTarget.style.background = 'transparent'; },
    },
      h('span', {
        style: {
          color: '#484f58', fontSize: '0.65rem', transition: 'transform 0.15s',
          display: 'inline-block', transform: open ? 'rotate(90deg)' : 'rotate(0)',
        }
      }, '▶'),
      h('span', {
        style: { color: '#8b949e', fontFamily: 'monospace', fontSize: '0.75rem' }
      }, shortPath),
      h('span', {
        style: {
          background: '#161b22', color: '#484f58', fontSize: '0.6rem',
          borderRadius: 10, padding: '1px 6px', marginLeft: 4,
        }
      }, count),
    ),
    open && h('div', { style: { paddingLeft: 4 } }, children),
  );
}

// ─── New Tmux Modal ───────────────────────────────────────────────────────────

function NewTmuxModal({ fleet, onClose, onCreated }) {
  const machines = Object.keys(fleet || {});
  const [machine, setMachine] = useState(machines[0] || '');
  const [name, setName] = useState('');
  const [cwd, setCwd] = useState('');
  const [command, setCommand] = useState('');
  const [creating, setCreating] = useState(false);

  const handleCreate = async () => {
    if (!machine || !name.trim()) {
      toast('Machine and session name are required', 'error');
      return;
    }
    setCreating(true);
    try {
      const res = await fetch('/api/tmux/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine, name: name.trim(), cwd: cwd.trim() || undefined, command: command.trim() || undefined }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Created tmux session "${name}" on ${machine}`, 'success');
        onCreated?.();
        onClose();
      } else {
        toast(data.error || 'Failed to create session', 'error');
      }
    } catch (e) {
      toast('Network error creating session', 'error');
    } finally {
      setCreating(false);
    }
  };

  return h('div', {
    className: 'modal-overlay',
    onClick: e => { if (e.target === e.currentTarget) onClose(); }
  },
    h('div', { className: 'modal-box' },
      h('div', {
        style: {
          display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', marginBottom: 24,
        }
      },
        h('h2', {
          style: { fontSize: '1rem', fontWeight: 700, color: '#e6edf3' }
        }, 'New Tmux Session'),
        h('button', {
          className: 'btn',
          onClick: onClose,
          style: {
            background: 'none', border: 'none', color: '#8b949e',
            fontSize: '1.2rem', cursor: 'pointer', padding: '4px 8px',
            borderRadius: 4,
          }
        }, '×'),
      ),

      h('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Machine'),
          h('select', {
            className: 'form-input',
            value: machine,
            onChange: e => setMachine(e.target.value),
          },
            machines.map(m => h('option', { key: m, value: m }, m))
          ),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Session Name'),
          h('input', {
            className: 'form-input',
            type: 'text',
            placeholder: 'e.g. dev-session',
            value: name,
            onChange: e => setName(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter') handleCreate(); },
          }),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Working Directory (optional)'),
          h('input', {
            className: 'form-input',
            type: 'text',
            placeholder: '/Users/rbgnr/git/project',
            value: cwd,
            onChange: e => setCwd(e.target.value),
          }),
        ),
        h('div', null,
          h('label', {
            style: { display: 'block', fontSize: '0.78rem', color: '#8b949e', marginBottom: 6 }
          }, 'Command (optional)'),
          h('input', {
            className: 'form-input',
            type: 'text',
            placeholder: 'e.g. claude',
            value: command,
            onChange: e => setCommand(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter') handleCreate(); },
          }),
        ),

        h('div', { style: { display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 } },
          h('button', {

              borderRadius: 8, padding: '8px 20px', fontSize: '0.85rem',

              opacity: creating ? 0.7 : 1,

    ),
  );
}

// ─── Sessions Panel ───────────────────────────────────────────────────────────

function SessionsPanel({ sessions, filter, onLaunch, onTmuxLaunch, launchingId, tmuxLaunchingId, skipPermissions }) {
  const filtered = useMemo(() => {
    if (!filter.trim()) return sessions;
    const q = filter.toLowerCase();
    return sessions.filter(s =>
      (s.project_path || '').toLowerCase().includes(q) ||
      (s.summary || '').toLowerCase().includes(q) ||
      (s.machine || '').toLowerCase().includes(q) ||
      (s.slug || '').toLowerCase().includes(q)
    );
  }, [sessions, filter]);

  const byMachine = useMemo(() => groupBy(filtered, 'machine'), [filtered]);

  if (!sessions.length) {
    return h('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', height: '200px', gap: 12,
        color: '#484f58',
      }
    },
      h('span', { style: { fontSize: '2rem' } }, '🔍'),
      h('span', { style: { fontSize: '0.875rem' } }, 'No sessions found'),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 6, fontSize: '0.78rem' } },
        h('span', {
          style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '1rem' }
        }, '↻'),
        h('span', null, 'Scanning fleet…'),
      ),
    );
  }

  if (!Object.keys(byMachine).length) {
    return h('div', {
      style: {
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', height: '200px', gap: 8,
        color: '#484f58',
      }
    },
      h('span', { style: { fontSize: '0.875rem' } }, 'No sessions match your filter'),
    );
  }

  return h('div', null,
    Object.entries(byMachine).map(([machine, machineSessions]) => {
      // Group by project_path within the machine, sorted by most recent modified
      const byProject = groupBy(machineSessions, 'project_path');
      const projectEntries = Object.entries(byProject).sort(([, a], [, b]) => {
        const aMax = a.reduce((m, s) => s.modified > m ? s.modified : m, '');
        const bMax = b.reduce((m, s) => s.modified > m ? s.modified : m, '');
        return bMax > aMax ? 1 : bMax < aMax ? -1 : 0;
      });

      return h(MachineSection, {
        key: machine,
        machine,
        count: machineSessions.length,
        defaultOpen: true,
      },
        projectEntries.map(([projectPath, projectSessions]) =>
          h(ProjectSection, {
            key: projectPath,
            projectPath,
            count: projectSessions.length,
            defaultOpen: projectSessions.length <= 3,
          },
            projectSessions.map(s =>
              h(SessionCard, {
                key: s.session_id,
                session: s,
                onLaunch,
                onTmuxLaunch,
                launching: launchingId === s.session_id,
                tmuxLaunching: tmuxLaunchingId === s.session_id,
                skipPermissions,
              })
            )
          )
        )
      );
    })
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────

function App() {
  const [sessions, setSessions]           = useState([]);
  const [tmuxSessions, setTmuxSessions]   = useState([]);
  const [fleet, setFleet]                 = useState({});
  const [health, setHealth]               = useState(null);
  const [lastScan, setLastScan]           = useState(null);
  const [filter, setFilter]               = useState('');
  const [scanning, setScanning]           = useState(false);
  const [launchingId, setLaunchingId]     = useState(null);
  const [tmuxLaunchingId, setTmuxLaunchingId] = useState(null);
  const [connectingId, setConnectingId]   = useState(null);
  const [showModal, setShowModal]         = useState(false);
  const [loading, setLoading]             = useState(true);
  const [skipPermissions, setSkipPermissions] = useState(false);

  // ── WS message handler ───────────────────────────────────────────────────
  const handleWsMessage = useCallback((msg) => {
    if (msg.channel === 'sessions') {
      const data = msg.data;
      // data can be a flat list (update) or grouped dict (snapshot)
      if (Array.isArray(data)) {
        setSessions(data);
      } else if (data && typeof data === 'object') {
        // grouped: { machine: [{project_folder, sessions:[]}] }
        const flat = [];
        for (const [machine, projects] of Object.entries(data)) {
          for (const proj of projects) {
            for (const s of proj.sessions) {
              flat.push({ ...s, machine });
            }
          }
        }
        setSessions(flat);
      }
    } else if (msg.channel === 'fleet') {
      const data = msg.data;
      if (data && typeof data === 'object' && !Array.isArray(data)) {
        setFleet(data);
      }
    } else if (msg.channel === 'tmux') {
      if (Array.isArray(msg.data)) setTmuxSessions(msg.data);
    }
  }, []);

  const wsConnected = useWebSocket(handleWsMessage);

  // ── Initial data load ────────────────────────────────────────────────────
  useEffect(() => {
    const p1 = fetch('/health')
      .then(r => r.json())
      .then(d => { setHealth(d); setLastScan(d.last_scan); })
      .catch(() => {});

    const p2 = fetch('/api/sessions')
      .then(r => r.json())
      .then(data => {
        if (data && typeof data === 'object' && !Array.isArray(data)) {
          const flat = [];
          for (const [machine, projects] of Object.entries(data)) {
            for (const proj of projects) {
              for (const s of proj.sessions) {
                flat.push({ ...s, machine });
              }
            }
          }
          setSessions(flat);
        }
      })
      .catch(() => {});

    const p3 = fetch('/api/fleet')
      .then(r => r.json())
      .then(d => { if (d && typeof d === 'object') setFleet(d); })
      .catch(() => {});

    const p4 = fetch('/api/tmux')
      .then(r => r.json())
      .then(d => { if (Array.isArray(d)) setTmuxSessions(d); })
      .catch(() => {});

    const p5 = fetch('/api/preferences')
      .then(r => r.json())
      .then(d => { if (d && typeof d.skip_permissions === 'boolean') setSkipPermissions(d.skip_permissions); })
      .catch(() => {});

    Promise.all([p1, p2, p3, p4, p5]).finally(() => setLoading(false));
  }, []);

  // ── Scan ─────────────────────────────────────────────────────────────────
  const handleScan = useCallback(async () => {
    setScanning(true);
    try {
      const res = await fetch('/api/sessions/scan', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        toast(`Scan complete · ${(data.sessions || []).length} sessions`, 'success');
        setLastScan(data.last_scan);
        if (Array.isArray(data.sessions)) {
          setSessions(data.sessions);
        }
      } else {
        toast(data.error || 'Scan failed', 'error');
      }
    } catch {
      toast('Network error during scan', 'error');
    } finally {
      setScanning(false);
    }
  }, []);

  // ── Skip permissions ──────────────────────────────────────────────────────
  const handleSkipPermissionsChange = useCallback(async (val) => {
    setSkipPermissions(val);
    try {
      await fetch('/api/preferences', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skip_permissions: val }),
      });
    } catch {
      // non-fatal — preference not saved server-side, still works for this session
    }
  }, []);

  // ── Launch session ────────────────────────────────────────────────────────
  const handleLaunch = useCallback(async (session) => {
    setLaunchingId(session.session_id);
    try {
      const res = await fetch('/api/sessions/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          machine: session.machine,
          session_id: session.session_id,
          cwd: session.cwd || session.project_path,
          skip_permissions: skipPermissions,
        }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Launched session in terminal`, 'success');
      } else {
        toast(data.error || 'Launch not yet implemented', 'info');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setLaunchingId(null);
    }
  }, [skipPermissions]);

  // ── Tmux launch (create tmux session + launch claude in it) ──────────────
  const handleTmuxLaunch = useCallback(async (session) => {
    setTmuxLaunchingId(session.session_id);
    try {
      const res = await fetch('/api/sessions/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          machine: session.machine,
          session_id: session.session_id,
          cwd: session.cwd || session.project_path,
          skip_permissions: skipPermissions,
          mode: 'tmux',
        }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Launched in tmux on ${session.machine}`, 'success');
      } else {
        toast(data.error || 'Tmux launch not yet implemented', 'info');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setTmuxLaunchingId(null);
    }
  }, [skipPermissions]);

  // ── Tmux connect ──────────────────────────────────────────────────────────
  const handleConnectTmux = useCallback(async (session) => {
    const key = `${session.machine}-${session.session_name || session.name}`;
    setConnectingId(key);
    try {
      const res = await fetch('/api/tmux/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine: session.machine, session_name: session.session_name || session.name }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`Connected to ${session.session_name || session.name}`, 'success');
      } else {
        toast(data.error || 'Connect not yet implemented', 'info');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      setConnectingId(null);
    }
  }, []);

  // ── Render ────────────────────────────────────────────────────────────────
  return h(Fragment, null,
    h('div', {
      style: {
        height: '100vh', display: 'flex', flexDirection: 'column',
        overflow: 'hidden',
      }
    },

      // Header
      h(Header, {
        health, sessions, tmuxSessions, fleet, filter,
        onFilterChange: setFilter,
        onScan: handleScan,
        scanning,
        skipPermissions,
        onSkipPermissionsChange: handleSkipPermissionsChange,
      }),

      // Main panels
      h('div', {
        className: 'main-panels',
        style: {
          display: 'flex', flex: 1, minHeight: 0,
          gap: 0, overflow: 'hidden',
        }
      },

        // Sessions panel
        h('div', {
          className: 'panel-sessions',
          style: {
            flex: '1 1 0', minWidth: 280,
            borderRight: '1px solid #30363d',
            display: 'flex', flexDirection: 'column',
            overflow: 'hidden',
          }
        },
          h('div', {
            style: {
              padding: '16px 16px 8px',
              borderBottom: '1px solid #21262d',
              flexShrink: 0,
            }
          },
            h('span', {
              style: {
                fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
                textTransform: 'uppercase', color: '#484f58',
              }
            }, 'Sessions'),
          ),
          h('div', {
            style: { flex: 1, overflowY: 'auto', padding: '12px 16px' }
          },
            loading
              ? h('div', {
                  style: {
                    display: 'flex', flexDirection: 'column', alignItems: 'center',
                    justifyContent: 'center', height: '200px', gap: 12, color: '#484f58',
                  }
                },
                  h('span', {
                    style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '2rem' }
                  }, '↻'),
                  h('span', { style: { fontSize: '0.875rem' } }, 'Scanning fleet...'),
                  h('span', { style: { fontSize: '0.78rem', textAlign: 'center' } }, 'Discovering machines\nand sessions'),
                )
              : h(SessionsPanel, {
                  sessions, filter,
                  onLaunch: handleLaunch,
                  onTmuxLaunch: handleTmuxLaunch,
                  launchingId,
                  tmuxLaunchingId,
                  skipPermissions,
                }),
          ),
        ),

        // Tmux panel
        h('div', {
          className: 'panel-tmux',
          style: {
            width: 320, flexShrink: 0,
            display: 'flex', flexDirection: 'column',
            overflow: 'hidden',
          }
        },
          h('div', {
            style: {
              padding: '16px 16px 8px',
              borderBottom: '1px solid #21262d',
              flexShrink: 0,
            }
          },
            h('span', {
              style: {
                fontSize: '0.7rem', fontWeight: 700, letterSpacing: '0.08em',
                textTransform: 'uppercase', color: '#484f58',
              }
            }, 'Tmux'),
          ),
          h('div', {
            style: { flex: 1, overflowY: 'auto', padding: '12px 16px', display: 'flex', flexDirection: 'column' }
          },
            loading
              ? h('div', {
                  style: {
                    display: 'flex', flexDirection: 'column', alignItems: 'center',
                    justifyContent: 'center', height: '160px', gap: 12, color: '#484f58',
                  }
                },
                  h('span', {
                    style: { display: 'inline-block', animation: 'spin 0.8s linear infinite', fontSize: '2rem' }
                  }, '↻'),
                  h('span', { style: { fontSize: '0.875rem' } }, 'Scanning fleet...'),
                )
              : h(TmuxPanel, {
                  tmuxSessions, fleet,
                  onConnectTmux: handleConnectTmux,
                  connectingId,
                  onNewSession: () => setShowModal(true),
                }),
          ),
        ),
      ),

      // Fleet bar
      h(FleetBar, { fleet, lastScan, wsConnected }),
    ),

    // Modal
    showModal && h(NewTmuxModal, {
      fleet,
      onClose: () => setShowModal(false),
      onCreated: () => {
        fetch('/api/tmux')
          .then(r => r.json())
          .then(d => { if (Array.isArray(d)) setTmuxSessions(d); })
          .catch(() => {});
      },
    }),

    // Toaster
    h(Toaster, null),
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root = createRoot(document.getElementById('root'));
root.render(h(App, null));
</script>
</body>
</html>
